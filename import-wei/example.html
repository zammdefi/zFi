<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Example Dapp — Wei SDK</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 32px; width: 100%; max-width: 400px; }
h1 { font-size: 20px; margin-bottom: 8px; }
.subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #666; margin-bottom: 6px; }
input { width: 100%; padding: 14px; font-size: 16px; border: 2px solid #eee; border-radius: 8px; margin-bottom: 16px; transition: border-color 0.2s; }
input:focus { outline: none; border-color: #000; }
.preview { font-size: 13px; color: #666; margin: -8px 0 16px; min-height: 20px; }
.preview.resolved { color: #0a0; }
.preview.error { color: #c00; }
button { width: 100%; padding: 16px; font-size: 16px; font-weight: 600; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
button:hover { background: #333; }
button:disabled { background: #ccc; cursor: not-allowed; }
.status { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 14px; display: none; }
.status.show { display: block; }
.status.success { background: #e8f5e9; color: #2e7d32; }
.status.error { background: #ffebee; color: #c62828; }
.powered { margin-top: 24px; text-align: center; font-size: 12px; color: #999; }
.powered a { color: #666; }
</style>
</head>
<body>

<div class="card">
  <h1>Send ETH</h1>
  <p class="subtitle">Example dapp using wei.js SDK</p>

  <label>Recipient</label>
  <input type="text" id="recipient" placeholder="0x... or name.wei" oninput="previewRecipient()">
  <div class="preview" id="preview"></div>

  <label>Amount (ETH)</label>
  <input type="text" id="amount" placeholder="0.01">

  <button id="sendBtn" onclick="sendETH()">Send</button>

  <div class="status" id="status"></div>

  <div class="powered">
    Powered by <a href="https://import.wei.domains">wei.js</a> · <a href="https://wei.domains">Get a .wei name</a>
  </div>
</div>

<script src="wei.min.js"></script>
<script>
let resolvedAddress = null;
let previewTimeout = null;

async function previewRecipient() {
  const input = document.getElementById('recipient').value.trim();
  const preview = document.getElementById('preview');

  clearTimeout(previewTimeout);
  resolvedAddress = null;

  if (!input) {
    preview.textContent = '';
    preview.className = 'preview';
    return;
  }

  // If it's already an address, use directly
  if (/^0x[a-fA-F0-9]{40}$/.test(input)) {
    resolvedAddress = input;
    preview.textContent = '';
    preview.className = 'preview';
    return;
  }

  // Show resolving state
  preview.textContent = 'Resolving...';
  preview.className = 'preview';

  // Debounce
  previewTimeout = setTimeout(async () => {
    try {
      const addr = await wei.resolve(input);
      if (addr) {
        resolvedAddress = addr;
        preview.textContent = '→ ' + addr.slice(0,10) + '...' + addr.slice(-8);
        preview.className = 'preview resolved';
      } else {
        resolvedAddress = null;
        preview.textContent = 'Name not found';
        preview.className = 'preview error';
      }
    } catch (e) {
      resolvedAddress = null;
      preview.textContent = 'Error resolving';
      preview.className = 'preview error';
    }
  }, 300);
}

async function sendETH() {
  const input = document.getElementById('recipient').value.trim();
  const amount = document.getElementById('amount').value.trim();
  const status = document.getElementById('status');
  const btn = document.getElementById('sendBtn');

  // Validate
  if (!input) {
    showStatus('Enter a recipient', 'error');
    return;
  }
  if (!amount || isNaN(parseFloat(amount)) || parseFloat(amount) <= 0) {
    showStatus('Enter a valid amount', 'error');
    return;
  }

  // Check wallet
  if (typeof ethereum === 'undefined') {
    showStatus('No wallet detected. Install MetaMask or similar.', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Resolving...';

  try {
    // Resolve address if needed
    const address = resolvedAddress || await wei.resolveAny(input);

    if (!address) {
      showStatus('Could not resolve recipient', 'error');
      btn.disabled = false;
      btn.textContent = 'Send';
      return;
    }

    btn.textContent = 'Confirm in wallet...';

    // Request account access
    const accounts = await ethereum.request({ method: 'eth_requestAccounts' });

    // Convert ETH to wei (hex)
    const weiValue = '0x' + BigInt(Math.floor(parseFloat(amount) * 1e18)).toString(16);

    // Send transaction
    const txHash = await ethereum.request({
      method: 'eth_sendTransaction',
      params: [{
        from: accounts[0],
        to: address,
        value: weiValue
      }]
    });

    showStatus('Sent! TX: ' + txHash.slice(0,10) + '...', 'success');
  } catch (e) {
    if (e.code === 4001) {
      showStatus('Transaction cancelled', 'error');
    } else {
      showStatus('Error: ' + (e.message || e), 'error');
    }
  }

  btn.disabled = false;
  btn.textContent = 'Send';
}

function showStatus(msg, type) {
  const status = document.getElementById('status');
  status.textContent = msg;
  status.className = 'status show ' + type;
}
</script>

</body>
</html>
