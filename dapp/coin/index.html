* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#fff;--fg:#000;--fg-muted:#666;--fg-dim:#999;
  --border:#000;--border-muted:#ddd;
  --surface:#f9f9f9;--surface-hover:#f5f5f5;
  --btn-bg:#000;--btn-fg:#fff;--btn-hover:#333;
  --btn-dis-bg:transparent;--btn-dis-border:#ccc;--btn-dis-fg:#999;
  --status-error:#fff0f0;--status-success:#f0fff0;
  --link-fg:inherit;
  --modal-overlay:rgba(0,0,0,0.8);--modal-bg:#fff;--modal-border:#000;
  --green:#22c55e;--red:#ef4444;
}
.dark {
  --bg:#0a0a0a;--fg:#e8e8e0;--fg-muted:#888;--fg-dim:#666;
  --border:#333;--border-muted:#333;
  --surface:#111;--surface-hover:#151515;
  --btn-bg:#e8e8e0;--btn-fg:#0a0a0a;--btn-hover:#ccc;
  --btn-dis-bg:transparent;--btn-dis-border:#444;--btn-dis-fg:#666;
  --status-error:#1a0000;--status-success:#001a00;
  --link-fg:#e8e8e0;
  --modal-overlay:rgba(0,0,0,0.85);--modal-bg:#111;--modal-border:#333;
  --green:#22c55e;--red:#ef4444;
}
body {
  font-family:Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--fg);
  min-height:100vh;padding:60px 20px 20px;
  max-width:720px;margin:0 auto;
}
a { color:var(--link-fg); }
button {
  font-family:inherit;cursor:pointer;border:none;border-radius:0;
  background:var(--btn-bg);color:var(--btn-fg);
  padding:10px 20px;font-size:13px;font-weight:600;letter-spacing:0.05em;
}
button:hover { background:var(--btn-hover); }
button:disabled { background:var(--btn-dis-bg);border:1px solid var(--btn-dis-border);color:var(--btn-dis-fg);cursor:not-allowed; }
input {
  font-family:inherit;font-size:16px;background:transparent;color:var(--fg);
  border:none;border-bottom:1.5px solid var(--border);outline:none;
  padding:8px 0;width:100%;
}
.header {
  display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;
}
.header h1 {
  font-size:14px;font-weight:400;letter-spacing:0.1em;text-transform:uppercase;
}
.nav-link { font-size:12px;color:var(--fg-muted);text-decoration:none; }
.nav-sep { margin:0 4px;font-size:10px;vertical-align:1px;color:var(--fg-muted);opacity:0.5; }
.nav-link:hover { color:var(--fg); }
.back-link { font-size:12px;color:var(--fg-muted);text-decoration:none;margin-bottom:16px;display:inline-block; }
.back-link:hover { color:var(--fg); }
.coin-search {
  width:100%;padding:8px 0;font-size:16px;border:none;border-bottom:1px solid var(--border);
  outline:none;background:transparent;color:var(--fg);margin-bottom:16px;
}
.coin-search::placeholder { color:var(--input-ph); }

/* Gallery */
.coin-grid {
  display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;
}
.coin-card {
  border:1px solid var(--border);padding:16px;
  cursor:pointer;transition:background 0.15s, transform 0.15s;text-decoration:none;color:var(--fg);display:block;
}
.coin-card:hover { background:var(--surface-hover);transform:translateY(-1px); }
.coin-test { display:none; }
.coin-spam { display:none; }
.coin-spam.coin-spam-visible {
  display:block;position:relative;opacity:0.5;
  border-color:var(--red);
}
.coin-spam.coin-spam-visible::after {
  content:'Flagged as spam';position:absolute;top:6px;right:6px;
  font-size:9px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;
  color:var(--red);background:var(--status-error);padding:2px 6px;
}
.coin-inactive { display:none; }
.spam-toggle {
  cursor:pointer;text-decoration:underline;text-decoration-style:dotted;
  text-underline-offset:2px;
}
.spam-toggle:hover { color:var(--fg); }
.spam-btn {
  position:absolute;top:6px;right:6px;z-index:5;
  width:22px;height:22px;padding:0;margin:0;
  background:transparent;border:1px solid var(--border-muted);
  color:var(--fg-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.15s;
}
.coin-card:hover .spam-btn { opacity:1; }
.spam-btn:hover { background:var(--red);color:#fff;border-color:var(--red);opacity:1; }
.coin-card-head { display:flex;align-items:center;gap:10px;margin-bottom:10px; }
.coin-logo {
  width:40px;height:40px;border-radius:50%;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;
  font-size:16px;font-weight:700;background:var(--surface);
}
.coin-logo img { width:100%;height:100%;object-fit:cover; }
.coin-card-name { font-size:14px;font-weight:600; }
.coin-card-symbol { font-size:12px;color:var(--fg-muted); }
.coin-card-bar { height:4px;background:var(--border-muted);margin-top:8px;overflow:hidden; }
.coin-card-bar-fill { height:100%;background:var(--green);transition:width 0.3s; }
.coin-card-stat { font-size:11px;color:var(--fg-muted);margin-top:6px; }
.coin-card-mcap { font-size:11px;font-weight:600;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);color:var(--fg); }
.coin-card-mcap .usd { font-weight:400;color:var(--fg-muted); }
.coin-tpl-badge {
  display:inline-flex;align-items:center;vertical-align:middle;margin-left:4px;
  color:var(--fg);opacity:0.7;
}
.coin-tpl-badge svg { display:block; }
.coin-tpl-simple {
  font-size:9px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;
  padding:1px 4px;border-radius:3px;
  background:var(--surface);border:1px solid var(--border-muted);
  opacity:1;color:var(--fg-muted);
}
.coin-card-collector {
  position:relative;overflow:hidden;
}
.coin-card-collector::before {
  content:'';position:absolute;inset:0;
  background:url('https://content.wrappr.wtf/ipfs/bafybeiermzs5bmf3tcbkgzeygmlstfku5oybuhyskizaaxn7armzqly42m') top center / cover no-repeat;
  opacity:0.25;
  mask-image:linear-gradient(to bottom, #000 0%, transparent 85%);
  -webkit-mask-image:linear-gradient(to bottom, #000 0%, transparent 85%);
  pointer-events:none;
}
.coin-card-collector:hover::before { opacity:0.32; }

/* Stacked duplicates */
.coin-stack { position:relative;padding-bottom:4px;padding-right:4px; }
.coin-stack > .coin-card:first-of-type { position:relative;z-index:2;background:var(--bg); }
.coin-stack .coin-stacked {
  position:absolute;bottom:0;left:4px;right:0;z-index:1;
  height:100%;pointer-events:none;
  overflow:hidden;opacity:1;
}
.coin-stack .coin-stacked > * { visibility:hidden; }
.coin-stack .coin-stack-badge {
  position:absolute;bottom:10px;right:10px;z-index:3;
  font-size:10px;font-weight:600;padding:3px 8px;
  background:var(--btn-bg);color:var(--btn-fg);
  cursor:pointer;letter-spacing:0.03em;
}
.coin-stack .coin-stack-badge:hover { background:var(--btn-hover); }
.coin-stack.expanded .coin-stacked {
  position:relative;bottom:auto;left:0;right:0;
  height:auto;margin-top:-1px;pointer-events:auto;
  overflow:visible;
}
.coin-stack.expanded .coin-stacked > * { visibility:visible; }

/* Detail page */
.coin-banner {
  width:100%;height:180px;overflow:hidden;margin-bottom:-30px;
  background:var(--surface);border:1px solid var(--border);
}
.coin-banner img, .coin-banner video { width:100%;height:100%;object-fit:cover; }
.coin-detail-head {
  display:flex;align-items:flex-end;gap:16px;margin-bottom:20px;position:relative;z-index:1;
}
.coin-detail-logo {
  width:64px;height:64px;border-radius:50%;border:3px solid var(--bg);
  display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;
  font-size:24px;font-weight:700;background:var(--surface);
}
.coin-detail-logo img { width:100%;height:100%;object-fit:cover; }
.coin-detail-title h2 { font-size:18px;font-weight:600;margin:0;text-transform:none;letter-spacing:0; }
.coin-detail-title .coin-symbol-row { display:flex;align-items:center;gap:6px; }
.coin-detail-title .coin-symbol-row span { font-size:13px;color:var(--fg-muted); }
.coin-user-balance { margin-left:auto;font-size:12px;color:var(--fg-muted);white-space:nowrap; }
.coin-mcap-row { font-size:13px;color:var(--fg-muted);margin-bottom:12px;font-weight:500; }

.section-card {
  border:1px solid var(--border);padding:16px;margin-bottom:16px;
}
.section-title {
  font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--fg-muted);margin-bottom:12px;
}
.stat-row { display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:6px; }
.stat-label { color:var(--fg-muted); }
.stat-value { font-weight:600;overflow:hidden;text-overflow:ellipsis;min-width:0; }
.progress-bar { height:6px;background:var(--border-muted);overflow:hidden;margin:8px 0; }
.progress-fill { height:100%;transition:width 0.3s; }

/* Swap tile */
.swap-tile { position:relative; }
.swap-mode-tabs { display:flex;gap:6px;margin-bottom:14px; }
.swap-mode-tabs button {
  flex:1;padding:7px 0;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
  border:none;border-bottom:2px solid transparent;border-radius:0;
  background:transparent;color:var(--fg-muted);
  cursor:pointer;font-family:inherit;transition:color 0.15s,border-color 0.15s;margin:0;
}
.swap-mode-tabs button:hover { color:var(--fg); }
.swap-mode-tabs button.active { color:var(--fg);border-bottom-color:var(--fg); }
.swap-dir { display:flex;gap:6px;margin-bottom:14px; }
.swap-dir button {
  flex:1;padding:7px 0;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
  border:none;border-bottom:2px solid transparent;border-radius:0;
  background:transparent;color:var(--fg-muted);
  cursor:pointer;font-family:inherit;transition:color 0.15s,border-color 0.15s;margin:0;
}
.swap-dir button:hover { color:var(--fg); }
.swap-dir button.active { color:var(--fg);border-bottom-color:var(--fg); }
.swap-mode-content { display:none; }
.swap-mode-content.active { display:block; }
.sale-lp-note { font-size:11px;color:var(--fg-muted);margin-top:4px; }
.rq-estimate { font-size:14px;color:var(--fg);margin:12px 0;text-align:center; }
.rq-estimate small { font-size:11px;color:var(--fg-muted);display:block;margin-top:2px; }
.swap-section { margin-bottom:8px; }
.swap-section-head {
  display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;
}
.swap-section-head label { font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--fg-muted);margin:0;flex-shrink:0; }
.swap-balance { font-size:11px;color:var(--fg-muted);cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;text-align:right;margin:0 8px; }
.swap-balance:hover { color:var(--fg); }
.swap-pct-row { display:flex;gap:6px;margin-top:6px; }
.swap-pct-btn {
  flex:1;padding:4px 0;font-size:10px;font-weight:600;letter-spacing:0.05em;
  border:none;border-radius:0;background:var(--surface);color:var(--fg-muted);
  cursor:pointer;font-family:inherit;transition:background 0.15s,color 0.15s;
}
.swap-pct-btn:hover { background:var(--surface-hover);color:var(--fg); }
.swap-token-tag {
  display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:var(--fg);flex-shrink:0;
}
.swap-token-tag img { width:18px;height:18px;border-radius:50%;object-fit:cover; }
.swap-token-tag .eth-icon { width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center; }
.swap-section input {
  width:100%;padding:8px 0;font-size:22px;font-weight:400;font-family:inherit;
  border:none;border-bottom:1.5px solid var(--border);outline:none;background:transparent;color:var(--fg);
}
.swap-section input::placeholder { color:var(--input-ph); }
.swap-section input:focus { border-bottom-width:2.5px;margin-bottom:-1px; }
.swap-arrow-row { display:flex;justify-content:center;margin:2px 0 8px; }
.swap-arrow-btn {
  background:var(--bg);border:1px solid var(--border);width:32px;height:32px;
  display:inline-flex;align-items:center;justify-content:center;padding:0;margin:0;
  cursor:pointer;transition:transform 0.3s ease,background 0.2s,border-color 0.2s;
}
.swap-arrow-btn:hover { transform:rotate(180deg);background:var(--btn-bg);border-color:var(--btn-bg); }
.swap-arrow-btn:hover svg { stroke:var(--btn-fg); }
.swap-arrow-btn svg { stroke:var(--fg);transition:stroke 0.2s; }
.swap-quote { font-size:12px;color:var(--fg-muted);min-height:18px;margin-bottom:10px; }
.action-btn {
  width:100%;margin:0;padding:12px;font-size:13px;font-weight:600;letter-spacing:0.05em;
  text-transform:uppercase;cursor:pointer;background:var(--btn-bg);color:var(--btn-fg);
  border:none;font-family:inherit;transition:background 0.2s;
}
.action-btn:hover:not(:disabled) { background:var(--btn-hover); }
.action-btn:disabled { background:var(--btn-dis-bg);border:1px solid var(--btn-dis-border);color:var(--btn-dis-fg);cursor:not-allowed; }

/* Collapsible drawer (tap, chart) */
.drawer { border:1px solid var(--border);margin-bottom:16px;overflow:hidden; }
.drawer-toggle {
  display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;
  font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--fg-muted);
  background:transparent;border:none;width:100%;text-align:left;
}
.drawer-toggle:hover { background:var(--surface); }
.drawer-toggle .arrow { transition:transform 0.2s;font-size:10px; }
.drawer.open .drawer-toggle .arrow { transform:rotate(180deg); }
.drawer-body { display:none;padding:0 16px 16px; }
.drawer.open .drawer-body { display:block; }

/* Chart drawer body (special: aspect-ratio iframe instead of padded content) */
.chart-body { display:none;position:relative;width:100%;background:var(--surface); }
.drawer.open .chart-body { display:block; }
.chart-type-toggle {
  display:flex;gap:0;border-bottom:1px solid var(--border-muted);
}
.chart-type-toggle button {
  font-family:inherit;font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;
  padding:6px 14px;border:none;cursor:pointer;background:transparent;color:var(--fg-muted);
}
.chart-type-toggle button.active { background:var(--btn-bg);color:var(--btn-fg); }
.chart-type-toggle button:not(.active):hover { color:var(--fg); }
.chart-tf-toggle { display:none;gap:0;border-bottom:1px solid var(--border-muted); }
.chart-tf-toggle.show { display:flex; }
.chart-tf-toggle button {
  font-family:inherit;font-size:10px;font-weight:600;letter-spacing:0.05em;
  padding:4px 10px;border:none;cursor:pointer;background:transparent;color:var(--fg-dim);
}
.chart-tf-toggle button.active { color:var(--fg);text-decoration:underline;text-underline-offset:3px; }
.chart-tf-toggle button:not(.active):hover { color:var(--fg-muted); }
.chart-iframe-wrap { position:relative;width:100%;height:min(56.25vw, 400px); }
.chart-iframe-wrap iframe { position:absolute;top:0;left:0;width:100%;height:100%;border:none;background:var(--surface);color-scheme:light dark; }

/* Pool activity drawer */
.activity-body { display:none;padding:0; }
.drawer.open .activity-body { display:block; }
.activity-table { width:100%;border-collapse:collapse;font-size:12px; }
.activity-table th {
  text-align:left;padding:6px 10px;font-size:10px;font-weight:600;letter-spacing:0.05em;
  text-transform:uppercase;color:var(--fg-muted);border-bottom:1px solid var(--border-muted);
}
.activity-table td { padding:5px 10px;border-bottom:1px solid var(--border-muted);white-space:nowrap; }
.activity-table tr:last-child td { border-bottom:none; }
.activity-table .evt-buy { color:var(--green); }
.activity-table .evt-sell { color:var(--red); }
.activity-table .evt-liqadd { color:var(--green); }
.activity-table .evt-liqrem { color:var(--red); }
.activity-table .evt-type { font-weight:600;font-size:11px; }
.activity-table a { color:var(--fg-muted);font-size:11px; }
.activity-table a:hover { color:var(--fg); }
.activity-more {
  display:block;width:100%;padding:8px;font-size:11px;font-weight:600;letter-spacing:0.05em;
  text-transform:uppercase;color:var(--fg-muted);background:transparent;border:none;border-top:1px solid var(--border-muted);
  cursor:pointer;font-family:inherit;
}
.activity-more:hover { color:var(--fg);background:var(--surface); }
.activity-empty { padding:16px;text-align:center;font-size:12px;color:var(--fg-muted); }
.holder-row { display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border-muted);font-size:12px; }
.holder-row:last-child { border-bottom:none; }
.holder-addr { flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
.holder-addr a { color:var(--fg-muted);text-decoration:none; }
.holder-addr a:hover { color:var(--fg); }
.holder-tag { font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px;white-space:nowrap; }
.holder-tag-pool { background:rgba(59,130,246,0.15);color:#60a5fa; }
.holder-tag-dao { background:rgba(168,85,247,0.15);color:#c084fc; }
.holder-tag-badge { background:rgba(234,179,8,0.15);color:#facc15; }
.holder-shares { font-weight:600;white-space:nowrap; }
.holder-pct { color:var(--fg-muted);font-size:11px;white-space:nowrap; }

.desc-text { font-size:13px;line-height:1.6;color:var(--fg);white-space:pre-wrap;word-break:break-word; }
.socials-row { display:flex;gap:14px;flex-wrap:wrap;font-size:12px; }
.socials-row a { color:var(--fg-muted);text-decoration:none;display:inline-flex;align-items:center;gap:4px; }
.socials-row a:hover { color:var(--fg); }
.links-row { display:flex;gap:16px;flex-wrap:wrap;font-size:12px;margin-top:8px; }
.links-row a { color:var(--fg-muted); }
.links-row a:hover { color:var(--fg); }

/* Proposals */
.prop-item { padding:12px;border:1px solid var(--border-muted);border-radius:8px;margin-bottom:8px;background:var(--surface); }
.prop-head { display:flex;justify-content:space-between;align-items:flex-start;gap:8px; }
.prop-desc { font-size:13px;font-weight:500;flex:1;word-break:break-word; }
.prop-state { font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid;white-space:nowrap;font-weight:600; }
.prop-state.executed { border-color:var(--fg-dim);color:var(--fg-dim);background:var(--surface-hover); }
.prop-state.active { border-color:var(--green);color:var(--green);background:var(--status-success); }
.prop-state.succeeded,.prop-state.queued { border-color:var(--green);color:var(--green);background:var(--status-success); }
.prop-state.defeated,.prop-state.expired { border-color:var(--red);color:var(--red);background:var(--status-error); }
.prop-state.unopened { border-color:var(--fg-dim);color:var(--fg-dim); }
.prop-votes { display:flex;gap:12px;margin-top:6px;font-size:11px;color:var(--fg-muted); }
.prop-votes .for { color:var(--green); }
.prop-votes .against { color:var(--red); }
.prop-bar { height:4px;border-radius:2px;background:var(--border-muted);margin-top:6px;overflow:hidden;display:flex; }
.prop-bar-for { background:var(--green); }
.prop-bar-against { background:var(--red); }
.prop-bar-abstain { background:var(--fg-dim); }
.prop-meta { font-size:10px;color:var(--fg-dim);margin-top:4px; }
.prop-meta a { color:var(--fg-dim); }

.loading { text-align:center;padding:40px;color:var(--fg-muted);font-size:13px; }
@keyframes spin { to { transform:rotate(360deg); } }
.spinner {
  display:inline-block;width:14px;height:14px;border:2px solid var(--border-muted);
  border-top:2px solid var(--fg);border-radius:50%;animation:spin 0.8s linear infinite;
  vertical-align:middle;margin-right:8px;
}
/* Z-nav */
.z-nav { position:fixed; top:max(16px, env(safe-area-inset-top)); left:max(16px, env(safe-area-inset-left)); z-index:200; }
.z-nav-btn { background:none; border:none; cursor:pointer; opacity:0.5; transition:opacity 0.2s; padding:6px; margin:-6px; line-height:0; }
.z-nav-btn:hover, .z-nav.open .z-nav-btn { opacity:1; }
.z-nav-menu { display:none; position:absolute; top:36px; left:0; background:var(--bg); border:1px solid var(--border); padding:8px 0; min-width:140px; max-height:calc(100vh - 60px); overflow-y:auto; }
.z-nav.open .z-nav-menu { display:block; }
.z-nav-menu a { display:block; padding:6px 16px; font-size:13px; color:var(--fg); text-decoration:none; letter-spacing:0.05em; }
.z-nav-menu a:hover { background:var(--surface); }
.z-nav-menu a.active { opacity:0.35; pointer-events:none; }
.z-nav-menu .z-nav-sep { border-top:1px solid var(--border); margin:6px 0; }
/* Dark toggle */
.dark-toggle {
  position:fixed;bottom:max(20px, env(safe-area-inset-bottom, 0px));right:max(20px, env(safe-area-inset-right, 0px));
  border:none;cursor:pointer;padding:13px;margin:-13px;opacity:0.5;transition:opacity 0.2s;
  z-index:100;background:#000;border-radius:50%;width:40px;height:40px;background-clip:content-box;
}
:root.dark .dark-toggle { background:#fff; }
.dark-toggle:hover { opacity:1; }



/* Mobile */
@media (max-width: 600px) {
  body { padding:80px 16px 20px; }

];

let _userIsVerified = false;
let _spamSet = new Set();

// Load cached spam list synchronously (no RPC), then update in background
function loadSpamListCached() {
  try {
    const cached = localStorage.getItem('zfi_spam_cache');
    if (cached) {
      const c = JSON.parse(cached);
      _spamSet = new Set(c.addrs || []);
    }
  } catch {}
  return _spamSet;
}

async function loadSpamListFresh() {
  try {
    const cached = localStorage.getItem('zfi_spam_cache');
    let fromBlock = 21000000;
    let existing = new Set(_spamSet);
    if (cached) {
      try { fromBlock = (JSON.parse(cached).block || fromBlock) + 1; } catch {}
    }
    const latestBlock = await withRPC(async rpc => rpc.getBlockNumber());
    if (fromBlock > latestBlock) return _spamSet;
    const dao = await withRPC(async rpc => new ethers.Contract(ZORG_DAO, ZORG_CHAT_ABI, rpc));
    const CHUNK = 50000;
    // Parallelize chunk queries
    const chunks = [];
    for (let start = fromBlock; start <= latestBlock; start += CHUNK) {
      chunks.push([start, Math.min(start + CHUNK - 1, latestBlock)]);
    }
    const results = await Promise.all(chunks.map(([s, e]) =>
      dao.queryFilter(dao.filters.Message(), s, e).catch(() => [])
    ));
    for (const events of results) {
      for (const ev of events) {
        const text = ev.args?.text || '';
        const m = text.match(/<<<COIN_SPAM\s+address="(0x[0-9a-fA-F]{40})"\s*COIN_SPAM>>>/);
        if (m) existing.add(m[1].toLowerCase());
      }
    }
    _spamSet = existing;
    try {
      localStorage.setItem('zfi_spam_cache', JSON.stringify({ addrs: [...existing], block: latestBlock }));
    } catch {}
    return _spamSet;
  } catch {
    return _spamSet;
  }
}

async function flagCoinAsSpam(coinAddr) {
  const s = await connectWallet();
  if (!s) return;
  if (!_userIsVerified) { alert('You need 100k+ ZORG shares to flag coins.'); return; }
  if (!confirm(`Flag ${coinAddr} as spam in the ZORG DAO chat?`)) return;
  try {
    const dao = new ethers.Contract(ZORG_DAO, ZORG_CHAT_ABI, s);
    const msg = `<<<COIN_SPAM address="${coinAddr}" COIN_SPAM>>>`;
    const tx = await dao.chat(msg);
    await tx.wait();
    _spamSet.add(coinAddr.toLowerCase());
    try {
      const cached = localStorage.getItem('zfi_spam_cache');
      if (cached) {
        const c = JSON.parse(cached);
        c.addrs = [...new Set([...(c.addrs || []), coinAddr.toLowerCase()])];
        localStorage.setItem('zfi_spam_cache', JSON.stringify(c));
      }
    } catch {}
    // Hide the card immediately
    const card = document.querySelector(`.coin-card[data-addr="${coinAddr.toLowerCase()}"]`);
    if (card) { card.classList.add('coin-spam'); card.style.display = 'none'; }
    // Update spam count display
    const countEl = document.getElementById('spamCount');
    if (countEl) {
      const cur = parseInt(countEl.dataset.count || '0') + 1;
      countEl.dataset.count = cur;
      countEl.innerHTML = `<span class="spam-toggle" onclick="toggleSpamCoins()">${cur} community-flagged coin${cur > 1 ? 's' : ''} hidden</span>`;
      countEl.style.display = '';
    }
  } catch(e) {
    if (e.code !== 'ACTION_REJECTED' && !(e.message||'').includes('user rejected')) {
      alert('Failed to flag: ' + (e.shortMessage || e.message || ''));
    }
  }
}

let rpcIdx = 0;
function getRPC() {
  return new ethers.JsonRpcProvider(RPCS[rpcIdx % RPCS.length], 1, { staticNetwork: true });
}
async function withRPC(fn) {
  for (let i = 0; i < RPCS.length; i++) {
    try {
      const rpc = new ethers.JsonRpcProvider(RPCS[(rpcIdx + i) % RPCS.length], 1, { staticNetwork: true });
      const result = await fn(rpc);
      rpcIdx = (rpcIdx + i) % RPCS.length;
      return result;
    } catch(e) { if (i === RPCS.length - 1) throw e; }
  }
}

function resolveIPFS(uri) {
  if (!uri) return '';
  if (uri.startsWith('ipfs://')) return IPFS_GW + uri.slice(7);
  return uri;
}

async function fetchMetadata(contractURI) {
  if (!contractURI) return {};
  try {
    const url = resolveIPFS(contractURI);
    if (url.startsWith('data:')) {
      const json = url.split(',').slice(1).join(',');
      if (url.startsWith('data:application/json;base64,')) return JSON.parse(atob(json));
      return JSON.parse(decodeURIComponent(json));
    }
    const res = await fetch(url);
    return await res.json();
  } catch { return {}; }
}

function computePoolId(token0, token1, id0, id1, fee) {

  const [sId0, sId1] = token0.toLowerCase() < token1.toLowerCase() ? [id0, id1] : [id1, id0];

  )));

const INDEXER = 'https://coinchan-indexer-production.up.railway.app';

const LOCKUP_CHECK_ABI = ['function lockups(bytes32) view returns (uint256)'];
const COIN_SUPPLY_TOTAL = 1_000_000_000n;

async function fetchOpsLockup(sharesAddr, opsAddr, metadata) {
  // Derive team allocation from metadata or try common defaults
  const teamBpsList = metadata.teamBps ? [metadata.teamBps] : [1500, 1000, 2000, 2500, 500, 3000];
  try {
    // Get lockup hashes from indexer (cap at 10 most recent)
    const res = await fetch(INDEXER + '/graphql', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        query: `query ($address: String!) {
          account(address: $address) {
            lockupReceived(limit: 10) { items { id } }
          }
        }`,
        variables: { address: opsAddr.toLowerCase() }
      })
    });
    const { data } = await res.json();
    const items = data?.account?.lockupReceived?.items || [];
    if (items.length === 0) return null;
    // Batch: read all unlockTimes in one RPC round via Promise.all
    const hashes = items.map(i => i.id);
    const unlockTimes = await withRPC(async rpc => {
      const zamm = new ethers.Contract(ZAMM, LOCKUP_CHECK_ABI, rpc);
      return await Promise.all(hashes.map(h => zamm.lockups(h).catch(() => 0n)));
    });
    // Precompute hashes for each teamBps candidate (pure CPU, no RPC)
    const abiCoder = ethers.AbiCoder.defaultAbiCoder();
    for (let i = 0; i < hashes.length; i++) {
      const unlockTime = unlockTimes[i];
      if (unlockTime === 0n) continue;
      for (const tb of teamBpsList) {
        const teamSupply = (COIN_SUPPLY_TOTAL * BigInt(tb)) / 10000n;
        const teamSupplyWei = ethers.parseEther(teamSupply.toString());
        const encoded = abiCoder.encode(
          ['address', 'address', 'uint256', 'uint256', 'uint256'],
          [sharesAddr, opsAddr, 0n, teamSupplyWei, unlockTime]
        );
        const computed = ethers.keccak256(encoded);
        if (computed.toLowerCase() === hashes[i].toLowerCase()) {
          return { amount: teamSupplyWei.toString(), unlockTime: unlockTime.toString(), coinId: '0' };
        }
      }
    }
    return null;
  } catch { return null; }
}

function fmtWei(wei) {
  if (!wei || wei === '0') return '0';
  const s = wei.padStart(19, '0');
  const whole = s.slice(0, s.length - 18) || '0';
  const frac = s.slice(s.length - 18, s.length - 14);
  return whole + '.' + frac;
}

function fmtAge(ts) {
  const diff = Math.floor(Date.now() / 1000) - ts;
  if (diff < 60) return diff + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function activityRow(e) {
  const cls = 'evt-' + e.type.toLowerCase();
  const label = { BUY: 'Buy', SELL: 'Sell', LIQADD: '+LP', LIQREM: '-LP' }[e.type] || e.type;
  const ethAmt = (e.type === 'BUY' || e.type === 'LIQADD') ? fmtWei(e.amount0_in) : fmtWei(e.amount0_out);
  const tokenAmt = (e.type === 'BUY' || e.type === 'LIQREM') ? fmtWei(e.amount1_out) : fmtWei(e.amount1_in);
  const maker = e.maker ? e.maker.slice(0, 6) + '\u2026' + e.maker.slice(-4) : '-';
  const txShort = e.txhash.slice(0, 6) + '\u2026' + e.txhash.slice(-4);
  return `<tr class="${cls}">
    <td>${fmtAge(e.timestamp)}</td>
    <td class="evt-type">${label}</td>
    <td>${ethAmt}</td>
    <td>${tokenAmt}</td>
    <td><a href="https://etherscan.io/address/${escText(e.maker)}" target="_blank">${maker}</a></td>
    <td><a href="https://etherscan.io/tx/${escText(e.txhash)}" target="_blank">${txShort}</a></td>
  </tr>`;
}

function renderActivityTable(events, append) {
  const content = $('activityContent');
  if (!content) return;
  if (!events.length && !append) {
    content.innerHTML = '<div class="activity-empty">No activity yet</div>';
    return;
  }
  const rows = events.map(activityRow).join('');
  if (append) {
    const tbody = content.querySelector('tbody');
    if (tbody) tbody.insertAdjacentHTML('beforeend', rows);
  } else {
    content.innerHTML = `<table class="activity-table">
      <thead><tr><th>Age</th><th>Type</th><th>ETH</th><th>Token</th><th>Maker</th><th>Tx</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>` + (_activityCursor ? `<button class="activity-more" onclick="loadMoreActivity()">Load More</button>` : '');
  }
}

async function loadLpProviders(poolId) {
  const content = $('lpListContent');
  if (!content) return;
  content.innerHTML = `<div class="activity-empty">${zfiLoadingSVG(32)} Loading...</div>`;
  try {
    const allEvents = [];
    let cursor = null;
    for (;;) {
      let url = `${INDEXER}/api/events?poolId=${poolId}&limit=500`;
      if (cursor) url += `&before=${cursor}`;
      const res = await fetch(url);
      const json = await res.json();
      for (const e of json.data) {
        if (e.type === 'LIQADD' || e.type === 'LIQREM') allEvents.push(e);
      }
      cursor = json.nextCursor || null;
      if (!cursor) break;
    }
    // Aggregate net liquidity per address
    const map = {};
    for (const e of allEvents) {
      const addr = e.maker;
      if (!map[addr]) map[addr] = { addr, net: 0n, lastTs: 0 };
      const amt = BigInt(e.type === 'LIQADD' ? e.amount0_in : e.amount0_out);
      map[addr].net += e.type === 'LIQADD' ? amt : -amt;
      if (e.timestamp > map[addr].lastTs) map[addr].lastTs = e.timestamp;
    }
    const providers = Object.values(map).filter(p => p.net > 0n).sort((a, b) => a.net > b.net ? -1 : a.net < b.net ? 1 : 0);
    renderLpTable(providers);
  } catch(e) {
    content.innerHTML = '<div class="activity-empty">Failed to load LP data</div>';
  }
}

}

async function loadHolders(daoAddr) {
  const content = $('holdersContent');
  if (!content) return;
  content.innerHTML = `<div class="activity-empty">${zfiLoadingSVG(32)} Loading...</div>`;
  try {
    const result = await withRPC(async rpc => {
      const helper = new ethers.Contract(VIEW_HELPER, GET_DAO_FULL_ABI, rpc);
      return await helper.getDAOWithDAICO(daoAddr, 0, 0, 0, 0, [], [ZERO]);
    });
    const members = result.base.members;
    if (!members || members.length === 0) {
      content.innerHTML = '<div class="activity-empty">No shareholders yet</div>';
      return;
    }
    const totalSupply = result.base.supplies.sharesTotalSupply + result.base.supplies.lootTotalSupply;
    const zammLower = ZAMM.toLowerCase();
    const daoLower = daoAddr.toLowerCase();

    // Sort by shares descending, filter zero balances
    const sorted = [...members]
      .filter(m => (m.shares || 0n) + (m.loot || 0n) > 0n)
      .sort((a, b) => {
        const aTotal = (a.shares || 0n) + (a.loot || 0n);
        const bTotal = (b.shares || 0n) + (b.loot || 0n);
        return bTotal > aTotal ? 1 : bTotal < aTotal ? -1 : 0;
      });

    if (sorted.length === 0) {
      content.innerHTML = '<div class="activity-empty">No shareholders yet</div>';
      return;
    }

    // Render immediately with short addresses
    function renderHolders(names) {
      let html = '';
      sorted.forEach((m, i) => {
        const addr = m.account;
        const addrLower = addr.toLowerCase();
        const total = (m.shares || 0n) + (m.loot || 0n);
        const pctNum = totalSupply > 0n ? Number(total * 10000n / totalSupply) / 100 : 0;
        const pct = pctNum.toFixed(1);
        const short = addr.slice(0, 6) + '\u2026' + addr.slice(-4);
        const displayName = names[i] || short;

        let tag = '';
        if (addrLower === zammLower) tag = '<span class="holder-tag holder-tag-pool">Pool</span>';
        else if (addrLower === daoLower) tag = '<span class="holder-tag holder-tag-dao">DAO</span>';

        const pctColor = pctNum >= 10 ? 'var(--green)' : pctNum >= 1 ? 'var(--fg)' : 'var(--fg-muted)';

        html += `<div class="holder-row">
          <div class="holder-addr"><a href="https://etherscan.io/address/${addr}" target="_blank" title="${addr}">${escText(displayName)}</a></div>
          ${tag}
          <div class="holder-shares">${fmtShares(total)}</div>
          <div class="holder-pct" style="color:${pctColor}">${pct}%</div>
        </div>`;
      });
      content.innerHTML = html;
    }

    // Show immediately with addresses
    const names = new Array(sorted.length).fill('');
    renderHolders(names);

    // Batch resolve .wei names via multicall
    try {
      const weinsIface = new ethers.Interface(WEINS_ABI);
      const calls = sorted.map(m => ({
        target: WEINS, allowFailure: true,
        callData: weinsIface.encodeFunctionData('reverseResolve', [m.account])
      }));
      const results = await withRPC(async rpc => {
        const mc = new ethers.Contract(MC3, MC3_ABI, rpc);
        return await mc.aggregate3(calls);
      });
      const needENS = [];
      for (let i = 0; i < sorted.length; i++) {
        if (results[i].success) {
          try {
            const decoded = weinsIface.decodeFunctionResult('reverseResolve', results[i].returnData);
            if (decoded[0]) { names[i] = decoded[0].toLowerCase(); continue; }
          } catch {}
        }
        needENS.push(i);
      }
      renderHolders(names);

      // Backfill ENS for addresses without .wei names
      if (needENS.length > 0) {
        const ensProvider = new ethers.JsonRpcProvider(RPCS[0], 1, { staticNetwork: true });
        const ensPromises = needENS.map(i =>
          ensProvider.lookupAddress(sorted[i].account).catch(() => null)
        );
        const ensResults = await Promise.all(ensPromises);
        let changed = false;
        ensResults.forEach((name, j) => {
          if (name) { names[needENS[j]] = name; changed = true; }
        });
        if (changed) renderHolders(names);
      }
    } catch (e) {
      console.warn('Name resolution failed:', e);
    }
  } catch (e) {
    console.error('loadHolders error:', e);
    content.innerHTML = '<div class="activity-empty">Failed to load shareholders</div>';
  }
}

async function loadProposals(daoAddr) {
  const content = $('proposalsContent');
  if (!content) return;
  content.innerHTML = `<div class="activity-empty">${zfiLoadingSVG(32)} Loading...</div>`;
  try {
    const PROP_ABI = [
      'function getDAOWithDAICO(address dao, uint256 propStart, uint256 propCount, uint256 msgStart, uint256 msgCount, address[] treasuryTokens, address[] tribTokens) view returns (tuple(tuple(address dao, tuple(string,string,string,address,address,address,address) meta, tuple(uint96,uint96,uint96,uint64,uint64,uint16,bool,uint256,uint256,address) gov, tuple(uint256,uint256,uint256,uint256) supplies, tuple(tuple(address,uint256)[]) treasury, tuple(address,uint256,uint256,uint16,uint256,address[],uint32[])[] members, tuple(uint256 id, address proposer, uint8 state, uint48 snapshotBlock, uint64 createdAt, uint64 queuedAt, uint256 supplySnapshot, uint96 forVotes, uint96 againstVotes, uint96 abstainVotes, tuple(bool,address,uint256,bool,uint8,uint256,uint256) futarchy, tuple(address,uint8,uint256)[] voters)[] proposals, tuple(uint256 index, string text)[] messages) base, tuple(address,uint256,uint256,address,uint40,uint256,uint256,uint256,uint256,uint16,uint16,uint256)[] sales, tuple(address,address,uint128,uint64,uint256,uint256,uint256,uint256) tap))'
    ];
    const [result, daoConfig] = await withRPC(async rpc => {
      const helper = new ethers.Contract(VIEW_HELPER, PROP_ABI, rpc);
      const moloch = new ethers.Contract(daoAddr, ['function config() view returns (uint64)'], rpc);
      return Promise.all([
        helper.getDAOWithDAICO(daoAddr, 0, 50, 0, 200, [], [ZERO]),
        moloch.config()
      ]);
    });
    const proposals = result.base.proposals || [];
    const messages = result.base.messages || [];
    const currentConfig = Number(daoConfig);

    if (proposals.length === 0) {
      content.innerHTML = '<div class="activity-empty">No proposals yet</div>';
      return;
    }

    // Decode proposal messages to get descriptions
    function decodePropMsg(text) {
      const m = text.match(/<<<PROPOSAL_DATA\n([\s\S]*?)\nPROPOSAL_DATA>>>/);
      if (!m) return null;
      try {
        const d = JSON.parse(m[1]);
        if (d.type === 'PROPOSAL' && /^0x[0-9a-fA-F]{64}$/.test(d.nonce)) return d;
      } catch {}
      return null;
    }

    function computePropId(op, to, value, data, nonce, cfg) {
      const ac = new ethers.AbiCoder();
      const dh = ethers.keccak256(data);
      const enc = ac.encode(
        ['address','uint8','address','uint256','bytes32','bytes32','uint256'],
        [daoAddr, op, to, value, dh, nonce, cfg]
      );
      return BigInt(ethers.keccak256(enc));
    }

    // Build verification map
    const verMap = new Map();
    for (const msg of messages) {
      const pd = decodePropMsg(msg.text);
      if (!pd) continue;
      try {
        for (let c = currentConfig; c >= 0; c--) {
          const id = computePropId(pd.op, pd.to, BigInt(pd.value), pd.data, pd.nonce, BigInt(c));
          if (!verMap.has(id.toString())) verMap.set(id.toString(), pd.description);
        }
      } catch {}
    }

    const STATES = ['Unopened','Active','Queued','Succeeded','Defeated','Expired','Executed'];
    // Reverse to show newest first
    const sorted = [...proposals].reverse();

    let html = '';
    for (const p of sorted) {
      const id = p.id;
      const proposer = p.proposer;
      const state = Number(p.state);
      const forV = p.forVotes;
      const againstV = p.againstVotes;
      const abstainV = p.abstainVotes;

      const stateText = STATES[state] || `State ${state}`;
      const stateClass = stateText.toLowerCase();
      const desc = verMap.get(id.toString()) || `Proposal`;
      const shortId = id.toString().slice(0, 10) + '...';

      const forF = parseFloat(ethers.formatUnits(forV, 18));
      const againstF = parseFloat(ethers.formatUnits(againstV, 18));
      const abstainF = parseFloat(ethers.formatUnits(abstainV, 18));
      const total = forF + againstF + abstainF;
      const forPct = total > 0 ? forF / total * 100 : 0;
      const againstPct = total > 0 ? againstF / total * 100 : 0;
      const abstainPct = total > 0 ? abstainF / total * 100 : 0;

      const proposerShort = proposer ? `${proposer.slice(0,6)}...${proposer.slice(-4)}` : '';

      html += `<div class="prop-item">
        <div class="prop-head">
          <div class="prop-desc">${escText(desc)}</div>
          <span class="prop-state ${stateClass}">${stateText}</span>
        </div>
        ${total > 0 ? `<div class="prop-bar"><div class="prop-bar-for" style="width:${forPct}%"></div><div class="prop-bar-against" style="width:${againstPct}%"></div><div class="prop-bar-abstain" style="width:${abstainPct}%"></div></div>` : ''}
        <div class="prop-votes">
          <span><span class="for">For</span> ${forF.toLocaleString(undefined,{maximumFractionDigits:0})}</span>
          <span><span class="against">Against</span> ${againstF.toLocaleString(undefined,{maximumFractionDigits:0})}</span>
          <span>Abstain ${abstainF.toLocaleString(undefined,{maximumFractionDigits:0})}</span>
        </div>
        <div class="prop-meta">
          <span title="${id.toString()}">${shortId}</span>
          ${proposerShort ? ` &middot; <a href="https://etherscan.io/address/${proposer}" target="_blank">${proposerShort}</a>` : ''}
        </div>
      </div>`;
    }

    html += `<div style="text-align:center;margin-top:8px"><a href="../dao/#/dao/1/${daoAddr}" style="font-size:11px;color:var(--fg-muted)">Vote & manage proposals in DAO page</a></div>`;
    content.innerHTML = html;
  } catch (e) {
    console.error('loadProposals error:', e);
    content.innerHTML = '<div class="activity-empty">Failed to load proposals</div>';
  }
}

function pctBar(pct, color) {
  color = color || 'var(--green)';
  return `<div class="progress-bar"><div class="progress-fill" style="width:${Math.min(pct,100).toFixed(1)}%;background:${color}"></div></div>`;
}

function fmtETH(wei) {
  const v = Number(ethers.formatEther(wei));
  return fmtNum(v) + ' ETH';
}
function fmtNum(v) {
  if (v >= 1) return v.toFixed(4);
  if (v >= 0.001) return v.toFixed(6);
  if (v >= 0.000001) return v.toFixed(8);
  if (v > 0) return v.toExponential(2);
  return '0';
}

function fmtShares(wei) {
  const v = Number(ethers.formatEther(wei));
  if (v >= 1e6) return (v / 1e6).toFixed(2) + 'M';
  if (v >= 1e3) return (v / 1e3).toFixed(1) + 'K';
  return v.toLocaleString(undefined, { maximumFractionDigits: 0 });
}

function fmtMcap(ethVal) {
  if (ethVal >= 1000) return (ethVal / 1000).toFixed(1) + 'K ETH';
  if (ethVal >= 1) return ethVal.toFixed(2) + ' ETH';
  if (ethVal >= 0.01) return ethVal.toFixed(4) + ' ETH';
  return ethVal.toFixed(6) + ' ETH';
}

function fmtUsd(val) {
  if (val >= 1e6) return '$' + (val / 1e6).toFixed(2) + 'M';
  if (val >= 1e3) return '$' + (val / 1e3).toFixed(1) + 'K';
  if (val >= 1) return '$' + val.toFixed(2);
  return '$' + val.toFixed(2);
}

let _ethUsdTs = 0;

    const activityPromise = activityCached ? Promise.resolve(null) :
      fetch(INDEXER + '/graphql', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: '{ pools(limit: 1000) { items { token0 token1 updatedAt } } }' })
      }).then(r => r.json()).catch(() => null);

    const [allMetadata, mcResults, ethUsd, activityGql] = await Promise.all([
      Promise.all(filtered.map(d => fetchMetadata(d.meta.contractURI))),
      withRPC(async rpc => {
        const mc = new ethers.Contract(MC3, MC3_ABI, rpc);
        return await mc.aggregate3(poolCalls);
      }).catch(() => poolCalls.map(() => ({ success: false }))),
      getEthUsd(),
      activityPromise
    ]);

    // Process activity results if freshly fetched
    if (activityGql && !activityCached) {
      const pools = activityGql?.data?.pools?.items || [];
      for (const p of pools) {
        const token = (p.token1 && p.token1 !== '0x0000000000000000000000000000000000000000') ? p.token1
                    : (p.token0 && p.token0 !== '0x0000000000000000000000000000000000000000') ? p.token0
                    : null;
        if (!token) continue;
        const key = token.toLowerCase();
        const ts = Number(p.updatedAt);
        if (!activityMap[key] || ts > activityMap[key]) activityMap[key] = ts;
      }
      activityMap._ts = Date.now();
      try { localStorage.setItem(ACTIVITY_CACHE_KEY, JSON.stringify(activityMap)); } catch {}
    }

    // Extract pool results (first N entries) and ZORG balance (last entry if wallet connected)
    const poolResults = mcResults.slice(0, filtered.length);
    if (_connectedAddress && mcResults.length > filtered.length) {
      const zorgResult = mcResults[filtered.length];
      try {
        const bal = zorgResult.success ? erc20I.decodeFunctionResult('balanceOf', zorgResult.returnData)[0] : 0n;
        _userIsVerified = bal >= ZORG_VERIFY_THRESHOLD;
      } catch { _userIsVerified = false; }
    }
    if (gen !== _renderGen) return;

    const cards = [];
    let testCount = 0;
    let lowMcapCount = 0;
    let spamCount = 0;
    let inactiveCount = 0;
    for (let i = 0; i < filtered.length; i++) {
      const d = filtered[i];
      const md = allMetadata[i];
      const sale = d.sales && d.sales.length > 0 ? d.sales[0] : null;

      let salePct = 0;
      if (sale && sale.totalSupply > 0n) {
        const saleTeamBps = md && md.teamBps ? BigInt(md.teamBps) : 0n;
        const saleAlloc = saleTeamBps > 0n ? sale.totalSupply * (10000n - saleTeamBps) / 10000n : sale.totalSupply;
        const soldShares = saleAlloc > sale.remainingSupply ? saleAlloc - sale.remainingSupply : 0n;
        if (saleAlloc > 0n) salePct = Number((soldShares * 10000n) / saleAlloc) / 100;
      }

      const now = BigInt(Math.floor(Date.now() / 1000));
      const saleActive = sale && sale.remainingSupply > 0n && sale.allowance > 0n && sale.forAmt > 0n && (sale.deadline === 0n || now <= BigInt(sale.deadline));

      // Market cap (circulating): price * circulating supply
      // Circulating = total - unsold - team locked
      let mcapETH = 0;
      let poolR0 = 0n;
      let poolR1 = 0n;
      const pr = poolResults[i];
      if (pr && pr.success) {
        try {
          const decoded = zammI.decodeFunctionResult('pools', pr.returnData);
          poolR0 = decoded[0];
          poolR1 = decoded[1];
        } catch(e) {}
      }
      const coinTotalSupply = sale ? Number(ethers.formatEther(sale.totalSupply)) : Number(COIN_SUPPLY_TOTAL);
      const teamBps = md && md.teamBps ? md.teamBps : 0;
      const teamLocked = teamBps > 0 ? coinTotalSupply * teamBps / 10000 : 0;
      const unsold = sale ? Number(ethers.formatEther(sale.remainingSupply)) : 0;
      const circulating = coinTotalSupply - unsold - teamLocked;
      // Price: pool spot if sale ended or pool is deep, else sale price
      const lpTokens = Number(ethers.formatEther(poolR1));
      const hasPool = poolR0 > 0n && poolR1 > 0n;
      const poolDeep = hasPool && lpTokens > coinTotalSupply * 0.01;
      const usePool = hasPool && (!saleActive || poolDeep);
      if (circulating > 0) {
        if (usePool) {
          mcapETH = (Number(ethers.formatEther(poolR0)) / lpTokens) * circulating;
        } else if (sale && sale.tribAmt > 0n && sale.forAmt > 0n) {
          mcapETH = (Number(ethers.formatEther(sale.tribAmt)) / Number(ethers.formatEther(sale.forAmt))) * circulating;
        }
      }
      const mcapDisplay = mcapETH > 1e-6 ? fmtMcap(mcapETH) : '';
      const mcapUsd = mcapETH > 1e-6 && ethUsd > 0 ? fmtUsd(mcapETH * ethUsd) : '';

      const cardName = (md.name || d.meta.name || '').toLowerCase();
      const cardSym = (md.symbol || d.meta.symbol || '').toLowerCase();
      const cardAddr = d.dao.toLowerCase();
      const isTest = cardName === 'test';
      if (isTest) testCount++;
      if (!isTest && mcapETH < 0.05) { lowMcapCount++; continue; }
      const isSpam = _spamSet.has(cardAddr);
      if (isSpam) spamCount++;
      const spamBtnHTML = _userIsVerified && !isSpam ? `<button class="spam-btn" title="Flag as spam" onclick="event.preventDefault();event.stopPropagation();flagCoinAsSpam('${cardAddr}')"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>` : '';
      const isCollector = md && md.type === 'fw-collector';

      // Determine if coin is inactive (no trades in last 3 days)
      let isInactive = false;
      if (hasPool && !isSpam) {
        const tokenKey = d.meta.sharesToken.toLowerCase();
        const updatedAtMs = activityMap[tokenKey];
        // Only mark inactive if we have a real updatedAt that's older than 3 days
        if (typeof updatedAtMs === 'number' && updatedAtMs > 0 && (Date.now() - updatedAtMs) > INACTIVE_MS) {
          isInactive = true;
          inactiveCount++;
        }
      }

      const cardHTML = `
        <a href="#${d.dao}" class="coin-card${isCollector ? ' coin-card-collector' : ''}${isTest ? ' coin-test' : ''}${isSpam ? ' coin-spam' : ''}${isInactive ? ' coin-inactive' : ''}" data-name="${escText(cardName)}" data-symbol="${escText(cardSym)}" data-addr="${cardAddr}" style="position:relative">
          ${spamBtnHTML}
          <div class="coin-card-head">
            <div class="coin-logo">${logoHTML(d.meta, md)}</div>
            <div>
              <div class="coin-card-name">${escText(d.meta.name || 'Unnamed')}</div>
              <div class="coin-card-symbol">$${escText(d.meta.symbol || '???')}${md && md.type === 'fw-collector' ? `<span class="coin-tpl-badge coin-tpl-simple" title="FW S02 collector DAO &middot; NFT vault &middot; ragequitable">collect</span>` : md && (md.launchType === 'ez' || md.launchType === 'simple') ? `<span class="coin-tpl-badge coin-tpl-simple" title="ez launch &middot; ${md.lpBps ? (md.lpBps/100) + '% LP' : '80% LP'} &middot; ragequitable treasury &middot; no ops &middot; no tap">ez</span>` : md && md.launchType === 'fund' ? `<span class="coin-tpl-badge coin-tpl-simple" title="fund launch &middot; ops allocation &middot; tap vesting &middot; governance">fund</span>` : md && md.template ? `<span class="coin-tpl-badge" title="${escText(md.template)} template"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span>` : ''}</div>
            </div>
          </div>
          ${isCollector && !saleActive ? '' : `<div class="coin-card-bar"><div class="coin-card-bar-fill" style="width:${Math.min(salePct,100).toFixed(1)}%"></div></div>`}
          <div class="coin-card-stat">${saleActive ? `${salePct.toFixed(1)}% sold` : isCollector ? '<span style="color:var(--fg-muted)">Collector DAO</span>' : 'Sale ended'}</div>
          ${mcapDisplay ? `<div class="coin-card-mcap">MCap ${mcapDisplay}${mcapUsd ? ` <span class="usd">${mcapUsd}</span>` : ''}</div>` : ''}
        </a>
      `;
      cards.push({ html: cardHTML, key: cardName + '|' + cardSym, mcap: mcapETH, r0: poolR0, poolDeep, saleActive, isTest, isSpam, isInactive, isCollector });
    }

    // Group by name|symbol, stack duplicates (exclude spam/inactive from grouping)
    const groups = new Map();
    const spamCards = [];
    const inactiveCards = [];
    for (const c of cards) {
      if (c.isSpam) { spamCards.push(c); continue; }
      if (c.isInactive) { inactiveCards.push(c); continue; }
      if (!groups.has(c.key)) groups.set(c.key, []);
      groups.get(c.key).push(c);
    }
    let stackedCount = 0;
    let grid = '';
    const sortedGroups = [...groups.values()];
    for (const group of sortedGroups) group.sort((a, b) => b.mcap - a.mcap);
    // Collector DAOs first, then finalized by liquidity, then in-sale by mcap
    sortedGroups.sort((a, b) => {
      const aTop = a[0], bTop = b[0];
      if (aTop.isCollector !== bTop.isCollector) return aTop.isCollector ? -1 : 1;
      const aFinalized = !aTop.saleActive;
      const bFinalized = !bTop.saleActive;
      if (aFinalized !== bFinalized) return aFinalized ? -1 : 1;
      if (aFinalized) return aTop.r0 > bTop.r0 ? -1 : aTop.r0 < bTop.r0 ? 1 : 0;
      return bTop.mcap - aTop.mcap;
    });
    for (const group of sortedGroups) {
      if (group.length === 1) {
        grid += group[0].html;
      } else {
        const extra = group.length - 1;
        stackedCount += extra;
        grid += `<div class="coin-stack">`;
        grid += `<span class="coin-stack-badge" onclick="event.preventDefault();toggleStack(this)">+${extra} more</span>`;
        grid += group[0].html;
        for (let j = 1; j < group.length; j++) {
          grid += group[j].html.replace('class="coin-card', 'class="coin-card coin-stacked');
        }
        grid += `</div>`;
      }
    }
    // Append inactive cards individually (hidden by CSS, no stacking)
    for (const c of inactiveCards) grid += c.html;
    // Append spam cards individually (hidden by CSS, no stacking)
    for (const c of spamCards) grid += c.html;

    app.innerHTML = `
      <div class="header">
        <h1>Coins <span style="font-weight:400;color:var(--fg-muted)">(${filtered.length - testCount})</span></h1>
        <div><a href="../#coin" class="nav-link">Launch</a><span class="nav-sep">&middot;</span><a href="../" class="nav-link">Swap</a><span class="nav-sep">&middot;</span><a href="../dao/" class="nav-link">DAO</a></div>
      </div>
      <input type="text" class="coin-search" id="coinSearch" placeholder="Search by name, symbol, or address..." oninput="filterCoins()">
      <div class="coin-grid" id="coinGrid">${grid}</div>
      ${inactiveCount > 0 ? `<div style="text-align:center;font-size:11px;color:var(--fg-muted);margin-top:16px"><span class="spam-toggle" onclick="toggleInactiveCoins()">${inactiveCount} inactive coin${inactiveCount > 1 ? 's' : ''} hidden</span></div>` : ''}
      ${spamCount > 0 ? `<div id="spamCount" data-count="${spamCount}" style="text-align:center;font-size:11px;color:var(--fg-muted);margin-top:16px"><span class="spam-toggle" onclick="toggleSpamCoins()">${spamCount} community-flagged coin${spamCount > 1 ? 's' : ''} hidden</span></div>` : `<div id="spamCount" data-count="0" style="display:none;text-align:center;font-size:11px;color:var(--fg-muted);margin-top:16px"></div>`}
      ${lowMcapCount > 0 ? `<div style="text-align:center;font-size:11px;color:var(--fg-muted);margin-top:16px">${lowMcapCount} low-liquidity coin${lowMcapCount > 1 ? 's' : ''} hidden</div>` : ''}
    `;
  } catch(e) {
    app.innerHTML = `
      <div class="header">
        <h1>Coins</h1>
        <div><a href="../" class="nav-link">Swap</a> &middot; <a href="../dao/" class="nav-link">DAO</a></div>
      </div>
      <div class="loading">Failed to load coins: ${escText(e.message || '')}</div>
    `;
  }
}

function toggleStack(el) {
  el.closest('.coin-stack').classList.toggle('expanded');
}

function filterCoins() {
  const q = ($('coinSearch')?.value || '').toLowerCase().trim();
  const stacks = document.querySelectorAll('#coinGrid .coin-stack');
  stacks.forEach(s => {
    if (q) s.classList.add('expanded');
    else s.classList.remove('expanded');
  });
  const cards = document.querySelectorAll('#coinGrid .coin-card');
  cards.forEach(c => {
    const isTest = c.classList.contains('coin-test');
    const isSpam = c.classList.contains('coin-spam');
    const isSpamVisible = c.classList.contains('coin-spam-visible');
    if (!q) { c.style.display = isTest ? 'none' : (isSpam && !isSpamVisible) ? 'none' : ''; return; }
    const match = c.dataset.name.includes(q) || c.dataset.symbol.includes(q) || c.dataset.addr.includes(q);
    c.style.display = match ? 'block' : 'none';
  });
}

// ==================== COIN DETAIL PAGE ====================

let _swapDir = 'buy'; // buy = ETH→shares, sell = shares→ETH
let _exactOut = false; // false = exact input, true = exact output
let _coinData = null;
let _coinMeta = null;
let _quoteTimer = null;
let _tradeMode = 'swap'; // 'sale' | 'swap' | 'ragequit' | 'lp'
let _saleData = null; // sale object from getDAICO
let _saleExactOut = false; // true when user typed in receive field
let _lpSubMode = 'zap'; // 'zap' | 'pair'

// Collector Vault state
let _vaultAddr = null;
let _vaultData = null;
let _isCollectorDAO = false;
let _vaultSaleActive = false;
let _vaultRefreshInterval = null;
let _poolReserve0 = 0n;
let _poolReserve1 = 0n;
let _lpBalance = 0n;

async function renderCoinPage(daoAddr) {
  const gen = ++_renderGen;
  const app = $('app');
  app.innerHTML = `
    <a href="#" class="back-link">&larr; All Coins</a>
    <div class="loading">${zfiLoadingSVG(48)}Loading coin data...</div>
  `;

  try {
    const data = await withRPC(async rpc => {
      const helper = new ethers.Contract(VIEW_HELPER, GET_DAICO_ABI, rpc);
      return await helper.getDAICO(daoAddr, [ZERO]);
    });
    if (gen !== _renderGen) return;
    _coinData = data;
    _saleExactOut = false;
    _cachedQuote = null;

    const sale = data.sales && data.sales.length > 0 ? data.sales[0] : null;
    const tap = data.tap;
    const sharesAddr = data.meta.sharesToken;

    // Fetch metadata + pool reserves + ops lockup in parallel
    const feeOrHookVal = sale ? BigInt(sale.feeOrHook) : 30n;
    const poolId = computePoolId(ZERO, sharesAddr, 0n, 0n, feeOrHookVal);
    const tapActive_ = tap && tap.ratePerSec > 0n;
    const [metadata, poolResult, ethUsd] = await Promise.all([
      fetchMetadata(data.meta.contractURI),
      withRPC(async rpc => {
        const z = new ethers.Contract(ZAMM, ZAMM_POOLS_ABI, rpc);
        return await z.pools(poolId);
      }).catch(() => null),
      getEthUsd()
    ]);
    if (gen !== _renderGen) return;
    _coinMeta = metadata;

    // Collector DAO detection + vault discovery
    _isCollectorDAO = !!(metadata && metadata.type === 'collector');
    _vaultAddr = null;
    _vaultData = null;
    _vaultSaleActive = false;
    if (_isCollectorDAO && COLLECTOR_VAULT_FACTORY !== ZERO) {
      try {
        const factoryIface = new ethers.Interface(COLLECTOR_FACTORY_ABI);
        const logs = await withRPC(async rpc => {
          return await rpc.getLogs({
            address: COLLECTOR_VAULT_FACTORY,
            topics: [factoryIface.getEvent('Deployed').topicHash, ethers.zeroPadValue(daoAddr, 32)],
            fromBlock: 0, toBlock: 'latest'
          });
        });
        if (logs.length > 0) {
          const parsed = factoryIface.parseLog(logs[logs.length - 1]);
          _vaultAddr = parsed.args.vault;
          // Batch-read vault state via MC3
          const vaultIface = new ethers.Interface(COLLECTOR_VAULT_ABI);
          const mc3i = new ethers.Interface(MC3_ABI);
          const vCalls = [
            { target: _vaultAddr, allowFailure: true, callData: vaultIface.encodeFunctionData('mode') },
            { target: _vaultAddr, allowFailure: true, callData: vaultIface.encodeFunctionData('deadline') },
            { target: _vaultAddr, allowFailure: true, callData: vaultIface.encodeFunctionData('shareRate') },
            { target: _vaultAddr, allowFailure: true, callData: vaultIface.encodeFunctionData('callsMade') },
            { target: _vaultAddr, allowFailure: true, callData: vaultIface.encodeFunctionData('maxCalls') },
            { target: _vaultAddr, allowFailure: true, callData: vaultIface.encodeFunctionData('filled') },
            { target: _vaultAddr, allowFailure: true, callData: vaultIface.encodeFunctionData('target') },
            { target: _vaultAddr, allowFailure: true, callData: vaultIface.encodeFunctionData('ethPerCall') },
            { target: _vaultAddr, allowFailure: true, callData: vaultIface.encodeFunctionData('token') },
            { target: _vaultAddr, allowFailure: true, callData: vaultIface.encodeFunctionData('minBalance') },
            { target: _vaultAddr, allowFailure: true, callData: vaultIface.encodeFunctionData('specificId') },
            { target: MC3, allowFailure: false, callData: mc3i.encodeFunctionData('getEthBalance', [_vaultAddr]) },
            { target: _vaultAddr, allowFailure: true, callData: vaultIface.encodeFunctionData('isFilled') }
          ];
          const vResults = await withRPC(async rpc => {
            const mc = new ethers.Contract(MC3, MC3_ABI, rpc);
            return await mc.aggregate3(vCalls);
          });
          const vd = (fn, idx) => { try { return vResults[idx].success ? vaultIface.decodeFunctionResult(fn, vResults[idx].returnData)[0] : null; } catch { return null; } };
          const filledFlag = !!(vd('filled', 5));
          const isFilledLive = !!(vd('isFilled', 12));
          _vaultData = {
            mode: Number(vd('mode', 0) ?? 0),
            deadline: vd('deadline', 1) ?? 0n,
            shareRate: vd('shareRate', 2) ?? 0n,
            callsMade: vd('callsMade', 3) ?? 0n,
            maxCalls: vd('maxCalls', 4) ?? 0n,
            filled: filledFlag || isFilledLive,
            target: vd('target', 6) ?? ZERO,
            ethPerCall: vd('ethPerCall', 7) ?? 0n,
            token: vd('token', 8) ?? ZERO,
            minBalance: vd('minBalance', 9) ?? 0n,
            specificId: !!(vd('specificId', 10)),
            balance: mc3i.decodeFunctionResult('getEthBalance', vResults[11].returnData)[0]
          };
          // Determine if vault sale is active
          const now = BigInt(Math.floor(Date.now() / 1000));
          const pastDeadline = _vaultData.deadline > 0n && now >= _vaultData.deadline;
          const callsRemain = _vaultData.maxCalls === 0n || _vaultData.callsMade < _vaultData.maxCalls;
          _vaultSaleActive = _vaultData.shareRate > 0n && !pastDeadline &&
            (_vaultData.mode === 0 ? callsRemain : !_vaultData.filled);
        }
      } catch (e) { console.error('Vault discovery failed:', e); }
    }
    if (gen !== _renderGen) return;

    const opsLockup = tapActive_ && tap.ops ? await fetchOpsLockup(sharesAddr, tap.ops, metadata) : null;
    if (gen !== _renderGen) return;

    // Sale stats
    const lpBps = sale ? Number(sale.lpBps) : 0;
    let salePct = 0, sold = 0n, totalSale = 0n, treasuryETH = 0n, saleActive = false, ethRaised = 0n;
    if (sale) {
      const detTeamBps = metadata && metadata.teamBps ? BigInt(metadata.teamBps) : 0n;
      totalSale = detTeamBps > 0n ? sale.totalSupply * (10000n - detTeamBps) / 10000n : sale.totalSupply;
      sold = totalSale > sale.remainingSupply ? totalSale - sale.remainingSupply : 0n;
      if (totalSale > 0n) salePct = Number((sold * 10000n) / totalSale) / 100;
      treasuryETH = sale.treasuryBalance;
      if (sale.forAmt > 0n) ethRaised = sold * sale.tribAmt / sale.forAmt;
      const now = BigInt(Math.floor(Date.now() / 1000));
      saleActive = sale.remainingSupply > 0n && sale.allowance > 0n && sale.forAmt > 0n && (sale.deadline === 0n || now <= BigInt(sale.deadline));
    }

    // Tap stats
    let tapPct = 0, tapVested = 0, tapTotal = 0, dailyRate = 0, tapActive = false;
    if (tap && tap.ratePerSec > 0n) {
      tapActive = true;
      const budget = tap.tapAllowance;
      // pending = total owed by time (ratePerSec * elapsed), claimable = min(pending, allowance, balance)
      const vested = tap.pending || 0n;
      if (budget > 0n) tapPct = Number((vested * 10000n) / budget) / 100;
      tapVested = Number(ethers.formatEther(vested));
      tapTotal = Number(ethers.formatEther(budget));
      dailyRate = Number(ethers.formatEther(tap.ratePerSec * 86400n));
    }

    // Price per 1M shares
    let priceDisplay = '';
    if (sale && sale.tribAmt > 0n && sale.forAmt > 0n) {
      const pricePer1M = Number(ethers.formatEther(sale.tribAmt)) / Number(ethers.formatEther(sale.forAmt)) * 1e6;
      priceDisplay = pricePer1M >= 1 ? parseFloat(pricePer1M.toFixed(2)).toString() : pricePer1M >= 0.001 ? parseFloat(pricePer1M.toFixed(4)).toString() : pricePer1M.toExponential(2);
    }

    // Market cap (pool price preferred, fallback to sale price)
    let mcapETH = 0;

    // FW S02 Collector DAO
    const FW_COLLECTOR_DAO = '0xE7Aa6cA3a9Ca3fe92a425dFeaD24900B9BF49853';
    const isFWCollector = daoAddr.toLowerCase() === FW_COLLECTOR_DAO.toLowerCase();

    // Banner + OG meta for social sharing
    const bannerUrl = resolveIPFS(metadata.banner);
    const logoUrl = resolveIPFS(metadata.image);
    const coinName = metadata.name || data.meta.name || 'Unnamed';
    const coinSymbol = data.meta.symbol || '???';
    const ogDesc = metadata.description
      ? metadata.description.slice(0, 200)
      : `$${coinSymbol} on zFi${saleActive ? ' — sale live' : ''}${ethRaised > 0n ? ` — ${fmtETH(ethRaised)} raised` : ''}`;
    updateOGMeta(
      `$${coinSymbol} — ${coinName}`,
      ogDesc,
      bannerUrl || logoUrl || ''
    );
    const fwBannerVid = 'https://www.s02.works/hero-video.mp4';
    let bannerHTML = '';
    if (isFWCollector) {
      bannerHTML = `<div class="coin-banner" style="background:#000"><video autoplay loop muted playsinline preload="auto" style="opacity:0;transition:opacity 0.6s" oncanplay="this.style.opacity='1'" onerror="this.remove()"><source src="${fwBannerVid}" type="video/mp4"></video></div>`;
    } else if (bannerUrl) {
      bannerHTML = `<div class="coin-banner"><img src="${escText(bannerUrl)}" alt="" onerror="this.parentNode.style.display='none'"></div>`;
    }

    // LP info
    const feeOrHook = feeOrHookVal;
    const ethIco = `<svg width="10" height="10" viewBox="0 0 256 417" fill="currentColor" opacity="0.5" style="vertical-align:-1px"><path d="M127.961 0l-2.795 9.5v275.668l2.795 2.79 127.962-75.638z"/><path d="M127.962 0L0 212.32l127.962 75.639V154.158z"/><path d="M127.961 312.187l-1.575 1.92V414.55l1.575 4.6L256 236.587z"/><path d="M127.962 419.15V312.187L0 236.587z"/></svg>`;

    // Pool reserves (already fetched in parallel above)
    const reserve0 = poolResult ? (poolResult.reserve0 ?? poolResult[0] ?? 0n) : 0n;

// ==================== SWAP ====================

function setTradeMode(mode) {
  _tradeMode = mode;
  _cachedQuote = null;
  // Update tab active states
  const tabs = ['Sale','Swap','Ragequit','Lp'];
  tabs.forEach(t => {
    const btn = $('modeTab' + t);
    if (btn) btn.classList.toggle('active', t.toLowerCase() === mode);
  });
  // Show/hide content sections
  ['saleMode','swapMode','ragequitMode','lpMode'].forEach(id => {
    const el = $(id);
    if (el) el.classList.toggle('active', id === mode + 'Mode');
  });
  // Update button text based on wallet state
  updateModeButton();
  loadBalances();
  if (mode === 'lp') loadLpBalance();
}

function updateModeButton() {
  const connected = !!_signer;
  if (_tradeMode === 'sale') {
    // Vault sale button
    const vBtn = $('vaultBuyBtn');
    if (vBtn) vBtn.textContent = connected ? 'Buy' : 'Connect Wallet';
    // DAICO sale button
    const btn = $('saleBuyBtn');
    if (btn) btn.textContent = connected ? 'Buy' : 'Connect Wallet';
  } else if (_tradeMode === 'swap') {
    const btn = $('swapBtn');
    if (btn) btn.textContent = connected ? 'Swap' : 'Connect Wallet';
  } else if (_tradeMode === 'ragequit') {
    const btn = $('rqBtn');
    if (btn) btn.textContent = connected ? 'Ragequit' : 'Connect Wallet';
  } else if (_tradeMode === 'lp') {
    const zapBtn = $('lpZapDoBtn');
    const pairBtn = $('lpPairDoBtn');
    if (zapBtn) zapBtn.textContent = connected ? 'Zap Liquidity' : 'Connect Wallet';
    if (pairBtn) pairBtn.textContent = connected ? 'Add Liquidity' : 'Connect Wallet';
  }
  // Phase 2 sale button (always visible if present)
  const p2Btn = $('phase2BuyBtn');
  if (p2Btn) p2Btn.textContent = connected ? 'Buy Shares' : 'Connect Wallet';
}

function setSwapDir(dir) {
  _swapDir = dir;
  _cachedQuote = null;
  $('swapBuyBtn').classList.toggle('active', dir === 'buy');
  $('swapSellBtn').classList.toggle('active', dir === 'sell');
  updateSwapLabels();
  $('swapPayInput').value = '';
  $('swapReceiveInput').value = '';
  $('swapQuote').textContent = '';
  loadBalances();
}

function updateSwapLabels() {
  if (!_coinData) return;
  const sym = '$' + (_coinData.meta.symbol || '???');
  const isBuy = _swapDir === 'buy';
  const payToken = $('swapPayToken');
  const recvToken = $('swapReceiveToken');
  if (!payToken || !recvToken) return;
  const coinLogoUrl = _coinMeta ? resolveIPFS(_coinMeta.image) : '';
  const coinTag = coinLogoUrl
    ? `<img src="${escText(coinLogoUrl)}" alt="" onerror="this.style.display='none'"> ${sym}`
    : sym;
  const ethTag = `<span class="eth-icon"><svg width="14" height="14" viewBox="0 0 256 417" fill="currentColor" opacity="0.6"><path d="M127.961 0l-2.795 9.5v275.668l2.795 2.79 127.962-75.638z"/><path d="M127.962 0L0 212.32l127.962 75.639V154.158z"/><path d="M127.961 312.187l-1.575 1.92V414.55l1.575 4.6L256 236.587z"/><path d="M127.962 419.15V312.187L0 236.587z"/></svg></span> ETH`;
  payToken.innerHTML = isBuy ? ethTag : coinTag;
  recvToken.innerHTML = isBuy ? coinTag : ethTag;
}

let _lastQuoteId = 0;
let _quoteDebounce = null;
let _cachedQuote = null; // { exactOut, tokenIn, tokenOut, amount, result, ts }

function onPayInput() {
  _exactOut = false;
  $('swapReceiveInput').value = '';
  scheduleQuote();
}

function onReceiveInput() {
  _exactOut = true;
  $('swapPayInput').value = '';
  scheduleQuote();
}

function scheduleQuote() {
  clearTimeout(_quoteDebounce);
  _quoteDebounce = setTimeout(fetchQuote, 300);
}

async function fetchQuote() {
  const raw = _exactOut ? $('swapReceiveInput').value.trim() : $('swapPayInput').value.trim();
  if (!raw || isNaN(raw) || Number(raw) <= 0) { $('swapQuote').textContent = ''; return; }

  const quoteId = ++_lastQuoteId;
  const shares = $('app').dataset.shares;
  const feeOrHook = BigInt($('app').dataset.feeOrHook || '30');

  try {
    const amount = ethers.parseEther(raw);
    const isBuy = _swapDir === 'buy';
    const tokenIn = isBuy ? ZERO : shares;
    const tokenOut = isBuy ? shares : ZERO;

    const result = await withRPC(async rpc => {
      const quoter = new ethers.Contract(ZQUOTER, QUOTE_ABI, rpc);
      return await quoter.quoteZAMM(_exactOut, feeOrHook, tokenIn, tokenOut, 0, 0, amount);
    });
    _cachedQuote = { exactOut: _exactOut, tokenIn, tokenOut, amount, result, ts: Date.now() };

    if (quoteId !== _lastQuoteId) return;

    if (_exactOut) {
      const val = Number(ethers.formatEther(result.amountIn)).toLocaleString(undefined, {maximumFractionDigits: 6});
      $('swapPayInput').value = ethers.formatEther(result.amountIn);
      $('swapQuote').textContent = `Estimated cost: ~${val}`;
    } else {
      const val = Number(ethers.formatEther(result.amountOut)).toLocaleString(undefined, {maximumFractionDigits: 6});
      $('swapReceiveInput').value = ethers.formatEther(result.amountOut);
      $('swapQuote').textContent = `Estimated output: ~${val}`;
    }
  } catch(e) {
    if (quoteId !== _lastQuoteId) return;
    $('swapQuote').textContent = 'No liquidity yet';
  }
}


let _payBalance = 0n; // raw wei balance of pay-side token
let _ethBalance = 0n;
let _sharesBalance = 0n;
let _ragequitTotalSupply = 0n; // shares + loot (for pro-rata ragequit)

async function loadBalances() {
  if (!_signer || !_coinData) return;
  const addr = await _signer.getAddress();
  const shares = _coinData.meta.sharesToken;
  const loot = _coinData.meta.lootToken;
  const daoAddr = $('app').dataset.dao;
  try {
    const erc20 = new ethers.Interface(ERC20_ABI);
    const mc3i = new ethers.Interface(MC3_ABI);
    const calls = [
      { target: MC3, allowFailure: false, callData: mc3i.encodeFunctionData('getEthBalance', [addr]) },
      { target: shares, allowFailure: true, callData: erc20.encodeFunctionData('balanceOf', [addr]) },
      { target: shares, allowFailure: true, callData: erc20.encodeFunctionData('totalSupply') },
      { target: loot, allowFailure: true, callData: erc20.encodeFunctionData('totalSupply') },
      { target: MC3, allowFailure: false, callData: mc3i.encodeFunctionData('getEthBalance', [daoAddr]) },
      { target: ZORG_TOKEN, allowFailure: true, callData: erc20.encodeFunctionData('balanceOf', [addr]) }
    ];
    // Mode 1 vault fill token check
    const vaultFillCheck = _vaultData && _vaultData.mode === 1 && !_vaultData.filled;
    if (vaultFillCheck) {
      if (_vaultData.specificId) {
        const erc721 = new ethers.Interface(ERC721_ABI);
        calls.push({ target: _vaultData.token, allowFailure: true, callData: erc721.encodeFunctionData('ownerOf', [_vaultData.minBalance]) });
      } else {
        calls.push({ target: _vaultData.token, allowFailure: true, callData: erc20.encodeFunctionData('balanceOf', [addr]) });
      }
    }
    const results = await withRPC(async rpc => {
      const mc = new ethers.Contract(MC3, MC3_ABI, rpc);
      return await mc.aggregate3(calls);
    });
    const decode = (abi, fn, r) => r.success ? abi.decodeFunctionResult(fn, r.returnData)[0] : 0n;
    const ethBal = decode(mc3i, 'getEthBalance', results[0]);
    const tokenBal = decode(erc20, 'balanceOf', results[1]);
    const sharesTotalSupply = decode(erc20, 'totalSupply', results[2]);
    const lootTotalSupply = decode(erc20, 'totalSupply', results[3]);
    const treasuryBal = decode(mc3i, 'getEthBalance', results[4]);
    _userIsVerified = decode(erc20, 'balanceOf', results[5]) >= ZORG_VERIFY_THRESHOLD;
    _ethBalance = ethBal;
    _sharesBalance = tokenBal;
    _ragequitTotalSupply = sharesTotalSupply + lootTotalSupply;

    // User balance display
    const balEl = $('coinUserBalance');
    if (balEl) {
      const sym = _coinData?.meta?.symbol || '???';
      if (tokenBal > 0n) {
        balEl.textContent = `Your balance: ${fmtShares(tokenBal)} $${sym}`;
        balEl.style.display = '';
      } else {
        balEl.style.display = 'none';
      }
    }

    // Swap mode balance
    const isBuy = _swapDir === 'buy';
    _payBalance = isBuy ? ethBal : tokenBal;
    const payEl = $('swapPayBal');
    if (payEl) {
      const payFmt = isBuy
        ? Number(ethers.formatEther(ethBal)).toLocaleString(undefined, {maximumFractionDigits:6}) + ' ETH'
        : fmtShares(tokenBal) + ' $' + (_coinData.meta.symbol || '???');
      payEl.textContent = payFmt;
      payEl.onclick = () => fillPct(100);
    }

    // Sale mode balance (ETH)
    const salePayEl = $('salePayBal');
    if (salePayEl) {
      salePayEl.textContent = Number(ethers.formatEther(ethBal)).toLocaleString(undefined, {maximumFractionDigits:6}) + ' ETH';
      salePayEl.onclick = () => fillPct(100);
    }

    // Phase 2 sale balance (ETH)
    const phase2BalEl = $('phase2Bal');
    if (phase2BalEl) {
      phase2BalEl.textContent = Number(ethers.formatEther(ethBal)).toLocaleString(undefined, {maximumFractionDigits:6}) + ' ETH';
      phase2BalEl.onclick = () => fillPhase2Pct(100);
    }

    // Vault sale balance (ETH)
    const vaultSaleBalEl = $('vaultSalePayBal');
    if (vaultSaleBalEl) {
      vaultSaleBalEl.textContent = Number(ethers.formatEther(ethBal)).toLocaleString(undefined, {maximumFractionDigits:6}) + ' ETH';
      vaultSaleBalEl.onclick = () => fillVaultPct(100);
    }

    // Ragequit mode balance (shares)
    const rqEl = $('rqSharesBal');
    if (rqEl) {
      rqEl.textContent = fmtShares(tokenBal) + ' $' + (_coinData.meta.symbol || '???');
      rqEl.onclick = () => fillPct(100);
    }

    // LP mode balances
    const ethFmt = Number(ethers.formatEther(ethBal)).toLocaleString(undefined, {maximumFractionDigits:6}) + ' ETH';
    const tokenFmtLp = fmtShares(tokenBal) + ' $' + (_coinData.meta.symbol || '???');
    const lpZapBal = $('lpZapBal');
    if (lpZapBal) { lpZapBal.textContent = ethFmt; lpZapBal.onclick = () => fillLpPct(100); }
    const lpPairEthBal = $('lpPairEthBal');
    if (lpPairEthBal) { lpPairEthBal.textContent = ethFmt; lpPairEthBal.onclick = () => fillLpPct(100); }
    const lpPairTokenBal = $('lpPairTokenBal');
    if (lpPairTokenBal) { lpPairTokenBal.textContent = tokenFmtLp; lpPairTokenBal.onclick = () => fillLpPairTokenMax(); }

    // Store treasury balance for ragequit estimate
    _coinData._treasuryEthBal = treasuryBal;

    // Fill token balance UI
    if (vaultFillCheck && results.length > 6) {
      const fillBalEl = $('vaultFillBalInfo');
      const fillBtn = $('vaultFillBtn');
      if (fillBalEl && fillBtn) {
        if (_vaultData.specificId) {
          const erc721 = new ethers.Interface(ERC721_ABI);
          let ownsNFT = false;
          try {
            const owner = results[6].success ? erc721.decodeFunctionResult('ownerOf', results[6].returnData)[0] : null;
            ownsNFT = owner && owner.toLowerCase() === addr.toLowerCase();
          } catch {}
          fillBalEl.style.display = '';
          if (ownsNFT) {
            fillBalEl.innerHTML = `You own NFT <span style="font-weight:600">#${_vaultData.minBalance.toString()}</span>`;
            fillBtn.disabled = false;
          } else {
            fillBalEl.innerHTML = `<span style="color:var(--red)">You don't own NFT #${_vaultData.minBalance.toString()}</span>`;
            fillBtn.disabled = true;
          }
        } else {
          const fillTokenBal = decode(erc20, 'balanceOf', results[6]);
          fillBalEl.style.display = '';
          const hasBal = fillTokenBal >= _vaultData.minBalance;
          fillBalEl.innerHTML = `Your balance: ${fmtShares(fillTokenBal)} (need ${fmtShares(_vaultData.minBalance)})`;
          if (!hasBal) {
            fillBalEl.innerHTML += ` <span style="color:var(--red)">&mdash; insufficient</span>`;
            fillBtn.disabled = true;
          } else {
            fillBtn.disabled = false;
          }
        }
      }
    }
  } catch {}
}

function fillPct(pct) {
  if (_tradeMode === 'sale') {
    if (_ethBalance <= 0n) return;
    let amt = _ethBalance * BigInt(pct) / 100n;
    if (pct === 100 && amt > ethers.parseEther('0.005')) amt -= ethers.parseEther('0.005');
    if (amt <= 0n) return;
    $('salePayInput').value = ethers.formatEther(amt);
    onSalePayInput();
  } else if (_tradeMode === 'ragequit') {
    if (_sharesBalance <= 0n) return;
    let amt = _sharesBalance * BigInt(pct) / 100n;
    if (amt <= 0n) return;
    $('rqSharesInput').value = ethers.formatEther(amt);
    onRagequitInput();
  } else {
    // swap mode
    if (_payBalance <= 0n) return;
    let amt = _payBalance * BigInt(pct) / 100n;
    if (_swapDir === 'buy' && pct === 100 && amt > ethers.parseEther('0.005')) {
      amt -= ethers.parseEther('0.005');
    }
    if (amt <= 0n) return;
    $('swapPayInput').value = ethers.formatEther(amt);
    _exactOut = false;
    $('swapReceiveInput').value = '';
    scheduleQuote();
  }
}
