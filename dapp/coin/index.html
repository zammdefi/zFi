// On-chain quote via ClassicalCurveSale view functions (authoritative, includes sniper fee)
let _curveQuoteTimer = null;
let _curveEffectiveFee = null; // cached for execution path
const CURVE_QUOTE_ABI = [
  'function quote(address token, uint256 amount) view returns (uint256)',
  'function quoteSell(address token, uint256 amount) view returns (uint256)',
  'function effectiveFee(address token) view returns (uint256)'
];
const _cqIface = new ethers.Interface(CURVE_QUOTE_ABI);

// Client-side token estimate (matches contract's buyExactIn) — used to feed into on-chain quote()
function _curveEstTokens(curve, netETH) {
  const vr = BigInt(curve.virtualReserve);
  const sold = BigInt(curve.sold);
  const cap = BigInt(curve.cap);
  const R = vr - sold;
  if (R <= 0n) return 0n;
  const startPrice = BigInt(curve.startPrice);
  const endPrice = BigInt(curve.endPrice);
  if (startPrice <= 0n) return 0n;
  let tokens;
  if (endPrice === startPrice) { tokens = netETH * (10n**18n) / startPrice; }
  else { const A = startPrice * vr * vr / (R * (10n**18n)); tokens = netETH * R / (A + netETH); }
  const remaining = cap - sold;
  if (tokens > remaining) tokens = remaining;
  const maxBuy = BigInt(curve.maxBuyBps);
  if (maxBuy > 0n) { const mx = cap * maxBuy / 10000n; if (tokens > mx) tokens = mx; }
  return tokens;
}

function curveUpdateBuyQuote() {
  const el = $('curveBuyQuote');
  if (!el || !_curveData) return;
  const v = parseFloat($('curveBuyAmount')?.value || '0');
  if (!v || v <= 0) { el.textContent = 'Enter amount to see quote'; return; }
  el.innerHTML = `<span style="opacity:0.5">Quoting...</span>`;
  if (_curveQuoteTimer) clearTimeout(_curveQuoteTimer);
  _curveQuoteTimer = setTimeout(async () => {
    try {
      const tokenAddr = _curveTokenAddr;
      const ethWei = ethers.parseEther(String(v));
      // Single multicall: effectiveFee + quote(estTokens)
      // Pre-estimate tokens client-side so we can include quote() in the same batch
      const curve = _curveData;
      // Use cached fee for estimate, fetch fresh in same batch
      const estFee = _curveEffectiveFee || Number(curve.feeBps);
      const estNet = ethWei * 10000n / BigInt(10000 + estFee);
      const estTokens = _curveEstTokens(curve, estNet);
      if (estTokens <= 0n) { el.textContent = 'Curve fully sold'; return; }
      const mc3Calls = [
        { target: CURVE_SALE, allowFailure: true, callData: _cqIface.encodeFunctionData('effectiveFee', [tokenAddr]) },
        { target: CURVE_SALE, allowFailure: true, callData: _cqIface.encodeFunctionData('quote', [tokenAddr, estTokens]) }
      ];
      const mcRes = await withRPC(async rpc => {
        const mc = new ethers.Contract(MC3, MC3_ABI, rpc);
        return await mc.aggregate3(mc3Calls);
      });
      const feeBps = mcRes[0].success ? Number(_cqIface.decodeFunctionResult('effectiveFee', mcRes[0].returnData)[0]) : Number(curve.feeBps);
      _curveEffectiveFee = feeBps;
      if (!mcRes[1].success) { el.textContent = 'Quote unavailable'; return; }
      let cost = _cqIface.decodeFunctionResult('quote', mcRes[1].returnData)[0];
      // If fee changed significantly, re-estimate tokens and re-quote
      let tokens = estTokens;
      if (Math.abs(feeBps - estFee) > 10) {
        const netETH = ethWei * 10000n / BigInt(10000 + feeBps);
        tokens = _curveEstTokens(curve, netETH);
        // Re-quote cost for the corrected token amount
        try {
          const reQuoteRes = await withRPC(async rpc => {
            const mc = new ethers.Contract(MC3, MC3_ABI, rpc);
            return await mc.aggregate3([{ target: CURVE_SALE, allowFailure: true, callData: _cqIface.encodeFunctionData('quote', [tokenAddr, tokens]) }]);
          });
          if (reQuoteRes[0].success) cost = _cqIface.decodeFunctionResult('quote', reQuoteRes[0].returnData)[0];
        } catch {}
      }
      const feeEth = cost * BigInt(feeBps) / 10000n;
      el.innerHTML = '~' + fmtTokenAmount(tokens.toString()) + ' tokens (fee: ' + (Number(feeEth) / 1e18).toFixed(4) + ' ETH)';
    } catch (e) {
      el.textContent = 'Quote failed';
    }
  }, 300);
}

function curveUpdateSellQuote() {
  const el = $('curveSellQuote');
  if (!el || !_curveData) return;
  const v = parseFloat($('curveSellAmount')?.value || '0');
  if (!v || v <= 0) { el.textContent = 'Enter amount to see quote'; return; }
  el.innerHTML = `<span style="opacity:0.5">Quoting...</span>`;
  if (_curveQuoteTimer) clearTimeout(_curveQuoteTimer);
  _curveQuoteTimer = setTimeout(async () => {
    try {
      const tokenAddr = _curveTokenAddr;
      let amount = ethers.parseEther(String(v));
      let capped = false;
      if (_curveBalance > 0n && amount > _curveBalance) { amount = _curveBalance; capped = true; }
      if (amount <= 0n) { el.textContent = ''; return; }
      // Single multicall: quoteSell + effectiveFee
      const mc3Calls = [
        { target: CURVE_SALE, allowFailure: true, callData: _cqIface.encodeFunctionData('quoteSell', [tokenAddr, amount]) },
        { target: CURVE_SALE, allowFailure: true, callData: _cqIface.encodeFunctionData('effectiveFee', [tokenAddr]) }
      ];
      const mcRes = await withRPC(async rpc => {
        const mc = new ethers.Contract(MC3, MC3_ABI, rpc);
        return await mc.aggregate3(mc3Calls);
      });
      if (!mcRes[0].success) { el.textContent = 'Quote unavailable'; return; }
      const gross = _cqIface.decodeFunctionResult('quoteSell', mcRes[0].returnData)[0];
      const feeBps = mcRes[1].success ? Number(_cqIface.decodeFunctionResult('effectiveFee', mcRes[1].returnData)[0]) : Number(_curveData.feeBps);
      _curveEffectiveFee = feeBps;
      const fee = gross * BigInt(feeBps) / 10000n;
      const net = gross - fee;
      el.innerHTML = '~' + (Number(net) / 1e18).toFixed(4) + ' ETH (fee: ' + (Number(fee) / 1e18).toFixed(4) + ' ETH)' + (capped ? ' <span style="color:var(--fg-dim)">(capped to balance)</span>' : '');
    } catch (e) {
      el.textContent = 'Quote failed';
    }
  }, 300);
}

// ---- Gated coin room chat via MiniMeet Socket.IO ----
const MINIMEET_URL = 'https://www.minimeet.cc';
let _coinSocket = null;
let _coinRoomJoined = false;

function _coinChatMsg(m) {
  const rawSender = m.sender_name || m.name || m.sender || '???';
  const sender = rawSender.startsWith('0x') && rawSender.length > 16 ? rawSender.slice(0, 6) + '\u2026' + rawSender.slice(-4) : rawSender;
  const ts = m.ts || m.created_at || m.createdAt;
  const age = ts ? fmtAge(Math.floor((typeof ts === 'number' ? ts : new Date(ts).getTime()) / 1000)) : 'now';
  return `<div class="curve-chat-msg"><span class="curve-chat-sender" title="${escAttr(m.sender || '')}">${escText(sender)}</span> <span class="curve-chat-time">&middot; ${age}</span><div class="curve-chat-text">${escText(m.text || '')}</div></div>`;
}

async function coinRoomConnect(roomId) {
  if (_coinSocket) { _coinSocket.disconnect(); _coinSocket = null; }
  _coinRoomJoined = false;

  // Load Socket.IO if not already loaded (shared with trollbox)
  if (typeof io === 'undefined') {
    await new Promise((resolve, reject) => {
      if (typeof io !== 'undefined') { resolve(); return; }
      const s = document.createElement('script');
      s.src = 'https://cdn.socket.io/4.8.3/socket.io.min.js';
      s.integrity = 'sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0';
      s.crossOrigin = 'anonymous';
      s.onload = resolve;
      s.onerror = () => reject(new Error('Socket.IO load failed'));
      document.head.appendChild(s);
    });
  }

  _coinSocket = io(MINIMEET_URL, { transports: ['websocket', 'polling'], reconnection: true });

  // Listen for messages
  _coinSocket.on('gated-room-chat', (msg) => {
    const msgsEl = $('curveChatMsgs');
    if (!msgsEl) return;
    const empty = msgsEl.querySelector('.activity-empty');
    if (empty) empty.remove();
    msgsEl.insertAdjacentHTML('beforeend', _coinChatMsg(msg));
    msgsEl.scrollTop = msgsEl.scrollHeight;
  });

  // Listen for history
  _coinSocket.on('gated-room-history', ({ messages }) => {
    const msgsEl = $('curveChatMsgs');
    if (!msgsEl || !messages) return;
    msgsEl.innerHTML = messages.length > 0
      ? messages.map(_coinChatMsg).join('')
      : '<div class="activity-empty">No messages yet</div>';
    msgsEl.scrollTop = msgsEl.scrollHeight;
  });

  // Request history on connect (read-only, no auth needed)
  _coinSocket.on('connect', () => {
    _coinSocket.emit('gated-room-history', { roomId, limit: 50 });
  });
}

function coinRoomDisconnect() {
  if (_coinSocket) { _coinSocket.disconnect(); _coinSocket = null; }
  _coinRoomJoined = false;
}

let _chatSending = false;
async function curveSendChat() {
  if (_chatSending) return;
  if (!_signer) { if (typeof connectWallet === 'function') connectWallet(); return; }
  if (!_curveRoomId || !_coinSocket) return;
  const input = $('curveChatInput');
  const text = (input?.value || '').trim();
  if (!text || text.length > 500) return;
  _chatSending = true;

  // Join room with wallet proof on first send (deferred auth, like trollbox)
  if (!_coinRoomJoined) {
    try {
      const addr = (await _signer.getAddress()).toLowerCase();
      const nonceRes = await fetch(`${MINIMEET_URL}/auth/wallet/nonce?address=${encodeURIComponent(addr)}`);
      if (!nonceRes.ok) throw new Error('Nonce failed');
      const { message, nonce } = await nonceRes.json();
      const signature = await _signer.signMessage(message);

      // Register wallet on socket if not already
      const displayName = await curveResolveName(addr) || addr.slice(0, 6) + '\u2026' + addr.slice(-4);
      _coinSocket.emit('register', { name: displayName, walletAddress: addr, walletSignature: signature, walletNonce: nonce });

      // Wait for registration
      await new Promise((resolve) => {
        _coinSocket.once('registered', resolve);
        _coinSocket.once('register-error', resolve);
        setTimeout(resolve, 3000);
      });

      // Join gated room
      _coinSocket.emit('join-gated-room', { roomId: _curveRoomId, walletAddress: addr, walletSignature: signature, walletNonce: nonce });

      // Wait for join result
      const joined = await new Promise((resolve) => {
        _coinSocket.once('gated-room-joined', () => resolve(true));
        _coinSocket.once('gated-room-error', (err) => {
          console.warn('Room join failed:', err.message || err);
          resolve(false);
        });
        setTimeout(() => resolve(false), 5000);
      });

      if (!joined) {
        const msgsEl = $('curveChatMsgs');
        if (msgsEl) msgsEl.insertAdjacentHTML('beforeend', `<div class="curve-chat-msg" style="color:var(--fg-dim);font-style:italic">Hold tokens to chat</div>`);
        const chatInput = $('curveChatInput');
        if (chatInput) { chatInput.disabled = true; chatInput.placeholder = 'Hold tokens to chat'; }
        _chatSending = false;
        return;
      }
      _coinRoomJoined = true;
    } catch (e) {
      console.warn('Chat auth failed:', e);
      _chatSending = false;
      return;
    }
  }

  _coinSocket.emit('gated-room-chat', { roomId: _curveRoomId, text });
  input.value = '';
  setTimeout(() => { _chatSending = false; }, 1000);
}

// Auto-join room after buy, auto-boot after sell (if Supabase configured)
async function curveAfterTrade(tokenAddr, traderWallet, isBuy) {
  if (!COIN_DB_URL) return;
  try {
    const rooms = await coinDbFetch('gated_rooms',
      `token_address=eq.${tokenAddr.toLowerCase()}&limit=1`);
    if (!rooms.length) return;
    const room = rooms[0];
    const balance = await withRPC(async rpc => {
      const iface = new ethers.Interface(ERC20_ABI);
      const raw = await rpc.call({ to: tokenAddr, data: iface.encodeFunctionData('balanceOf', [traderWallet]) });
      return iface.decodeFunctionResult('balanceOf', raw)[0];
    });
    const minBal = BigInt(room.min_balance);
    if (isBuy && balance >= minBal) {
      // Auto-join via worker proxy
      await fetch(`${COIN_DB_URL}/db/gated_room_members`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
        body: JSON.stringify({
          room_id: room.id,
          user_name: traderWallet.toLowerCase(),
          wallet_address: traderWallet.toLowerCase(),
          joined_at: new Date().toISOString()
        })
      });
    } else if (!isBuy && balance < minBal && room.creator !== traderWallet.toLowerCase()) {
      // Auto-boot via worker proxy (worker scopes to own-source rows)
      await fetch(`${COIN_DB_URL}/db/gated_room_members?room_id=eq.${room.id}&user_name=eq.${traderWallet.toLowerCase()}`, {
        method: 'DELETE'
      });
    }
  } catch (e) { console.warn('Room membership update failed:', e); }
}

async function curveResolveName(address) {
  try {
    return await withRPC(async rpc => {
      const ns = new ethers.Contract(WEINS, WEINS_ABI, rpc);
      return (await ns.reverseResolve(address)) || null;
    });
  } catch { return null; }
}

async function curveBuy() {
  if (_curveTrading) return;
  if (!_signer) { if (typeof connectWallet === 'function') connectWallet(); return; }
  const tokenAddr = _curveTokenAddr;
  const amtStr = ($('curveBuyAmount')?.value || '').trim();
  if (!amtStr || isNaN(amtStr) || Number(amtStr) <= 0) {
    $('curveTradeStatus').innerHTML = '<div style="color:var(--red);font-size:12px">Enter a valid ETH amount</div>';
    return;
  }
  const ethWei = ethers.parseEther(amtStr);

  // Compute minAmountOut using cached effectiveFee + client estimate + slippage
  const curve = _curveData;
  const feeBps = _curveEffectiveFee || Number(curve.feeBps);
  const netETH = ethWei * 10000n / BigInt(10000 + feeBps);
  const approxTokens = _curveEstTokens(curve, netETH);
  const minOut = approxTokens * BigInt(10000 - _curveSlippageBps) / 10000n;

  const deadline = BigInt(Math.floor(Date.now() / 1000)) + 600n;
  _curveTrading = true;
  $('curveTradeStatus').innerHTML = `<div style="font-size:12px">${zfiLoadingSVG(14)} Confirming...</div>`;
  try {
    const cs = new ethers.Contract(CURVE_SALE, CURVE_SALE_ABI, _signer);
    const tx = await cs.buyExactIn(tokenAddr, minOut, deadline, { value: ethWei });
    $('curveTradeStatus').innerHTML = `<div style="font-size:12px">${zfiLoadingSVG(14)} <a href="https://etherscan.io/tx/${tx.hash}" target="_blank">${tx.hash.slice(0,10)}...</a></div>`;
    const receipt = await tx.wait();

    const purchaseTopic = ethers.id('Purchase(address,address,uint256,uint256,uint256)');
    let tokenAmount = 0n, cost = 0n;
    for (const log of receipt.logs) {
      if (log.topics[0] === purchaseTopic && log.address.toLowerCase() === CURVE_SALE.toLowerCase()) {
        const decoded = ethers.AbiCoder.defaultAbiCoder().decode(['uint256','uint256','uint256'], log.data);
        tokenAmount = decoded[0]; cost = decoded[1]; break;
      }
    }

    const address = await _signer.getAddress();
    const traderName = await curveResolveName(address);
    coinDbInsert('token_trades', {
      id: crypto.randomUUID().slice(0, 12),
      token_address: tokenAddr.toLowerCase(), trader: address.toLowerCase(),
      trader_name: traderName, type: 'buy',
      token_amount: tokenAmount.toString(), eth_amount: cost.toString(),
      tx_hash: tx.hash, created_at: new Date().toISOString()
    });

    curveAfterTrade(tokenAddr, address, true); // auto-join room
    $('curveTradeStatus').innerHTML = `<div style="font-size:12px;color:var(--green)">Bought ${fmtTokenAmount(tokenAmount.toString())} tokens! <a href="https://etherscan.io/tx/${tx.hash}" target="_blank">View tx</a></div>`;
    $('curveBuyAmount').value = '';
    // Re-render immediately so a buy that triggered graduation flips the UI to the post-grad panel
    // before the user can click Buy again on the now-stale form.
    // Await so _curveTrading stays held until the new panel is on screen,
    // preventing a stale-form double-click from hitting Graduated() between completion and re-render.
    await renderCoinPage(tokenAddr);
  } catch (e) {
    if ((e.message || '').includes('user rejected') || e.code === 'ACTION_REJECTED') {
      $('curveTradeStatus').innerHTML = '<div style="font-size:12px;color:var(--fg-dim)">Cancelled</div>';
    } else {
      const msg = e.shortMessage || e.reason || (e.message || '').split('\n')[0];
      $('curveTradeStatus').innerHTML = `<div style="font-size:12px;color:var(--red)">${escText(msg.length < 100 ? msg : 'Trade failed')}</div>`;
    }
  } finally {
    _curveTrading = false;
  }
}

async function curveSell() {
  if (_curveTrading) return;
  if (!_signer) { if (typeof connectWallet === 'function') connectWallet(); return; }
  const tokenAddr = _curveTokenAddr;
  const amtStr = ($('curveSellAmount')?.value || '').trim();
  if (!amtStr || isNaN(amtStr) || Number(amtStr) <= 0) {
    $('curveTradeStatus').innerHTML = '<div style="color:var(--red);font-size:12px">Enter a valid token amount</div>';
    return;
  }
  let tokenWei = ethers.parseEther(amtStr);
  const address = await _signer.getAddress();

  // Cap to actual balance
  $('curveTradeStatus').innerHTML = `<div style="font-size:12px">${zfiLoadingSVG(14)} Checking balance...</div>`;
  const tokenContract = new ethers.Contract(tokenAddr, ERC20_ABI, _signer);
  const bal = await tokenContract.balanceOf(address);
  if (bal === 0n) { $('curveTradeStatus').innerHTML = '<div style="color:var(--red);font-size:12px">No tokens to sell</div>'; return; }
  if (tokenWei > bal) tokenWei = bal;

  // Compute minProceeds using on-chain quoteSell + cached fee, single multicall
  const curve = _curveData;
  let gross;
  const feeBps = _curveEffectiveFee || Number(curve.feeBps);
  try {
    gross = await withRPC(async rpc => {
      const cs = new ethers.Contract(CURVE_SALE, CURVE_QUOTE_ABI, rpc);
      return await cs.quoteSell(tokenAddr, tokenWei);
    });
  } catch {
    gross = tokenWei * BigInt(curve.startPrice) / (10n**18n);
  }
  const fee = gross * BigInt(feeBps) / 10000n;
  const net = gross - fee;
  const minProceeds = net * BigInt(10000 - _curveSlippageBps) / 10000n;

  const deadline = BigInt(Math.floor(Date.now() / 1000)) + 600n;
  _curveTrading = true;
  $('curveTradeStatus').innerHTML = `<div style="font-size:12px">${zfiLoadingSVG(14)} Confirming sell...</div>`;
  try {
    // No approval needed: launch() clones make CURVE_SALE the immutable hook, and the clone's
    // transferFrom skips the allowance check when msg.sender == hook. CURVE_SALE.sell pulls via
    // safeTransferFrom from msg.sender, so the call succeeds with zero allowance.
    const cs = new ethers.Contract(CURVE_SALE, CURVE_SALE_ABI, _signer);
    const tx = await cs.sell(tokenAddr, tokenWei, minProceeds, deadline);
    $('curveTradeStatus').innerHTML = `<div style="font-size:12px">${zfiLoadingSVG(14)} <a href="https://etherscan.io/tx/${tx.hash}" target="_blank">${tx.hash.slice(0,10)}...</a></div>`;
    const receipt = await tx.wait();

    const soldTopic = ethers.id('Sold(address,address,uint256,uint256,uint256)');
    let amount = 0n, proceeds = 0n;
    for (const log of receipt.logs) {
      if (log.topics[0] === soldTopic && log.address.toLowerCase() === CURVE_SALE.toLowerCase()) {
        const decoded = ethers.AbiCoder.defaultAbiCoder().decode(['uint256','uint256','uint256'], log.data);
        amount = decoded[0]; proceeds = decoded[1]; break;
      }
    }

    const sellerName = await curveResolveName(address);
    coinDbInsert('token_trades', {
      id: crypto.randomUUID().slice(0, 12),
      token_address: tokenAddr.toLowerCase(), trader: address.toLowerCase(),
      trader_name: sellerName, type: 'sell',
      token_amount: amount.toString(), eth_amount: proceeds.toString(),
      tx_hash: tx.hash, created_at: new Date().toISOString()
    });

    curveAfterTrade(tokenAddr, address, false); // auto-boot if below min
    $('curveTradeStatus').innerHTML = `<div style="font-size:12px;color:var(--green)">Sold for ${(Number(proceeds) / 1e18).toFixed(4)} ETH! <a href="https://etherscan.io/tx/${tx.hash}" target="_blank">View tx</a></div>`;
    $('curveSellAmount').value = '';
    // Await so _curveTrading stays held until the new panel is on screen,
    // preventing a stale-form double-click from hitting Graduated() between completion and re-render.
    await renderCoinPage(tokenAddr);
  } catch (e) {
    if ((e.message || '').includes('user rejected') || e.code === 'ACTION_REJECTED') {
      $('curveTradeStatus').innerHTML = '<div style="font-size:12px;color:var(--fg-dim)">Cancelled</div>';
    } else {
      const msg = e.shortMessage || e.reason || (e.message || '').split('\n')[0];
      $('curveTradeStatus').innerHTML = `<div style="font-size:12px;color:var(--red)">${escText(msg.length < 100 ? msg : 'Trade failed')}</div>`;
    }
  } finally {
    _curveTrading = false;
  }
}

// ---- zAMM swap for graduated curve coins ----
// Pool key: token0=ETH(zero), token1=token, feeOrHook = uint160(CURVE_SALE) | (1<<255)
const CURVE_HOOK_FEE = BigInt(CURVE_SALE) | (1n << 255n);
let _curveZammQuoteTimer = null;

function curveZammSide(side) {
  const buyBtn = $('curveZammBuyBtn'), sellBtn = $('curveZammSellBtn');
  buyBtn.style.background = side === 'buy' ? 'var(--btn-bg)' : 'transparent';
  buyBtn.style.color = side === 'buy' ? 'var(--btn-fg)' : 'var(--fg-muted)';
  sellBtn.style.background = side === 'sell' ? 'var(--red)' : 'transparent';
  sellBtn.style.color = side === 'sell' ? '#fff' : 'var(--fg-muted)';
  $('curveZammBuyWrap').style.display = side === 'buy' ? '' : 'none';
  $('curveZammSellWrap').style.display = side === 'sell' ? '' : 'none';
}

function curveZammSellPct(pct) {
  if (_curveBalance <= 0n) return;
  const amt = _curveBalance * BigInt(pct) / 100n;
  $('curveZammSellInput').value = ethers.formatEther(amt);
  curveZammQuote('sell');
}

function curveZammQuote(side) {
  const isBuy = side === 'buy';
  const el = $(isBuy ? 'curveZammBuyQuote' : 'curveZammSellQuote');
  if (!el) return;
  const raw = $(isBuy ? 'curveZammBuyInput' : 'curveZammSellInput')?.value || '';
  const v = parseFloat(raw);
  if (!v || v <= 0) { el.textContent = 'Enter amount to see quote'; return; }
  el.innerHTML = `<span style="opacity:0.5">Quoting...</span>`;
  if (_curveZammQuoteTimer) clearTimeout(_curveZammQuoteTimer);
  _curveZammQuoteTimer = setTimeout(async () => {
    try {
      const amount = ethers.parseEther(String(v));
      const tokenAddr = _curveTokenAddr;
      // Match the contract's routed swap: buy fee is taken from ETH input (so the pool sees less),
      // sell fee is taken from ETH output (so the pool sees the full token amount).
      const buyBps = BigInt(_curveCreatorBuyBps || 0);
      const sellBps = BigInt(_curveCreatorSellBps || 0);
      const swapAmount = isBuy ? amount * (10000n - buyBps) / 10000n : amount;
      const tokenIn = isBuy ? ZERO : tokenAddr;
      const tokenOut = isBuy ? tokenAddr : ZERO;
      const quote = await withRPC(async rpc => {
        const quoter = new ethers.Contract(ZQUOTER, QUOTE_ABI, rpc);
        return await quoter.quoteZAMM(false, CURVE_HOOK_FEE, tokenIn, tokenOut, 0, 0, swapAmount);
      });
      let out = quote.amountOut;
      // Sell: contract deducts sellBps from gross ETH output before sending to user.
      if (!isBuy) out = out * (10000n - sellBps) / 10000n;
      if (isBuy) {
        el.innerHTML = '~' + fmtTokenAmount(out.toString()) + ' tokens';
      } else {
        el.innerHTML = '~' + (Number(ethers.formatEther(out))).toFixed(4) + ' ETH';
      }
    } catch { el.textContent = 'Quote failed'; }
  }, 300);
}

async function curveZammSwap(side) {
  if (_curveTrading) return;
  if (!_signer) { if (typeof connectWallet === 'function') connectWallet(); return; }
  const isBuy = side === 'buy';
  const raw = $(isBuy ? 'curveZammBuyInput' : 'curveZammSellInput')?.value || '';
  const v = parseFloat(raw);
  if (!v || v <= 0) {
    $('curveTradeStatus').innerHTML = `<div style="color:var(--red);font-size:12px">Enter a valid amount</div>`;
    return;
  }
  let amount = ethers.parseEther(String(v));
  const tokenAddr = _curveTokenAddr;
  const address = await _signer.getAddress();
  // Cap sell to actual balance
  if (!isBuy) {
    const token = new ethers.Contract(tokenAddr, ERC20_ABI, _signer);
    const bal = await token.balanceOf(address);
    if (bal === 0n) { $('curveTradeStatus').innerHTML = '<div style="color:var(--red);font-size:12px">No tokens to sell</div>'; return; }
    if (amount > bal) amount = bal;
  }
  const tokenIn = isBuy ? ZERO : tokenAddr;
  const tokenOut = isBuy ? tokenAddr : ZERO;
  const poolKey = { id0: 0, id1: 0, token0: ZERO, token1: tokenAddr, feeOrHook: CURVE_HOOK_FEE };
  const deadline = BigInt(Math.floor(Date.now() / 1000)) + 600n;
  const buyBps = BigInt(_curveCreatorBuyBps || 0);
  const sellBps = BigInt(_curveCreatorSellBps || 0);

  _curveTrading = true;
  $('curveTradeStatus').innerHTML = `<div style="font-size:12px">${zfiLoadingSVG(14)} Quoting...</div>`;
  try {
    // Quote against the amount the pool actually sees (buy: net of input fee; sell: full).
    const swapAmount = isBuy ? amount * (10000n - buyBps) / 10000n : amount;
    const quote = await withRPC(async rpc => {
      const quoter = new ethers.Contract(ZQUOTER, QUOTE_ABI, rpc);
      return await quoter.quoteZAMM(false, CURVE_HOOK_FEE, tokenIn, tokenOut, 0, 0, swapAmount);
    });
    // Expected user output after the routed creator fee.
    let expectedOut = quote.amountOut;
    if (!isBuy) expectedOut = expectedOut * (10000n - sellBps) / 10000n;
    const minOut = expectedOut * BigInt(10000 - _curveSlippageBps) / 10000n;

    // No approval: launch() clones exempt the hook (=CURVE_SALE) from the allowance check.
    // CURVE_SALE.swapExactIn pulls tokens with safeTransferFrom, which the clone honours allowance-free.

    $('curveTradeStatus').innerHTML = `<div style="font-size:12px">${zfiLoadingSVG(14)} Confirming...</div>`;
    // Route through CURVE_SALE so the creator fee is paid and the routing-enforcement check passes.
    // Direct ZAMM.swapExactIn would revert with Unauthorized whenever creatorFees[token].beneficiary != 0.
    const cs = new ethers.Contract(CURVE_SALE, CURVE_SALE_ABI, _signer);
    const tx = await cs.swapExactIn(
      poolKey, amount, minOut, isBuy, address, deadline,
      { value: isBuy ? amount : 0n }
    );
    $('curveTradeStatus').innerHTML = `<div style="font-size:12px">${zfiLoadingSVG(14)} <a href="https://etherscan.io/tx/${tx.hash}" target="_blank">${tx.hash.slice(0,10)}...</a></div>`;
    await tx.wait();

    const traderName = await curveResolveName(address);
    coinDbInsert('token_trades', {
      id: crypto.randomUUID().slice(0, 12),
      token_address: tokenAddr.toLowerCase(), trader: address.toLowerCase(),
      trader_name: traderName, type: isBuy ? 'buy' : 'sell',
      token_amount: (isBuy ? expectedOut : amount).toString(),
      eth_amount: (isBuy ? amount : expectedOut).toString(),
      tx_hash: tx.hash, created_at: new Date().toISOString()
    });

    curveAfterTrade(tokenAddr, address, isBuy);
    $('curveTradeStatus').innerHTML = `<div style="font-size:12px;color:var(--green)">${isBuy ? 'Bought' : 'Sold'}! <a href="https://etherscan.io/tx/${tx.hash}" target="_blank">View tx</a></div>`;
    $(isBuy ? 'curveZammBuyInput' : 'curveZammSellInput').value = '';
    // Await so _curveTrading stays held until the new panel is on screen,
    // preventing a stale-form double-click from hitting Graduated() between completion and re-render.
    await renderCoinPage(tokenAddr);
  } catch (e) {
    if ((e.message || '').includes('user rejected') || e.code === 'ACTION_REJECTED') {
      $('curveTradeStatus').innerHTML = '<div style="font-size:12px;color:var(--fg-dim)">Cancelled</div>';
    } else {
      const msg = e.shortMessage || e.reason || (e.message || '').split('\n')[0];
      $('curveTradeStatus').innerHTML = `<div style="font-size:12px;color:var(--red)">${escText(msg.length < 100 ? msg : 'Swap failed')}</div>`;
    }
  } finally {
    _curveTrading = false;
  }
}

// ==================== CAUSE COIN PAGE ====================

async function renderCauseCoinPage(daoAddr, data, metadata, ethUsd, gen) {
  const app = $('app');
  const sharesAddr = data.meta.sharesToken;

  // Fetch ShareSale price + TapVest state + treasury + supply + balance in one multicall
  const ssIface = new ethers.Interface(SHARE_SALE_ABI);
  const tvIface = new ethers.Interface(TAP_VEST_ABI);
  const erc20I = new ethers.Interface(ERC20_ABI);
  const daoAllowanceABI = ['function allowance(address spender, address token) view returns (uint256)'];
  const daoI = new ethers.Interface(daoAllowanceABI);

  const lootAddr = data.meta.lootToken;
  const mc3Calls = [
    { target: SHARE_SALE, allowFailure: true, callData: ssIface.encodeFunctionData('sales', [daoAddr]) },
    { target: TAP_VEST, allowFailure: true, callData: tvIface.encodeFunctionData('taps', [daoAddr]) },
    { target: MC3, allowFailure: true, callData: new ethers.Interface(MC3_ABI).encodeFunctionData('getEthBalance', [daoAddr]) },
    { target: sharesAddr, allowFailure: true, callData: erc20I.encodeFunctionData('totalSupply', []) },
    // Remaining sale allowance — minting mode uses dao address as sentinel token
    { target: daoAddr, allowFailure: true, callData: daoI.encodeFunctionData('allowance', [SHARE_SALE, daoAddr]) },
    // Remaining tap allowance = budget remaining
    { target: daoAddr, allowFailure: true, callData: daoI.encodeFunctionData('allowance', [TAP_VEST, ZERO]) },
    // Loot total supply (needed for ragequit denominator: shares + loot)
    { target: lootAddr, allowFailure: true, callData: erc20I.encodeFunctionData('totalSupply', []) }
  ];
  if (_connectedAddress) {
    mc3Calls.push({ target: sharesAddr, allowFailure: true, callData: erc20I.encodeFunctionData('balanceOf', [_connectedAddress]) });
  }
  // Check for Continuous Sale contract
  const contSaleConfig = CONTINUOUS_SALES[daoAddr.toLowerCase()];
  const contSaleAddr = contSaleConfig?.sale;
  if (contSaleAddr) {
    const csI = new ethers.Interface(CONTINUOUS_SALE_ABI);
    mc3Calls.push({ target: contSaleAddr, allowFailure: true, callData: csI.encodeFunctionData('paused', []) });
  }

  const mcRes = await withRPC(async rpc => {
    const mc = new ethers.Contract(MC3, MC3_ABI, rpc);
    return await mc.aggregate3(mc3Calls);
  }).catch(() => mc3Calls.map(() => ({ success: false })));
  if (gen !== _renderGen) return;

  let saleData = null, tapData = null, treasuryETH = 0n, sharesTotalSupply = 0n, lootTotalSupply = 0n, saleAllowance = 0n, tapAllowance = 0n, userBalance = 0n;
  if (mcRes[0].success) {
    try { saleData = ssIface.decodeFunctionResult('sales', mcRes[0].returnData); } catch {}
  }
  if (mcRes[1].success) {
    try { tapData = tvIface.decodeFunctionResult('taps', mcRes[1].returnData); } catch {}
  }
  if (mcRes[2]?.success) {
    try { treasuryETH = new ethers.Interface(MC3_ABI).decodeFunctionResult('getEthBalance', mcRes[2].returnData)[0]; } catch {}
  }
  if (mcRes[3]?.success) {
    try { sharesTotalSupply = erc20I.decodeFunctionResult('totalSupply', mcRes[3].returnData)[0]; } catch {}
  }
  if (mcRes[4]?.success) {
    try { saleAllowance = daoI.decodeFunctionResult('allowance', mcRes[4].returnData)[0]; } catch {}
  }
  if (mcRes[5]?.success) {
    try { tapAllowance = daoI.decodeFunctionResult('allowance', mcRes[5].returnData)[0]; } catch {}
  }
  if (mcRes[6]?.success) {
    try { lootTotalSupply = erc20I.decodeFunctionResult('totalSupply', mcRes[6].returnData)[0]; } catch {}
  }
  if (_connectedAddress && mcRes[7]?.success) {
    try { userBalance = erc20I.decodeFunctionResult('balanceOf', mcRes[7].returnData)[0]; } catch {}
  }
  // Continuous Sale state
  let contSaleActive = false;
  const contSaleIdx = contSaleAddr ? (_connectedAddress ? 8 : 7) : -1;
  if (contSaleAddr && contSaleIdx >= 0 && mcRes[contSaleIdx]?.success) {
    try {
      const csI = new ethers.Interface(CONTINUOUS_SALE_ABI);
      const paused = csI.decodeFunctionResult('paused', mcRes[contSaleIdx].returnData)[0];
      contSaleActive = !paused;
    } catch {}
  }

  // Sale state — price/deadline from ShareSale.sales(), cap/sold from DAO allowance + totalSupply
  const price = saleData ? BigInt(saleData.price) : 0n;
  // Minting mode: each buy mints shares. totalSupply = creator's 1 share + sold.
  const creatorShares = ethers.parseEther('1');
  const sold = sharesTotalSupply > creatorShares ? sharesTotalSupply - creatorShares : 0n;
  // Cap = sold + remaining allowance to ShareSale
  // SafeSummoner DAOs may not use DAO-level allowance — if allowance is 0 but sale
  // has a price and no expired deadline, treat as open-ended
  const cap = sold + saleAllowance;
  const saleDeadline = saleData ? Number(saleData.deadline) : 0;
  const now = Math.floor(Date.now() / 1000);
  const daicoSaleActive = saleDeadline === 0 || now < saleDeadline;
  const saleActive = daicoSaleActive || contSaleActive;
  const isOpenCap = cap >= 2n ** 128n || (saleAllowance === 0n && price > 0n && daicoSaleActive) || contSaleActive;
  const salePct = (!isOpenCap && cap > 0n) ? Number(sold * 10000n / cap) / 100 : 0;
  const raisedWei = price > 0n ? sold * price / ethers.parseEther('1') : 0n;
  const raisedEth = Number(ethers.formatEther(raisedWei));
  const priceEth = Number(ethers.formatEther(price));
  const saleEnded = !saleActive || (!isOpenCap && !contSaleActive && cap > 0n && sold >= cap);

  // Tap state — rate/beneficiary from TapVest.taps(), budget from DAO allowance
  const hasTap = tapData && BigInt(tapData.ratePerSec) > 0n;
  const tapRate = hasTap ? BigInt(tapData.ratePerSec) : 0n;
  const tapLastClaim = hasTap ? Number(tapData.lastClaim) : 0;
  const tapBeneficiary = hasTap ? tapData.beneficiary : null;
  // Budget = remaining allowance + already claimed. Claimed ≈ rate × elapsed since configure.
  // Remaining allowance = tapAllowance (from DAO.allowance(TAP_VEST, ETH))
  const tapBudget = tapAllowance; // remaining budget
  const tapElapsed = hasTap && tapLastClaim > 0 ? BigInt(Math.floor(Date.now() / 1000) - tapLastClaim) : 0n;
  const tapPending = hasTap ? tapRate * tapElapsed : 0n; // ETH owed since last claim
  const tapInstant = tapRate >= ethers.parseEther('0.001'); // >= 0.001 ETH/sec (~86 ETH/day) = effectively instant
  const tapOpenBudget = tapBudget >= 2n ** 128n;
  const tapRatePerDay = (hasTap && !tapInstant) ? Number(tapRate) * 86400 / 1e18 : 0;

  // User balance
  const balFmt = userBalance > 0n ? fmtTokenAmount(userBalance.toString()) : '0';

  // Metadata
  const coinName = metadata.name || data.meta.name || 'Unnamed';
  const coinSymbol = metadata.symbol || data.meta.symbol || '???';
  const causeBannerUrl = resolveIPFS(metadata.banner);

  let html = `
    <a href="#" class="back-link">&larr; All Coins</a>
    ${causeBannerUrl ? `<div class="coin-banner"><img src="${escAttr(causeBannerUrl)}" alt="" onerror="this.parentNode.style.display='none'"></div>` : ''}

  // Description + socials

  // Raised / treasury header
  const raisedUsd = ethUsd ? ' ($' + (raisedEth * ethUsd).toFixed(2) + ')' : '';

  // Stats grid
  const capFmt = isOpenCap ? 'Open' : (cap > 0n ? Number(ethers.formatEther(cap)).toLocaleString(undefined, {maximumFractionDigits: 0}) : 'Open');

  html += `

  // Progress bar (skip for open/unlimited cap)
  if (!isOpenCap && cap > 0n) {

  // Buy form (if sale active)
  if (!saleEnded) {
    html += `
      <div class="section-card">

        <div id="causeBuyQuote" style="font-size:11px;color:var(--fg-muted);margin-bottom:6px;min-height:16px">Enter amount to see quote</div>
        <button class="swap-btn" id="causeBuyBtn" style="width:100%;font-size:13px" onclick="causeBuy('${daoAddr}')">${_connectedAddress ? 'Buy Shares' : 'Connect Wallet'}</button>
        <div id="causeTradeStatus" style="margin-top:8px"></div>
      </div>

  }

  // Ragequit — collapsible, understated. Safety net, not a primary action.
  if (userBalance > 0n && treasuryETH > 0n) {
    const rqTreasuryFmt = Number(ethers.formatEther(treasuryETH)).toFixed(4);
    html += `
      <div style="margin-top:4px;margin-bottom:14px">
        <button class="coin-rq-toggle" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none'" style="display:flex;align-items:center;gap:6px;width:100%;padding:8px 0;font-size:11px;color:var(--fg-dim);background:transparent;border:none;cursor:pointer;font-family:inherit">
          <span style="font-size:10px">&#9654;</span> Redeem shares for ETH
        </button>
        <div style="display:none;padding:12px;border:1px solid var(--border-muted);background:var(--surface)">

          <div style="display:flex;gap:4px;margin-bottom:6px">
            <input id="causeRqAmount" type="text" inputmode="decimal" placeholder="0" aria-label="Shares to redeem" style="flex:1;padding:6px 0;background:none;border:none;border-bottom:1px solid var(--border-muted);color:var(--fg);font-size:14px;outline:none" oninput="causeUpdateRqQuote()">
            <span style="font-size:11px;color:var(--fg-muted);align-self:flex-end;padding-bottom:8px">shares</span>
          </div>
          <div class="coin-preset-row" style="display:flex;gap:4px;margin-bottom:8px">
            <button class="coin-tpl-btn" onclick="causeSetRqPct(25)" style="font-size:9px;padding:3px 6px">25%</button>
            <button class="coin-tpl-btn" onclick="causeSetRqPct(50)" style="font-size:9px;padding:3px 6px">50%</button>
            <button class="coin-tpl-btn" onclick="causeSetRqPct(75)" style="font-size:9px;padding:3px 6px">75%</button>
            <button class="coin-tpl-btn" onclick="causeSetRqPct(100)" style="font-size:9px;padding:3px 6px">100%</button>
          </div>
          <div id="causeRqQuote" style="font-size:11px;color:var(--fg-muted);margin-bottom:6px;min-height:16px">Enter shares to see redemption value</div>
          <button class="swap-btn" style="width:100%;font-size:12px;background:var(--surface);color:var(--fg-muted);border:1px solid var(--border-muted)" onclick="causeRagequit('${daoAddr}')">Redeem</button>
          <div id="causeRqStatus" style="margin-top:8px"></div>
        </div>
      </div>
    `;
  }

  // Tap vesting section
  if (hasTap) {
    const budgetDisplay = tapOpenBudget ? 'unlimited' : Number(ethers.formatEther(tapBudget)).toFixed(4) + ' ETH';
    const claimable = tapPending > tapBudget ? tapBudget : tapPending > treasuryETH ? treasuryETH : tapPending;
    const pendingEth = Number(ethers.formatEther(claimable)).toFixed(4);
    const rateDisplay = tapInstant ? 'Instant (all funds to beneficiary)' : `~${tapRatePerDay < 0.0001 ? tapRatePerDay.toPrecision(2) : tapRatePerDay.toFixed(4)} ETH/day`;
    const beneficiaryShort = tapBeneficiary.slice(0, 6) + '\u2026' + tapBeneficiary.slice(-4);
    html += `
      <div class="section-card" style="background:var(--surface)">
        <div class="section-title">Tap Vesting</div>
        <dl class="coin-summary" style="font-size:12px;line-height:1.8;color:var(--fg-muted)">
          <dt>Rate</dt><dd>${rateDisplay}</dd>

          ${tapOpenBudget ? '' : `<dt>Remaining</dt><dd>${budgetDisplay}</dd>`}
          <dt>Beneficiary</dt><dd><a href="https://etherscan.io/address/${tapBeneficiary}" target="_blank" style="color:inherit">${beneficiaryShort}</a></dd>
        </dl>
        ${_connectedAddress && _connectedAddress.toLowerCase() === tapBeneficiary.toLowerCase() ? `<button class="swap-btn" style="width:100%;font-size:12px;margin-top:8px;background:var(--btn-bg);color:var(--btn-fg)" onclick="causeTapClaim('${daoAddr}')">Claim Tap</button>
        <div id="causeTapStatus" style="margin-top:8px"></div>` : ''}
      </div>
    `;
  }

  // Governance info
  html += `
    <div class="section-card" style="background:var(--surface)">
      <div class="section-title">Governance</div>
      <div style="font-size:12px;line-height:1.8;color:var(--fg-muted)">
        10% quorum &middot; 7d voting &middot; 2d timelock &middot; ragequittable<br>
        Share holders can ragequit at any time for a pro-rata refund.
      </div>
      <div style="margin-top:8px">
        <a href="../dao/#/dao/1/${daoAddr}" style="font-size:11px;color:var(--fg-muted);text-decoration:underline">Manage DAO &rarr;</a>
      </div>
    </div>
  `;

  // Shareholders drawer (reuses loadHolders from standard DAICO page)
  html += `
    <div class="drawer" id="holdersDrawer" data-dao="${daoAddr}">
      <button class="drawer-toggle" onclick="toggleHolders()">
        <span>Shareholders</span>

  // Chat — room lookup from Supabase, messages via Socket.IO (collapsed by default, lazy-connect)
  _curveRoomId = null;
  if (COIN_DB_URL) {
    const rooms = await coinDbFetch('gated_rooms',
      `token_address=eq.${sharesAddr.toLowerCase()}&limit=1`);
    if (Array.isArray(rooms) && rooms.length > 0) {
      _curveRoomId = rooms[0].id;
      const chatDisabled = !userBalance || userBalance === 0n;
      html += `
        <div class="curve-chat" id="causeChatWrap">
          <div class="section-title" style="margin-bottom:6px;cursor:pointer;user-select:none" onclick="toggleCauseChat()">Chat <span id="causeChatChevron" style="font-size:10px">&#9654;</span></div>
          <div id="causeChatBody" style="display:none">
            <div class="curve-chat-msgs" id="curveChatMsgs"><div class="activity-empty">No messages yet</div></div>
            <div class="curve-chat-input">
              <input type="text" id="curveChatInput" placeholder="${chatDisabled ? 'Hold shares to chat' : 'Message...'}" maxlength="500"
                ${chatDisabled ? 'disabled' : ''} onkeydown="if(event.key==='Enter')curveSendChat()">
              <button onclick="curveSendChat()" ${chatDisabled ? 'disabled style="opacity:0.5"' : ''}>Send</button>
            </div>

        </div>
      `;
    }
  }

  // Links
  html += `
    <div style="margin-top:16px;font-size:11px;color:var(--fg-dim)">
      <a href="https://etherscan.io/address/${daoAddr}" target="_blank" style="color:inherit">DAO</a>
      &middot; <a href="https://etherscan.io/address/${sharesAddr}" target="_blank" style="color:inherit">Shares</a>
      &middot; <a href="https://etherscan.io/address/${SHARE_SALE}" target="_blank" style="color:inherit">Sale Contract</a>
      ${metadata.creatorWallet ? `&middot; <a href="https://etherscan.io/address/${metadata.creatorWallet}" target="_blank" style="color:inherit">Creator</a>` : ''}
    </div>
  `;

  app.innerHTML = html;

  // Chat socket is lazy-connected when user opens the chat panel

  // Store for buy/ragequit functions
  app.dataset.dao = daoAddr;
  app.dataset.shares = sharesAddr;
  app.dataset.contSale = contSaleActive ? contSaleAddr : '';
  app.dataset.price = price.toString();
  app.dataset.treasury = treasuryETH.toString();
  app.dataset.totalSupply = (sharesTotalSupply + lootTotalSupply).toString();
  app.dataset.userBalance = userBalance.toString();

  // Auto-refresh sale stats every 30s (partial update, preserves chat/inputs)
  if (_causeRefreshTimer) clearInterval(_causeRefreshTimer);
  _causeRefreshTimer = setInterval(() => {
    if (location.hash.slice(1) !== daoAddr) { clearInterval(_causeRefreshTimer); return; }
    refreshCauseStats(daoAddr, metadata);
  }, 30000);
}

let _causeRefreshTimer = null;
let _causeBuyMode = 'shares'; // 'shares' or 'eth'
let _causeChatOpen = false;

function toggleCauseChat() {
  _causeChatOpen = !_causeChatOpen;
  const body = $('causeChatBody');
  const chevron = $('causeChatChevron');
  if (body) body.style.display = _causeChatOpen ? '' : 'none';
  if (chevron) chevron.innerHTML = _causeChatOpen ? '&#9660;' : '&#9654;';
  if (_causeChatOpen && _curveRoomId && !_coinSocket) {
    const msgsEl = $('curveChatMsgs');
    if (msgsEl) msgsEl.innerHTML = `<div class="activity-empty">${zfiLoadingSVG(14)} Loading...</div>`;
    coinRoomConnect(_curveRoomId);
    // Fallback if history never arrives
    setTimeout(() => {
      const el = $('curveChatMsgs');
      if (el && el.querySelector('.activity-empty')) el.innerHTML = '<div class="activity-empty">No messages yet</div>';
    }, 8000);
  }
}

async function refreshCauseStats(daoAddr, metadata) {
  const gen = _renderGen;
  try {
    const sharesAddr = $('app')?.dataset?.shares;
    if (!sharesAddr) return;
    const ssIface = new ethers.Interface(SHARE_SALE_ABI);
    const erc20I = new ethers.Interface(ERC20_ABI);
    const daoI = new ethers.Interface(['function allowance(address spender, address token) view returns (uint256)']);
    const mc3Calls = [
      { target: SHARE_SALE, allowFailure: true, callData: ssIface.encodeFunctionData('sales', [daoAddr]) },
      { target: MC3, allowFailure: true, callData: new ethers.Interface(MC3_ABI).encodeFunctionData('getEthBalance', [daoAddr]) },
      { target: sharesAddr, allowFailure: true, callData: erc20I.encodeFunctionData('totalSupply', []) },
      { target: daoAddr, allowFailure: true, callData: daoI.encodeFunctionData('allowance', [SHARE_SALE, daoAddr]) },
    ];
    if (_connectedAddress) {
      mc3Calls.push({ target: sharesAddr, allowFailure: true, callData: erc20I.encodeFunctionData('balanceOf', [_connectedAddress]) });
    }
    const mcRes = await withRPC(async rpc => {
      const mc = new ethers.Contract(MC3, MC3_ABI, rpc);
      return await mc.aggregate3(mc3Calls);
    }).catch(() => []);
    if (gen !== _renderGen) return;

    let saleData = null, treasuryETH = 0n, sharesTotalSupply = 0n, saleAllowance = 0n, userBalance = 0n;
    if (mcRes[0]?.success) try { saleData = ssIface.decodeFunctionResult('sales', mcRes[0].returnData); } catch {}
    if (mcRes[1]?.success) try { treasuryETH = new ethers.Interface(MC3_ABI).decodeFunctionResult('getEthBalance', mcRes[1].returnData)[0]; } catch {}
    if (mcRes[2]?.success) try { sharesTotalSupply = erc20I.decodeFunctionResult('totalSupply', mcRes[2].returnData)[0]; } catch {}
    if (mcRes[3]?.success) try { saleAllowance = daoI.decodeFunctionResult('allowance', mcRes[3].returnData)[0]; } catch {}
    if (_connectedAddress && mcRes[4]?.success) try { userBalance = erc20I.decodeFunctionResult('balanceOf', mcRes[4].returnData)[0]; } catch {}

    const price = saleData ? BigInt(saleData.price) : 0n;
    const creatorShares = ethers.parseEther('1');
    const sold = sharesTotalSupply > creatorShares ? sharesTotalSupply - creatorShares : 0n;
    const cap = sold + saleAllowance;
    const saleDeadline = saleData ? Number(saleData.deadline) : 0;
    const now = Math.floor(Date.now() / 1000);
    const saleActive = saleDeadline === 0 || now < saleDeadline;
    const isOpenCap = cap >= 2n ** 128n || (saleAllowance === 0n && price > 0n && saleActive);
    const saleEnded = !saleActive || (!isOpenCap && cap > 0n && sold >= cap);
    const raisedWei = price > 0n ? sold * price / ethers.parseEther('1') : 0n;
    const raisedEth = Number(ethers.formatEther(raisedWei));
    const treasuryEth = Number(ethers.formatEther(treasuryETH));
    const ethUsd = _ethUsdPrice || 0;

    // Update raised row
    const raisedEl = $('causeRaisedRow');
    if (raisedEl) {
      const raisedUsd = ethUsd ? ' ($' + (raisedEth * ethUsd).toFixed(2) + ')' : '';
      const treasuryUsd = ethUsd ? ' ($' + (treasuryEth * ethUsd).toFixed(2) + ')' : '';
      const treasuryDiffers = Math.abs(treasuryEth - raisedEth) > 0.0001;
      raisedEl.innerHTML = `
        <span style="font-size:18px;font-weight:700">${raisedEth.toFixed(raisedEth > 0 && raisedEth < 0.0001 ? 8 : 4)} ETH</span>
        <span style="font-size:11px;color:var(--fg-muted);margin-left:2px">raised</span>
        <span style="font-size:11px;color:var(--fg-muted)">${raisedUsd}</span>
        ${treasuryDiffers ? `<div style="font-size:11px;color:var(--fg-dim);margin-top:2px">${treasuryEth.toFixed(treasuryEth > 0 && treasuryEth < 0.0001 ? 8 : 4)} ETH treasury${treasuryUsd}</div>` : ''}
      `;
    }

    // Update sold count
    const soldEl = $('causeSoldVal');
    if (soldEl) soldEl.textContent = Number(ethers.formatEther(sold)).toLocaleString(undefined, {maximumFractionDigits: 0});
    const capEl = $('causeSoldCap');
    if (capEl) {
      const capFmt = isOpenCap ? 'Open' : (cap > 0n ? Number(ethers.formatEther(cap)).toLocaleString(undefined, {maximumFractionDigits: 0}) : 'Open');
      capEl.textContent = (isOpenCap || cap === 0n) ? 'shares' : 'of ' + capFmt;
    }

    // Update status
    const statusEl = $('causeStatusVal');
    if (statusEl) {
      statusEl.textContent = saleEnded ? 'Ended' : 'Active';
      statusEl.style.color = saleEnded ? 'var(--fg-muted)' : 'var(--green)';
    }

    // Update user balance
    if (_connectedAddress) {
      const balEl = document.querySelector('.coin-user-balance');
      if (balEl) balEl.textContent = (userBalance > 0n ? fmtTokenAmount(userBalance.toString()) : '0') + ' shares';
    }

    // Update progress bar (capped sales only)
    if (!isOpenCap && cap > 0n) {
      const salePct = Number(sold * 10000n / cap) / 100;
      const pctLabel = $('causePctLabel');
      if (pctLabel) pctLabel.textContent = salePct.toFixed(1) + '%';
      const pctBar = $('causePctBar');
      if (pctBar) pctBar.innerHTML = `<span style="flex:${Math.max(salePct,0.5)};overflow:hidden;white-space:nowrap">${'█'.repeat(200)}</span><span style="flex:${Math.max(100-salePct,0.5)};overflow:hidden;white-space:nowrap">${'░'.repeat(200)}</span>`;
    }

    // Update stored data
    $('app').dataset.treasury = treasuryETH.toString();
    $('app').dataset.userBalance = userBalance.toString();
  } catch (e) { console.warn('Cause stats refresh failed:', e); }
}

function causeSetBuyEth(amt) {

  $('causeBuyAmount').value = amt;
  causeUpdateBuyQuote();
}

function _causeEthToShares(ethWei, price) {
  // shares = floor(ethWei * 1e18 / price)
  if (price <= 0n) return 0n;
  return ethWei * ethers.parseEther('1') / price;
}

function _causeSharesToCost(shares, price) {
  // Round up to match contract: cost = (shares * price + 1e18 - 1) / 1e18
  return (shares * price + ethers.parseEther('1') - 1n) / ethers.parseEther('1');
}

function causeUpdateBuyQuote() {
  const el = $('causeBuyQuote');
  if (!el) return;
  const amt = parseFloat($('causeBuyAmount')?.value || '0');
  const priceStr = $('app')?.dataset.price;
  if (!amt || amt <= 0) { el.textContent = 'Enter amount to see quote'; return; }
  if (!priceStr) { el.textContent = 'Sale data not loaded'; return; }
  const price = BigInt(priceStr);
  if (_causeBuyMode === 'eth') {
    const ethWei = ethers.parseEther(String(amt));
    const shares = _causeEthToShares(ethWei, price);
    if (shares <= 0n) { el.textContent = 'Amount too small'; return; }
    const sharesNum = Number(ethers.formatEther(shares));
    if (sharesNum < 1) { el.textContent = 'Amount too small'; return; }
    const sharesFmt = sharesNum.toLocaleString(undefined, { maximumFractionDigits: 0 });
    const cost = _causeSharesToCost(shares, price);
    const costEth = Number(ethers.formatEther(cost));
    el.textContent = '\u2248 ' + sharesFmt + ' shares (cost: ' + fmtNum(costEth) + ' ETH)';
  } else {
    const shares = ethers.parseEther(String(amt));
    const cost = _causeSharesToCost(shares, price);
    el.textContent = 'Cost: ' + fmtNum(Number(ethers.formatEther(cost))) + ' ETH';
  }
}

async function causeBuy(daoAddr) {
  if (!_signer) { if (typeof connectWallet === 'function') connectWallet(); return; }
  const amtStr = ($('causeBuyAmount')?.value || '').trim();
  if (!amtStr || isNaN(amtStr) || Number(amtStr) <= 0) {
    $('causeTradeStatus').innerHTML = '<div style="color:var(--red);font-size:12px">Enter a valid amount</div>';
    return;
  }
  const priceStr = $('app')?.dataset.price;
  if (!priceStr) {
    $('causeTradeStatus').innerHTML = `<div style="color:var(--red);font-size:12px">Sale data not loaded <button onclick="renderCoinPage('${escAttr(daoAddr)}')" style="color:var(--fg);background:var(--surface);border:1px solid var(--border-muted);padding:2px 8px;font-size:11px;cursor:pointer;margin-left:4px">Retry</button></div>`;
    return;
  }
  const price = BigInt(priceStr);

  let shareAmt, cost;
  if (_causeBuyMode === 'eth') {
    const ethWei = ethers.parseEther(amtStr);
    shareAmt = _causeEthToShares(ethWei, price);
    if (shareAmt <= 0n) {
      $('causeTradeStatus').innerHTML = '<div style="color:var(--red);font-size:12px">Amount too small for any shares</div>';
      return;
    }
    cost = _causeSharesToCost(shareAmt, price);
  } else {
    shareAmt = ethers.parseEther(amtStr);
    cost = _causeSharesToCost(shareAmt, price);
  }

  // Pre-flight balance check
  const statusEl = $('causeTradeStatus');
  try {
    const bal = await _signer.provider.getBalance(await _signer.getAddress());
    if (bal < cost) {
      statusEl.innerHTML = `<div style="font-size:12px;color:var(--red)">Insufficient ETH (need ${fmtNum(Number(ethers.formatEther(cost)))} ETH, have ${fmtNum(Number(ethers.formatEther(bal)))} ETH)</div>`;
      return;
    }
  } catch {}

  statusEl.innerHTML = `<div style="font-size:12px">${zfiLoadingSVG(14)} Confirming...</div>`;
  try {
    const ss = new ethers.Contract(SHARE_SALE, SHARE_SALE_ABI, _signer);
    const tx = await ss.buy(daoAddr, shareAmt, { value: cost });
    statusEl.innerHTML = `<div style="font-size:12px">${zfiLoadingSVG(14)} <a href="https://etherscan.io/tx/${tx.hash}" target="_blank">${tx.hash.slice(0,10)}...</a></div>`;
    await tx.wait();

    // Record trade (use DAO address, consistent with launched_tokens)
    const address = await _signer.getAddress();
    const traderName = await curveResolveName(address);
    coinDbInsert('token_trades', {
      id: crypto.randomUUID().slice(0, 12),
      token_address: daoAddr.toLowerCase(), trader: address.toLowerCase(),
      trader_name: traderName, type: 'buy',
      token_amount: shareAmt.toString(), eth_amount: cost.toString(),
      tx_hash: tx.hash, created_at: new Date().toISOString()
    });

    // Auto-join chat room
    const sharesAddr = $('app')?.dataset.shares;
    if (sharesAddr) curveAfterTrade(sharesAddr, address, true);

    statusEl.innerHTML = `<div style="font-size:12px;color:var(--green)">Bought ${Number(ethers.formatEther(shareAmt)).toLocaleString()} shares! <a href="https://etherscan.io/tx/${tx.hash}" target="_blank">View tx</a></div>`;
    $('causeBuyAmount').value = '';
    setTimeout(() => refreshCauseStats(daoAddr, null), 2000);
  } catch (e) {
    if ((e.message || '').includes('user rejected') || e.code === 'ACTION_REJECTED') {
      $('causeTradeStatus').innerHTML = '<div style="font-size:12px;color:var(--fg-dim)">Cancelled</div>';
    } else {
      const msg = e.shortMessage || e.reason || (e.message || '').split('\n')[0];
      $('causeTradeStatus').innerHTML = `<div style="font-size:12px;color:var(--red)">${escText(msg.length < 100 ? msg : 'Buy failed')}</div>`;
    }
  }
}

  }
}

// ==================== DAICO COIN PAGE ====================
async function renderCoinPage(daoAddr) {
  if (_causeRefreshTimer) { clearInterval(_causeRefreshTimer); _causeRefreshTimer = null; }
  _causeChatOpen = false;
  coinRoomDisconnect();
  const gen = ++_renderGen;
  const app = $('app');
  app.innerHTML = `
    <a href="#" class="back-link">&larr; All Coins</a>
    <div class="loading">${zfiLoadingSVG(48)}Loading coin data...</div>
  `;

  // Try ClassicalCurveSale and DAICO path in parallel — use whichever matches
  try {
    const [curveData, daicoData] = await Promise.all([
      withRPC(async rpc => {
        const cs = new ethers.Contract(CURVE_SALE, CURVE_SALE_ABI, rpc);
        const c = await cs.curves(daoAddr);
        return (c.creator && c.creator !== ZERO) ? c : null;
      }).catch(() => null),
      withRPC(async rpc => {
        const helper = new ethers.Contract(VIEW_HELPER, GET_DAICO_ABI, rpc);
        return await helper.getDAICO(daoAddr, [ZERO]);
      }).catch(() => null)
    ]);
    if (gen !== _renderGen) return;

    if (curveData) {
      // Return the promise so callers (e.g. curveBuy/curveSell) that `await renderCoinPage(...)`
      // actually wait for the new panel to be on screen before releasing _curveTrading.
      return renderCurveCoinPage(daoAddr, curveData, gen);
    }

    const data = daicoData;
    if (!data) throw new Error('Coin not found');
    if (gen !== _renderGen) return;
    _coinData = data;
    _saleExactOut = false;
    _cachedQuote = null;

    const sale = data.sales && data.sales.length > 0 ? data.sales[0] : null;
    const tap = data.tap;
    const sharesAddr = data.meta.sharesToken;

    // Fetch metadata + pool reserves + ops lockup in parallel
    const feeOrHookVal = sale ? BigInt(sale.feeOrHook) : 30n;
    const poolId = computePoolId(ZERO, sharesAddr, 0n, 0n, feeOrHookVal);
    const tapActive_ = tap && tap.ratePerSec > 0n;
    const [metadata, poolResult, ethUsd] = await Promise.all([
      fetchMetadata(data.meta.contractURI),
      withRPC(async rpc => {
        const z = new ethers.Contract(ZAMM, ZAMM_POOLS_ABI, rpc);
        return await z.pools(poolId);
      }).catch(() => null),
      getEthUsd()
    ]);
    if (gen !== _renderGen) return;
    // Override icon for DAOs with configured Continuous Sale icons
    const _csConf = CONTINUOUS_SALES[daoAddr.toLowerCase()];
    if (_csConf?.icon && metadata && !metadata.image) metadata.image = _csConf.icon;
    _coinMeta = metadata;

    // Cause coin detection — render simplified sale page
    if (metadata && metadata.launchType === 'cause') {
      renderCauseCoinPage(daoAddr, data, metadata, ethUsd, gen);
      return;
    }

    if (gen !== _renderGen) return;

    const opsLockup = tapActive_ && tap.ops ? await fetchOpsLockup(sharesAddr, tap.ops, metadata) : null;
    if (gen !== _renderGen) return;

    // Sale stats
    const lpBps = sale ? Number(sale.lpBps) : 0;
    let salePct = 0, sold = 0n, totalSale = 0n, treasuryETH = 0n, saleActive = false, ethRaised = 0n;
    if (sale) {
      const detTeamBps = metadata && metadata.teamBps ? BigInt(metadata.teamBps) : 0n;
      totalSale = detTeamBps > 0n ? sale.totalSupply * (10000n - detTeamBps) / 10000n : sale.totalSupply;
      sold = totalSale > sale.remainingSupply ? totalSale - sale.remainingSupply : 0n;
      if (totalSale > 0n) salePct = Number((sold * 10000n) / totalSale) / 100;
      treasuryETH = sale.treasuryBalance;
      if (sale.forAmt > 0n) ethRaised = sold * sale.tribAmt / sale.forAmt;
      const now = BigInt(Math.floor(Date.now() / 1000));
      saleActive = sale.remainingSupply > 0n && sale.allowance > 0n && sale.forAmt > 0n && (sale.deadline === 0n || now <= BigInt(sale.deadline));
    }

    // Continuous Sale: override saleActive if a continuous sale contract is active
    const contSaleConfig = CONTINUOUS_SALES[daoAddr.toLowerCase()];
    const contSaleAddr = contSaleConfig?.sale;
    const contVaultAddr = contSaleConfig?.vault;
    let contSaleActive = false;
    if (contSaleAddr) {
      try {
        const csPaused = await withRPC(async rpc => {
          const cs = new ethers.Contract(contSaleAddr, CONTINUOUS_SALE_ABI, rpc);
          return await cs.paused();
        });
        contSaleActive = !csPaused;
      } catch {}
      if (contSaleActive) saleActive = true;
    }

    // Tap stats
    let tapPct = 0, tapVested = 0, tapTotal = 0, dailyRate = 0, tapActive = false;
    if (tap && tap.ratePerSec > 0n) {
      tapActive = true;
      const budget = tap.tapAllowance;
      // pending = total owed by time (ratePerSec * elapsed), claimable = min(pending, allowance, balance)
      const vested = tap.pending || 0n;
      if (budget > 0n) tapPct = Number((vested * 10000n) / budget) / 100;
      tapVested = Number(ethers.formatEther(vested));
      tapTotal = Number(ethers.formatEther(budget));
      dailyRate = Number(ethers.formatEther(tap.ratePerSec * 86400n));
    }

    // Price per 1M shares
    let priceDisplay = '';
    if (sale && sale.tribAmt > 0n && sale.forAmt > 0n) {
      const pricePer1M = Number(ethers.formatEther(sale.tribAmt)) / Number(ethers.formatEther(sale.forAmt)) * 1e6;
      priceDisplay = pricePer1M >= 1 ? parseFloat(pricePer1M.toFixed(2)).toString() : pricePer1M >= 0.001 ? parseFloat(pricePer1M.toFixed(4)).toString() : pricePer1M.toExponential(2);
    }

    // Market cap (pool price preferred, fallback to sale price)
    let mcapETH = 0;
    const isCollect = metadata.launchType === 'collector' || metadata.type === 'collector' || metadata.type === 'fw-collector';

    // Banner + OG meta for social sharing
    const bannerUrl = resolveIPFS(metadata.banner);
    const logoUrl = resolveIPFS(metadata.image);
    const coinName = metadata.name || data.meta.name || 'Unnamed';
    const coinSymbol = data.meta.symbol || '???';
    const ogDesc = metadata.description
      ? metadata.description.slice(0, 200)
      : `$${coinSymbol} on zFi${saleActive ? ' — sale live' : ''}${ethRaised > 0n ? ` — ${fmtETH(ethRaised)} raised` : ''}`;
    updateOGMeta(
      `$${coinSymbol} — ${coinName}`,
      ogDesc,
      bannerUrl || logoUrl || ''
    );
    let bannerHTML = '';
    if (bannerUrl) {
      bannerHTML = `<div class="coin-banner"><img src="${escAttr(bannerUrl)}" alt="" onerror="this.parentNode.style.display='none'"></div>`;
    }

    // LP info
    const feeOrHook = feeOrHookVal;
    const ethIco = `<svg width="10" height="10" viewBox="0 0 256 417" fill="currentColor" opacity="0.5" style="vertical-align:-1px"><path d="M127.961 0l-2.795 9.5v275.668l2.795 2.79 127.962-75.638z"/><path d="M127.962 0L0 212.32l127.962 75.639V154.158z"/><path d="M127.961 312.187l-1.575 1.92V414.55l1.575 4.6L256 236.587z"/><path d="M127.962 419.15V312.187L0 236.587z"/></svg>`;

    // Pool reserves (already fetched in parallel above)
    const reserve0 = poolResult ? (poolResult.reserve0 ?? poolResult[0] ?? 0n) : 0n;
    const reserve1 = poolResult ? (poolResult.reserve1 ?? poolResult[1] ?? 0n) : 0n;
    const hasPool = reserve0 > 0n || reserve1 > 0n;

    // Compute market cap (circulating): price * circulating supply
    // Circulating = total - unsold - team locked
    const detailTeamBps = metadata && metadata.teamBps ? metadata.teamBps : 0;
    const detailTotalSupply = sale ? Number(ethers.formatEther(sale.totalSupply)) : Number(COIN_SUPPLY_TOTAL);
    const detailTeamLocked = detailTeamBps > 0 ? detailTotalSupply * detailTeamBps / 10000 : 0;
    const unsold = sale ? Number(ethers.formatEther(sale.remainingSupply)) : 0;

function setTradeMode(mode) {
  _tradeMode = mode;
  _cachedQuote = null;
  // Update tab active states
  const tabs = ['Sale','Swap','Ragequit','Lp'];
  tabs.forEach(t => {
    const btn = $('modeTab' + t);
    if (btn) btn.classList.toggle('active', t.toLowerCase() === mode);
  });
  // Show/hide content sections
  ['saleMode','swapMode','ragequitMode','lpMode'].forEach(id => {
    const el = $(id);
    if (el) el.classList.toggle('active', id === mode + 'Mode');
  });
  // Update button text based on wallet state
  updateModeButton();
  loadBalances();
  if (mode === 'lp') loadLpBalance();
}

function updateModeButton() {
  const connected = !!_signer;
  if (_tradeMode === 'sale') {
    const btn = $('saleBuyBtn');
    if (btn) btn.textContent = connected ? 'Buy' : 'Connect Wallet';
  } else if (_tradeMode === 'swap') {
    const btn = $('swapBtn');
    if (btn) btn.textContent = connected ? 'Swap' : 'Connect Wallet';
  } else if (_tradeMode === 'ragequit') {
    const btn = $('rqBtn');
    if (btn) btn.textContent = connected ? 'Ragequit' : 'Connect Wallet';
  } else if (_tradeMode === 'lp') {
    const zapBtn = $('lpZapDoBtn');
    const pairBtn = $('lpPairDoBtn');
    if (zapBtn) zapBtn.textContent = connected ? 'Zap Liquidity' : 'Connect Wallet';
    if (pairBtn) pairBtn.textContent = connected ? 'Add Liquidity' : 'Connect Wallet';
  }
}

function setSwapDir(dir) {
  _swapDir = dir;
  _cachedQuote = null;
  $('swapBuyBtn').classList.toggle('active', dir === 'buy');
  $('swapSellBtn').classList.toggle('active', dir === 'sell');
  updateSwapLabels();

let _lastQuoteId = 0;
let _quoteDebounce = null;
let _cachedQuote = null; // { exactOut, tokenIn, tokenOut, amount, result, ts }

function onPayInput() {
  _exactOut = false;
  $('swapReceiveInput').value = '';
  scheduleQuote();
}

function onReceiveInput() {
  _exactOut = true;
  $('swapPayInput').value = '';
  scheduleQuote();
}

function scheduleQuote() {
  clearTimeout(_quoteDebounce);
  _quoteDebounce = setTimeout(fetchQuote, 300);
}

async function fetchQuote() {
  const raw = _exactOut ? $('swapReceiveInput').value.trim() : $('swapPayInput').value.trim();
  if (!raw || isNaN(raw) || Number(raw) <= 0) { $('swapQuote').textContent = ''; return; }

  const quoteId = ++_lastQuoteId;
  const shares = $('app').dataset.shares;
  const feeOrHook = BigInt($('app').dataset.feeOrHook || '30');

  try {
    const amount = ethers.parseEther(raw);
    const isBuy = _swapDir === 'buy';
    const tokenIn = isBuy ? ZERO : shares;
    const tokenOut = isBuy ? shares : ZERO;

    const result = await withRPC(async rpc => {
      const quoter = new ethers.Contract(ZQUOTER, QUOTE_ABI, rpc);
      return await quoter.quoteZAMM(_exactOut, feeOrHook, tokenIn, tokenOut, 0, 0, amount);
    });
    _cachedQuote = { exactOut: _exactOut, tokenIn, tokenOut, amount, result, ts: Date.now() };

    if (quoteId !== _lastQuoteId) return;

    if (_exactOut) {
      const val = Number(ethers.formatEther(result.amountIn)).toLocaleString(undefined, {maximumFractionDigits: 6});
      $('swapPayInput').value = ethers.formatEther(result.amountIn);
      $('swapQuote').textContent = `Estimated cost: ~${val}`;
    } else {
      const val = Number(ethers.formatEther(result.amountOut)).toLocaleString(undefined, {maximumFractionDigits: 6});
      $('swapReceiveInput').value = ethers.formatEther(result.amountOut);
      $('swapQuote').textContent = `Estimated output: ~${val}`;
    }
  } catch(e) {
    if (quoteId !== _lastQuoteId) return;
    $('swapQuote').textContent = 'No liquidity yet';
  }
}


let _payBalance = 0n; // raw wei balance of pay-side token
let _ethBalance = 0n;
let _sharesBalance = 0n;
let _ragequitTotalSupply = 0n; // shares + loot (for pro-rata ragequit)

async function loadBalances() {
  if (!_signer || !_coinData) return;
  const addr = await _signer.getAddress();
  const shares = _coinData.meta.sharesToken;
  const loot = _coinData.meta.lootToken;
  const daoAddr = $('app').dataset.dao;
  try {
    const erc20 = new ethers.Interface(ERC20_ABI);
    const mc3i = new ethers.Interface(MC3_ABI);
    const calls = [
      { target: MC3, allowFailure: false, callData: mc3i.encodeFunctionData('getEthBalance', [addr]) },
      { target: shares, allowFailure: true, callData: erc20.encodeFunctionData('balanceOf', [addr]) },
      { target: shares, allowFailure: true, callData: erc20.encodeFunctionData('totalSupply') },
      { target: loot, allowFailure: true, callData: erc20.encodeFunctionData('totalSupply') },
      { target: MC3, allowFailure: false, callData: mc3i.encodeFunctionData('getEthBalance', [daoAddr]) },
      { target: ZORG_TOKEN, allowFailure: true, callData: erc20.encodeFunctionData('balanceOf', [addr]) }
    ];
    const results = await withRPC(async rpc => {
      const mc = new ethers.Contract(MC3, MC3_ABI, rpc);
      return await mc.aggregate3(calls);
    });
    const decode = (abi, fn, r) => r.success ? abi.decodeFunctionResult(fn, r.returnData)[0] : 0n;
    const ethBal = decode(mc3i, 'getEthBalance', results[0]);
    const tokenBal = decode(erc20, 'balanceOf', results[1]);
    const sharesTotalSupply = decode(erc20, 'totalSupply', results[2]);
    const lootTotalSupply = decode(erc20, 'totalSupply', results[3]);
    const treasuryBal = decode(mc3i, 'getEthBalance', results[4]);
    _userIsVerified = decode(erc20, 'balanceOf', results[5]) >= ZORG_VERIFY_THRESHOLD;
    _ethBalance = ethBal;
    _sharesBalance = tokenBal;
    _ragequitTotalSupply = sharesTotalSupply + lootTotalSupply;

    // User balance display
    const balEl = $('coinUserBalance');
    if (balEl) {
      const sym = _coinData?.meta?.symbol || '???';
      if (tokenBal > 0n) {
        balEl.textContent = `Your balance: ${fmtShares(tokenBal)} $${sym}`;
        balEl.style.display = '';
      } else {
        balEl.style.display = 'none';
      }
    }

    // Swap mode balance
    const isBuy = _swapDir === 'buy';
    _payBalance = isBuy ? ethBal : tokenBal;
    const payEl = $('swapPayBal');
    if (payEl) {
      const payFmt = isBuy
        ? Number(ethers.formatEther(ethBal)).toLocaleString(undefined, {maximumFractionDigits:6}) + ' ETH'
        : fmtShares(tokenBal) + ' $' + (_coinData.meta.symbol || '???');
      payEl.textContent = payFmt;
      payEl.onclick = () => fillPct(100);
    }

    // Sale mode balance (ETH)
    const salePayEl = $('salePayBal');
    if (salePayEl) {
      salePayEl.textContent = Number(ethers.formatEther(ethBal)).toLocaleString(undefined, {maximumFractionDigits:6}) + ' ETH';
      salePayEl.onclick = () => fillPct(100);
    }

    // Ragequit mode balance (shares)
    const rqEl = $('rqSharesBal');
    if (rqEl) {
      rqEl.textContent = fmtShares(tokenBal) + ' $' + (_coinData.meta.symbol || '???');
      rqEl.onclick = () => fillPct(100);
    }

    // LP mode balances
    const ethFmt = Number(ethers.formatEther(ethBal)).toLocaleString(undefined, {maximumFractionDigits:6}) + ' ETH';
    const tokenFmtLp = fmtShares(tokenBal) + ' $' + (_coinData.meta.symbol || '???');
    const lpZapBal = $('lpZapBal');
    if (lpZapBal) { lpZapBal.textContent = ethFmt; lpZapBal.onclick = () => fillLpPct(100); }
    const lpPairEthBal = $('lpPairEthBal');
    if (lpPairEthBal) { lpPairEthBal.textContent = ethFmt; lpPairEthBal.onclick = () => fillLpPct(100); }
    const lpPairTokenBal = $('lpPairTokenBal');
    if (lpPairTokenBal) { lpPairTokenBal.textContent = tokenFmtLp; lpPairTokenBal.onclick = () => fillLpPairTokenMax(); }

    // Store treasury balance for ragequit estimate
    _coinData._treasuryEthBal = treasuryBal;

  } catch {}
}

function fillPct(pct) {
  if (_tradeMode === 'sale') {
    if (_ethBalance <= 0n) return;
    let amt = _ethBalance * BigInt(pct) / 100n;
    if (pct === 100 && amt > ethers.parseEther('0.005')) amt -= ethers.parseEther('0.005');
    if (amt <= 0n) return;
    $('salePayInput').value = ethers.formatEther(amt);
    onSalePayInput();
  } else if (_tradeMode === 'ragequit') {
    if (_sharesBalance <= 0n) return;
    let amt = _sharesBalance * BigInt(pct) / 100n;
    if (amt <= 0n) return;
    $('rqSharesInput').value = ethers.formatEther(amt);
    onRagequitInput();
  } else {
    // swap mode
    if (_payBalance <= 0n) return;
    let amt = _payBalance * BigInt(pct) / 100n;
    if (_swapDir === 'buy' && pct === 100 && amt > ethers.parseEther('0.005')) {
      amt -= ethers.parseEther('0.005');
    }
    if (amt <= 0n) return;
    $('swapPayInput').value = ethers.formatEther(amt);
    _exactOut = false;
    $('swapReceiveInput').value = '';
    scheduleQuote();
  }
}

function updateSaleBtnState() {
  const btn = $('saleBuyBtn');
  if (!btn || !_signer) return;
  const raw = ($('salePayInput').value || '').trim();
  if (!raw || isNaN(raw) || Number(raw) <= 0) {
    btn.textContent = 'Buy';
    btn.disabled = false;
    return;
  }
  try {
    const payAmt = ethers.parseEther(raw);
    if (payAmt > _ethBalance) {
      btn.textContent = 'Insufficient ETH';
      btn.disabled = true;
      return;
    }
    const isContSale = !!$('app')?.dataset?.contSale;
    if (!isContSale && _saleData && _saleData.remainingSupply <= 0n) {
      btn.textContent = 'Sale ended';
      btn.disabled = true;
      return;
    }
    if (!isContSale && _saleData) {
      const gross = payAmt * _saleData.forAmt / _saleData.tribAmt;
      if (gross > _saleData.remainingSupply) {
        btn.textContent = 'Exceeds remaining';
        btn.disabled = true;
        return;
      }
    }
  } catch {}
  btn.textContent = 'Buy';
  btn.disabled = false;
}

function updateSaleUsd() {
  const el = $('saleUsdEstimate');
  if (!el) return;
  const raw = ($('salePayInput').value || '').trim();
  if (!raw || isNaN(raw) || Number(raw) <= 0 || _ethUsdPrice <= 0) {
    el.textContent = '';
    return;
  }
  el.textContent = '~' + fmtUsd(Number(raw) * _ethUsdPrice);
}

function onSalePayInput() {
  _saleExactOut = false;
  updateSaleUsd();
  const raw = ($('salePayInput').value || '').trim();
  if (!raw || isNaN(raw) || Number(raw) <= 0) {
    $('saleReceiveInput').value = '';
    const lpEl = $('saleLpNote'); if (lpEl) lpEl.textContent = '';
    updateSaleBtnState();
    return;
  }
  const payAmt = ethers.parseEther(raw);

  // Continuous Sale: fixed rate (1 ETH = 1M shares)
  if ($('app').dataset.contSale) {
    const shares = payAmt * 1000000n;
    $('saleReceiveInput').value = ethers.formatEther(shares);
    const lpEl = $('saleLpNote'); if (lpEl) lpEl.textContent = '';
    updateSaleBtnState();
    return;
  }

  if (!_saleData || !_saleData.forAmt || !_saleData.tribAmt) return;
  const gross = payAmt * _saleData.forAmt / _saleData.tribAmt;
  const lpBps = BigInt(_saleData.lpBps);
  const lpShares = gross * lpBps / 10000n;
  const net = gross - lpShares;
  $('saleReceiveInput').value = ethers.formatEther(net);
  if (lpBps > 0n) {
    $('saleLpNote').textContent = `~${fmtShares(net)} shares (${Number(lpBps)/100}% to LP)`;
  } else {
    $('saleLpNote').textContent = '';
  }
  updateSaleBtnState();
}

function onSaleReceiveInput() {
  _saleExactOut = true;
  const raw = ($('saleReceiveInput').value || '').trim();
  if (!raw || isNaN(raw) || Number(raw) <= 0) {
    $('salePayInput').value = '';
    updateSaleUsd();
    const lpEl = $('saleLpNote'); if (lpEl) lpEl.textContent = '';
    return;
  }

  // Continuous Sale: fixed rate (1M shares per ETH)
  if ($('app').dataset.contSale) {
    const shares = ethers.parseEther(raw);
    const ethNeeded = shares / 1000000n;
    $('salePayInput').value = ethers.formatEther(ethNeeded);
    updateSaleUsd();
    updateSaleBtnState();
    return;
  }

  if (!_saleData || !_saleData.forAmt || !_saleData.tribAmt) return;
  const buyAmt = ethers.parseEther(raw);
  const lpBps = BigInt(_saleData.lpBps);
  // grossNeeded = ceil(buyAmt * 10000 / (10000 - lpBps))
  const denom = 10000n - lpBps;
  if (denom === 0n) { $('salePayInput').value = ''; $('saleLpNote').textContent = ''; return; }
  const grossNeeded = (buyAmt * 10000n + denom - 1n) / denom;
  // payNeeded = ceil(grossNeeded * tribAmt / forAmt)
  const payNeeded = (grossNeeded * _saleData.tribAmt + _saleData.forAmt - 1n) / _saleData.forAmt;
  $('salePayInput').value = ethers.formatEther(payNeeded);
  updateSaleUsd();
  if (lpBps > 0n) {
    $('saleLpNote').textContent = `~${fmtShares(buyAmt)} shares (${Number(lpBps)/100}% to LP)`;
  } else {
    $('saleLpNote').textContent = '';
  }
  updateSaleBtnState();
}

function fillSweep() {
  if (!_saleData || !_saleData.forAmt || !_saleData.tribAmt || _saleData.remainingSupply <= 0n) return;
  const lpBps = BigInt(_saleData.lpBps);
  // remainingSupply is gross (includes LP portion), net to buyer = remaining * (10000 - lpBps) / 10000
  const net = _saleData.remainingSupply * (10000n - lpBps) / 10000n;
  // cost = ceil(remainingSupply * tribAmt / forAmt)
  const payNeeded = (_saleData.remainingSupply * _saleData.tribAmt + _saleData.forAmt - 1n) / _saleData.forAmt;
  $('saleReceiveInput').value = ethers.formatEther(net);
  $('salePayInput').value = ethers.formatEther(payNeeded);
  updateSaleUsd();
  _saleExactOut = false;
  if (lpBps > 0n) {
    $('saleLpNote').textContent = `~${fmtShares(net)} shares (${Number(lpBps)/100}% to LP)`;
  } else {
    $('saleLpNote').textContent = '';
  }
}

async function executeSaleBuy() {
  const s = await connectWallet();
  if (!s) return;

  const payRaw = ($('salePayInput').value || '').trim();
  const recvRaw = ($('saleReceiveInput').value || '').trim();
  if (!payRaw || isNaN(payRaw) || Number(payRaw) <= 0) return;

  const daoAddr = $('app').dataset.dao;
  const contSaleAddr = $('app').dataset.contSale;
  const btn = $('saleBuyBtn');
  btn.textContent = 'Confirm in wallet...';
  btn.disabled = true;

  try {
    const payAmt = ethers.parseEther(payRaw);

    // Route to Continuous Sale if available
    if (contSaleAddr) {
      const cs = new ethers.Contract(contSaleAddr, CONTINUOUS_SALE_ABI, s);
      const tx = await cs.buy({ value: payAmt });
      btn.innerHTML = `Confirming... <a href="https://etherscan.io/tx/${tx.hash}" target="_blank" style="font-size:11px;color:inherit;opacity:0.7">View tx</a>`;
      await tx.wait();
      const quoteEl = $('saleQuote');
      if (quoteEl) quoteEl.innerHTML = `<span style="color:var(--green)">Purchase confirmed!</span> <a href="https://etherscan.io/tx/${tx.hash}" target="_blank" style="font-size:11px">View tx</a>`;
      $('salePayInput').value = '';
      if ($('saleReceiveInput')) $('saleReceiveInput').value = '';
      btn.textContent = 'Buy';
      btn.disabled = false;
      setTimeout(() => renderCoinPage(daoAddr), 2000);
      return;
    }

    if (!_saleData) return;
    if (!recvRaw || isNaN(recvRaw) || Number(recvRaw) <= 0) return;

    const daico = new ethers.Contract(DAICO_ADDR, DAICO_BUY_ABI, s);
    const netShares = ethers.parseEther(recvRaw);

    let tx;
    if (_saleExactOut) {
      // exact-out: get exact buyAmt, pay up to 5% more
      const maxPay = payAmt * 105n / 100n;
      tx = await daico.buyExactOut(daoAddr, ZERO, netShares, maxPay, { value: maxPay });
    } else {
      // exact-in: pay exact payAmt, get at least 95% of estimate
      const minBuyAmt = netShares * 95n / 100n;
      tx = await daico.buy(daoAddr, ZERO, payAmt, minBuyAmt, { value: payAmt });
    }
    btn.innerHTML = `Confirming... <a href="https://etherscan.io/tx/${tx.hash}" target="_blank" style="font-size:11px;color:inherit;opacity:0.7">View tx</a>`;
    await tx.wait();

    const quoteEl = $('saleQuote');
    if (quoteEl) quoteEl.innerHTML = `<span style="color:var(--green)">Purchase confirmed!</span> <a href="https://etherscan.io/tx/${tx.hash}" target="_blank" style="font-size:11px">View tx</a>`;
    $('salePayInput').value = '';
    $('saleReceiveInput').value = '';
    $('saleLpNote').textContent = '';

    setTimeout(() => renderCoinPage(daoAddr), 2000);
    const adEl = $('activityDrawer');
    if (adEl && adEl.dataset.loaded) setTimeout(() => refreshActivity(adEl.dataset.poolId), 4000);
  } catch(e) {
    console.error('Sale buy error:', e);
    const quoteEl = $('saleQuote');
    if (e.code === 'ACTION_REJECTED' || (e.message||'').includes('user rejected')) {
      if (quoteEl) quoteEl.textContent = 'Cancelled';
    } else {
      const raw = (e.shortMessage || e.reason || e.message || '').split('\n')[0];
      let msg = raw;
      if (/insufficient funds/i.test(raw)) msg = 'Insufficient ETH balance (including gas)';
      else if (/exceeds balance/i.test(raw)) msg = 'Amount exceeds your ETH balance';
      else if (/allowance|supply/i.test(raw)) msg = 'Exceeds remaining sale supply';
      else if (/deadline|expired/i.test(raw)) msg = 'Sale has ended';
      else if (/slippage|amount/i.test(raw)) msg = 'Price moved — try again';
      if (quoteEl) quoteEl.innerHTML = `<span style="color:var(--red)">Buy failed:</span> ${escText(msg)}`;
    }
  } finally {
    btn.textContent = 'Buy';
    btn.disabled = false;
  }
}
