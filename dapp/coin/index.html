          const progressPct = Number(progressETH * 10000n / MINT_PRICE) / 100;
          const nfts = Number(nftCount);
          const nextN = nfts + 1;
          mintProgress.innerHTML = `
            <div style="margin-top:6px;padding:10px 12px;border-radius:10px;background:var(--surface-raised, var(--surface))">
              <div class="stat-row"><span class="stat-label" style="font-size:12px">Progress to NFT #${nextN}</span><span class="stat-value" style="font-size:12px;color:var(--green)">${fmtETH(progressETH)} / ${ethers.formatEther(MINT_PRICE)} ${ethIco}</span></div>
              ${pctBar(Math.min(progressPct, 100), 'var(--green)')}
              <div style="font-size:10px;color:var(--fg-dim);margin-top:4px">${nfts > 0 ? `${nfts} NFT${nfts > 1 ? 's' : ''} minted` : 'Treasury ETH flows to minter to purchase FW S02 NFTs'}</div>
            </div>`;
        }
        const fwEl = $('fwCollectorInfo');
        if (fwEl) {
          const nfts = Number(nftCount);
          const mBal = Number(ethers.formatEther(minterBal));
          const lEth = Number(ethers.formatEther(lockedEth));
          fwEl.innerHTML = `
            <div class="stat-row"><span class="stat-label"><a href="https://etherscan.io/address/${minterAddr}" target="_blank" style="color:inherit;text-decoration:none;border-bottom:1px dotted var(--fg-muted)">Minter</a> balance</span><span class="stat-value">${fmtNum(mBal)} ${ethIco}</span></div>
            ${nfts > 0 ? `<div class="stat-row"><span class="stat-label">NFTs in vault</span><span class="stat-value">${nfts}</span></div>` : ''}
            ${nfts > 0 ? `<div class="stat-row"><span class="stat-label">Locked ETH</span><span class="stat-value">${fmtNum(lEth)} ${ethIco}</span></div>` : ''}
          `;
        }
        const tmEl = $('treasuryMinterBal');
        if (tmEl) tmEl.innerHTML = `${fmtETH(minterBal)} ${ethIco}`;
      } catch (e) { console.error('Mint progress refresh failed:', e); }
    }
    loadBalances();
    updateSaleBtnState();
  } catch {}
}

function route() {
  if (_activityInterval) { clearInterval(_activityInterval); _activityInterval = null; }
  if (_saleRefreshInterval) { clearInterval(_saleRefreshInterval); _saleRefreshInterval = null; }
  if (_saleCountdownInterval) { clearInterval(_saleCountdownInterval); _saleCountdownInterval = null; }
  coinRoomDisconnect();
  if (_causeRefreshTimer) { clearInterval(_causeRefreshTimer); _causeRefreshTimer = null; }
  _causeBuyMode = 'shares';
  if (_curveQuoteTimer) { clearTimeout(_curveQuoteTimer); _curveQuoteTimer = null; }
  if (_curveZammQuoteTimer) { clearTimeout(_curveZammQuoteTimer); _curveZammQuoteTimer = null; }
  const hash = location.hash.replace('#','').trim();
  if (hash && hash.startsWith('0x') && hash.length === 42) {
    renderCoinPage(hash);
  } else {
    renderGallery();
  }
}

window.addEventListener('hashchange', route);

// ==================== GALLERY ====================

async function renderGallery() {
  const gen = ++_renderGen;
  updateOGMeta('COIN', 'Trade coins on zFi - the most secure-by-default exchange', '');
  const app = $('app');
  app.innerHTML = `
    <div class="header">
      <h1>Coins</h1>
      <div><a href="../" class="nav-link">Swap</a> &middot; <a href="../dao/" class="nav-link">DAO</a></div>
    </div>
    <div class="loading">${zfiLoadingSVG(48)}Scanning for coins...</div>
  `;

  try {
    // Fetch DAICOs, ClassicalCurveSale tokens, and NFT auctions in parallel.
    const [daicos, curveTokenAddrs, causeTokenRows, nftAuctions] = await Promise.all([
      withRPC(async rpc => {
        const helper = new ethers.Contract(VIEW_HELPER, SCAN_ABI, rpc);
        return await helper.scanDAICOs(0, 500, [ZERO]);
      }),
      fetchCurveTokenList(),
      fetchCauseTokenList(),
      fetchNftAuctions()
    ]);

    if ((!daicos || daicos.length === 0) && curveTokenAddrs.length === 0 && causeTokenRows.length === 0 && nftAuctions.length === 0) {
      app.innerHTML = `
        <div class="header">
          <h1>Coins</h1>
          <div><a href="../" class="nav-link">Swap</a> &middot; <a href="../dao/" class="nav-link">DAO</a></div>
        </div>
        <div class="loading">No coins found yet. <a href="../#coin">Launch one</a>.</div>
      `;
      return;
    }

    // Exclude test coins
    const EXCLUDED_COINS = new Set([
      '0xd77F85a19D242391CeEf95e2D7fe35E251593f28',
      '0x816f6f801a525eef715BF015704C2672A0abf018',
      '0x729B47e8e4fBE54268E70a169398E7a5DCA579d1',
      '0xC455Dc876E1cF371cFf6ef5af85dA7675E3d2281',
      '0x7dDECc13905448159d5462bF49ac7C48f348d18C',
      '0xF792394938E553eA4cdbFa984509550A5fe335e5'
    ].map(a => a.toLowerCase()));
    let filtered = (daicos || []).filter(d => !EXCLUDED_COINS.has(d.dao.toLowerCase()));

    // Identify cause coins from Supabase not in scanDAICOs
    const daicoAddrSet = new Set(filtered.map(d => d.dao.toLowerCase()));
    const missingCauseRows = causeTokenRows.filter(r => !daicoAddrSet.has(r.token_address.toLowerCase()) && !EXCLUDED_COINS.has(r.token_address.toLowerCase()));

    // Load cached spam list synchronously (zero latency), refresh in background
    loadSpamListCached();
    loadSpamListFresh(); // fire-and-forget; updates _spamSet + localStorage for next visit

    // Fetch metadata, pool reserves, and ETH/USD price in parallel
    // Batch ZORG balance check into the same multicall3 as pool reserves
    const zammI = new ethers.Interface(ZAMM_POOLS_ABI);
    const erc20I = new ethers.Interface(ERC20_ABI);
    const poolCalls = filtered.map(d => {
      const sale = d.sales && d.sales.length > 0 ? d.sales[0] : null;
      const feeOrHook = sale ? BigInt(sale.feeOrHook) : 30n;
      const poolId = computePoolId(ZERO, d.meta.sharesToken, 0n, 0n, feeOrHook);
      return { target: ZAMM, allowFailure: true, callData: zammI.encodeFunctionData('pools', [poolId]) };
    });
    // Append ZORG balance check to the same multicall batch (if wallet connected)
    if (_connectedAddress) {
      poolCalls.push({ target: ZORG_TOKEN, allowFailure: true, callData: erc20I.encodeFunctionData('balanceOf', [_connectedAddress]) });
    }

    // Build activity map from cache or prepare to fetch in parallel
    const INACTIVE_DAYS = 3;
    const INACTIVE_MS = INACTIVE_DAYS * 86400 * 1000;
    const ACTIVITY_CACHE_KEY = 'zfi_activity_cache';
    const ACTIVITY_CACHE_TTL = 30 * 60 * 1000; // 30 minutes
    let activityMap = {}; // token address (lowercase) -> updatedAt (ms)
    let activityCached = false;
    try {
      const cached = JSON.parse(localStorage.getItem(ACTIVITY_CACHE_KEY) || '{}');
      if (cached._ts && (Date.now() - cached._ts) < ACTIVITY_CACHE_TTL) {
        activityMap = cached;
        activityCached = true;
      }
    } catch {}

    // Fetch metadata, pool reserves, ETH/USD price, pool activity, and curve data ALL in parallel
    const activityPromise = activityCached ? Promise.resolve(null) :
      fetch(INDEXER + '/graphql', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: '{ pools(limit: 1000) { items { token0 token1 updatedAt } } }' })
      }).then(r => r.json()).catch(() => null);

    // Build curve multicall in advance so it runs in parallel with DAICO data
    const daicoAddrs = new Set(filtered.map(d => d.dao.toLowerCase()));
    const curveAddrs = curveTokenAddrs.filter(a => !daicoAddrs.has(a.toLowerCase()) && !EXCLUDED_COINS.has(a.toLowerCase()));
    const csIface = curveAddrs.length > 0 ? new ethers.Interface(CURVE_SALE_ABI) : null;
    const curveUriI = curveAddrs.length > 0 ? new ethers.Interface(['function contractURI() view returns (string)']) : null;
    const curveNameI = curveAddrs.length > 0 ? new ethers.Interface(['function name() view returns (string)', 'function symbol() view returns (string)']) : null;
    let curveMcCalls = [];
    for (const addr of curveAddrs) {
      curveMcCalls.push(
        { target: CURVE_SALE, allowFailure: true, callData: csIface.encodeFunctionData('curves', [addr]) },
        { target: addr, allowFailure: true, callData: curveUriI.encodeFunctionData('contractURI') },
        { target: addr, allowFailure: true, callData: curveNameI.encodeFunctionData('name') },
        { target: addr, allowFailure: true, callData: curveNameI.encodeFunctionData('symbol') }
      );
    }

    const [allMetadata, mcResults, ethUsd, activityGql, curveMcRes] = await Promise.all([
      Promise.all(filtered.map(d => fetchMetadata(d.meta.contractURI))),
      withRPC(async rpc => {
        const mc = new ethers.Contract(MC3, MC3_ABI, rpc);
        return await mc.aggregate3(poolCalls);
      }).catch(() => poolCalls.map(() => ({ success: false }))),
      getEthUsd(),
      activityPromise,
      curveMcCalls.length > 0 ? withRPC(async rpc => {
        const mc = new ethers.Contract(MC3, MC3_ABI, rpc);
        return await mc.aggregate3(curveMcCalls);
      }).catch(() => curveMcCalls.map(() => ({ success: false }))) : Promise.resolve([])
    ]);

    // Process activity results if freshly fetched
    if (activityGql && !activityCached) {
      const pools = activityGql?.data?.pools?.items || [];
      for (const p of pools) {
        const token = (p.token1 && p.token1 !== '0x0000000000000000000000000000000000000000') ? p.token1
                    : (p.token0 && p.token0 !== '0x0000000000000000000000000000000000000000') ? p.token0
                    : null;
        if (!token) continue;
        const key = token.toLowerCase();
        const ts = Number(p.updatedAt);
        if (!activityMap[key] || ts > activityMap[key]) activityMap[key] = ts;
      }
      activityMap._ts = Date.now();
      try { localStorage.setItem(ACTIVITY_CACHE_KEY, JSON.stringify(activityMap)); } catch {}
    }

    // Extract pool results (first N entries) and ZORG balance (last entry if wallet connected)
    const poolResults = mcResults.slice(0, filtered.length);
    if (_connectedAddress && mcResults.length > filtered.length) {
      const zorgResult = mcResults[filtered.length];
      try {
        const bal = zorgResult.success ? erc20I.decodeFunctionResult('balanceOf', zorgResult.returnData)[0] : 0n;
        _userIsVerified = bal >= ZORG_VERIFY_THRESHOLD;
      } catch { _userIsVerified = false; }
    }
    if (gen !== _renderGen) return;

    const cards = [];
    let testCount = 0;
    let lowMcapCount = 0;
    let spamCount = 0;
    let inactiveCount = 0;
    let legacyCount = 0;
    for (let i = 0; i < filtered.length; i++) {
      const d = filtered[i];
      const md = allMetadata[i];
      const _cs = CONTINUOUS_SALES[d.dao.toLowerCase()];
      if (_cs?.icon && md && !md.image) md.image = _cs.icon;
      const sale = d.sales && d.sales.length > 0 ? d.sales[0] : null;

      let salePct = 0;
      if (sale && sale.totalSupply > 0n) {
        const saleTeamBps = md && md.teamBps ? BigInt(md.teamBps) : 0n;
        const saleAlloc = saleTeamBps > 0n ? sale.totalSupply * (10000n - saleTeamBps) / 10000n : sale.totalSupply;
        const soldShares = saleAlloc > sale.remainingSupply ? saleAlloc - sale.remainingSupply : 0n;
        if (saleAlloc > 0n) salePct = Number((soldShares * 10000n) / saleAlloc) / 100;
      }

      const now = BigInt(Math.floor(Date.now() / 1000));
      const contSaleConfig = CONTINUOUS_SALES[d.dao.toLowerCase()];
      const hasContSale = !!contSaleConfig;
      const saleActive = hasContSale || (sale && sale.remainingSupply > 0n && sale.allowance > 0n && sale.forAmt > 0n && (sale.deadline === 0n || now <= BigInt(sale.deadline)));

      // Market cap (circulating): price * circulating supply
      // Circulating = total - unsold - team locked
      let mcapETH = 0;
      let poolR0 = 0n;
      let poolR1 = 0n;
      const pr = poolResults[i];
      if (pr && pr.success) {
        try {
          const decoded = zammI.decodeFunctionResult('pools', pr.returnData);
          poolR0 = decoded[0];
          poolR1 = decoded[1];
        } catch(e) {}
      }
      const coinTotalSupply = sale ? Number(ethers.formatEther(sale.totalSupply)) : Number(COIN_SUPPLY_TOTAL);
      const treasuryETH = sale ? sale.treasuryBalance : 0n;
      const teamBps = md && md.teamBps ? md.teamBps : 0;
      const teamLocked = teamBps > 0 ? coinTotalSupply * teamBps / 10000 : 0;
      const unsold = sale ? Number(ethers.formatEther(sale.remainingSupply)) : 0;
      const circulating = coinTotalSupply - unsold - teamLocked;
      // Price: pool spot if sale ended or pool is deep, else sale price
      const lpTokens = Number(ethers.formatEther(poolR1));
      const hasPool = poolR0 > 0n && poolR1 > 0n;
      const poolDeep = hasPool && lpTokens > coinTotalSupply * 0.01;
      const usePool = hasPool && (!saleActive || poolDeep);
      if (circulating > 0) {
        if (hasContSale && treasuryETH > 0n) {
          // Collector DAO: treasury-backed valuation (ragequittable ETH)
          mcapETH = Number(ethers.formatEther(treasuryETH));
        } else if (usePool) {
          mcapETH = (Number(ethers.formatEther(poolR0)) / lpTokens) * circulating;
        } else if (sale && sale.tribAmt > 0n && sale.forAmt > 0n) {
          mcapETH = (Number(ethers.formatEther(sale.tribAmt)) / Number(ethers.formatEther(sale.forAmt))) * circulating;
        }
      }
      const mcapDisplay = mcapETH > 1e-6 ? fmtMcap(mcapETH) : '';
      const mcapUsd = mcapETH > 1e-6 && ethUsd > 0 ? fmtUsd(mcapETH * ethUsd) : '';

      const cardName = (md.name || d.meta.name || '').toLowerCase();
      const cardSym = (md.symbol || d.meta.symbol || '').toLowerCase();
      const cardAddr = d.dao.toLowerCase();
      const isCause = md && md.launchType === 'cause';
      const isTest = cardName === 'test';
      if (isTest) testCount++;
      const isLowMcap = !isTest && !isCause && mcapETH < 0.05;
      if (isLowMcap) lowMcapCount++;
      const isSpam = _spamSet.has(cardAddr);
      if (isSpam) spamCount++;
      const spamBtnHTML = _userIsVerified && !isSpam ? `<button class="spam-btn" title="Flag as spam" onclick="event.preventDefault();event.stopPropagation();flagCoinAsSpam('${cardAddr}')"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>` : '';
      const isCollect = md && (md.launchType === 'collector' || md.type === 'collector' || md.type === 'fw-collector');
      const isFund = md && md.launchType === 'fund';
      const isLegacy = !isCause && !isCollect && (isFund || (md && md.template && !md.launchType));
      if (isLegacy) legacyCount++;

      // Determine if coin is inactive (no trades in last 3 days)
      // FWC collector DAO is always shown
      const ALWAYS_SHOW = ['0xe7aa6ca3a9ca3fe92a425dfead24900b9bf49853'];
      let isInactive = false;
      if (hasPool && !isSpam && !isCause && !ALWAYS_SHOW.includes(d.dao.toLowerCase())) {
        const tokenKey = d.meta.sharesToken.toLowerCase();
        const updatedAtMs = activityMap[tokenKey];
        // Only mark inactive if we have a real updatedAt that's older than 3 days
        if (typeof updatedAtMs === 'number' && updatedAtMs > 0 && (Date.now() - updatedAtMs) > INACTIVE_MS) {
          isInactive = true;
          inactiveCount++;
        }
      }

      const cardHTML = `
        <a href="#${d.dao}" class="coin-card${isTest ? ' coin-test' : ''}${isSpam ? ' coin-spam' : ''}${isInactive ? ' coin-inactive' : ''}${isLegacy ? ' coin-legacy' : ''}${isLowMcap ? ' coin-lowmcap' : ''}" data-name="${escText(cardName)}" data-symbol="${escText(cardSym)}" data-addr="${cardAddr}" style="position:relative">
          ${spamBtnHTML}
          <div class="coin-card-head">
            <div class="coin-logo">${logoHTML(d.meta, md)}</div>
            <div>
              <div class="coin-card-name">${escText(d.meta.name || 'Unnamed')}</div>
              <div class="coin-card-symbol">$${escText(d.meta.symbol || '???')}${md && md.launchType === 'cause' ? `<span class="coin-tpl-badge coin-tpl-simple" title="DAICO fundraise &middot; ragequittable">cause</span>` : md && md.launchType === 'curve' ? `<span class="coin-tpl-badge coin-tpl-simple" title="bonding curve &middot; permanent LP">curve</span>` : md && (md.launchType === 'collector' || md.type === 'collector' || md.type === 'fw-collector') ? `<span class="coin-tpl-badge coin-tpl-simple" title="collector DAO">collect</span>` : md && md.launchType === 'fund' ? `<span class="coin-tpl-badge coin-tpl-simple" title="fund launch &middot; ops allocation &middot; tap vesting &middot; governance">fund</span>` : md && md.template ? `<span class="coin-tpl-badge" title="${escText(md.template)} template"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span>` : ''}</div>
            </div>
          </div>
          ${isCause && md.description
            ? `<div class="coin-card-stat" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${escText(md.description)}</div>`
            : `<div class="coin-card-bar">${'█'.repeat(Math.round(Math.min(salePct,100) / 10))}${'░'.repeat(10 - Math.round(Math.min(salePct,100) / 10))}</div>
          <div class="coin-card-stat">${hasContSale ? 'Continuous sale' : saleActive ? `${salePct.toFixed(1)}% sold` : 'Sale ended'}</div>`}
          ${hasContSale
            ? `<div class="coin-card-mcap" style="color:var(--fg-muted);font-weight:400">Collector DAO</div>`
            : (isCollect && treasuryETH > 0n)
            ? `<div class="coin-card-mcap">Treasury ${fmtMcap(Number(ethers.formatEther(treasuryETH)))}${ethUsd > 0 ? ` <span class="usd">${fmtUsd(Number(ethers.formatEther(treasuryETH)) * ethUsd)}</span>` : ''}</div>`
            : mcapDisplay ? `<div class="coin-card-mcap">MCap ${mcapDisplay}${mcapUsd ? ` <span class="usd">${mcapUsd}</span>` : ''}</div>` : ''}
        </a>
      `;
      cards.push({ html: cardHTML, key: cardName + '|' + cardSym, mcap: mcapETH, r0: poolR0, poolDeep, saleActive, isTest, isSpam, isInactive, isLegacy, isLowMcap, isCause });
    }

    // ── Curve coin cards (multicall data already fetched in Phase 2 above) ──
    if (curveAddrs.length > 0 && curveMcRes.length > 0) {
      // Fetch all curve metadata in parallel
      const curveMetaPromises = curveAddrs.map((_, i) => {
        const uriRes = curveMcRes[i * 4 + 1];
        if (!uriRes || !uriRes.success) return Promise.resolve(null);
        try {
          const uri = curveUriI.decodeFunctionResult('contractURI', uriRes.returnData)[0];
          return uri ? fetchMetadata(uri).catch(() => null) : Promise.resolve(null);
        } catch { return Promise.resolve(null); }
      });
      const curveMetadatas = await Promise.all(curveMetaPromises);
      if (gen !== _renderGen) return;

      for (let i = 0; i < curveAddrs.length; i++) {
        const tokenAddr = curveAddrs[i];
        const cRes = curveMcRes[i * 4];
        if (!cRes.success) continue;
        let curve;
        try { curve = csIface.decodeFunctionResult('curves', cRes.returnData); } catch { continue; }
        if (!curve.creator || curve.creator === ZERO) continue;

        const cMeta = curveMetadatas[i] || {};
        let cName, cSym;
        try { cName = curveNameI.decodeFunctionResult('name', curveMcRes[i * 4 + 2].returnData)[0]; } catch { cName = cMeta.name || 'Unknown'; }
        try { cSym = curveNameI.decodeFunctionResult('symbol', curveMcRes[i * 4 + 3].returnData)[0]; } catch { cSym = cMeta.symbol || '???'; }

        const sold = BigInt(curve.sold);
        const cap = BigInt(curve.cap);
        const virtualReserve = BigInt(curve.virtualReserve);
        const startPrice = BigInt(curve.startPrice);
        const raisedETH = BigInt(curve.raisedETH);
        const graduated = curve.graduated;
        const seeded = curve.seeded;

        const remaining = virtualReserve - sold;
        const spotPrice = remaining > 0n ? (startPrice * virtualReserve * virtualReserve) / (remaining * remaining) : 0n;
        const spotPriceEth = Number(spotPrice) / 1e18;
        const salePct = cap > 0n ? Number((sold * 10000n) / cap) / 100 : 0;
        const curveMcap = spotPriceEth * 1e9; // 1B supply FDV
        const cSaleActive = !graduated && cap > 0n && sold < cap;

        const cCardName = cName.toLowerCase();
        const cCardSym = cSym.toLowerCase();
        const cCardAddr = tokenAddr.toLowerCase();
        const isTest = cCardName === 'test';
        if (isTest) { testCount++; }
        const isLowMcap = !isTest && !cSaleActive && curveMcap < 0.05;
        if (isLowMcap) lowMcapCount++;
        const isSpam = _spamSet.has(cCardAddr);
        if (isSpam) spamCount++;
        const spamBtnHTML = _userIsVerified && !isSpam ? `<button class="spam-btn" title="Flag as spam" onclick="event.preventDefault();event.stopPropagation();flagCoinAsSpam('${cCardAddr}')"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>` : '';

        const mcapDisplay = curveMcap > 1e-6 ? fmtMcap(curveMcap) : '';
        const mcapUsd = curveMcap > 1e-6 && ethUsd > 0 ? fmtUsd(curveMcap * ethUsd) : '';
        const statusText = seeded ? 'Graduated' : graduated ? 'Ready to LP' : `${salePct.toFixed(1)}% sold`;
        const logoImg = cMeta.image ? resolveIPFS(cMeta.image) : null;
        const logoEl = logoImg
          ? `<img src="${escAttr(logoImg)}" alt="" style="width:40px;height:40px;border-radius:50%;object-fit:cover" onerror="this.parentNode.innerHTML=symbolSVG(${escAttr(JSON.stringify(cSym))},40)">`
          : symbolSVG(cSym, 40);

        const cCardHTML = `
          <a href="#${tokenAddr}" class="coin-card${isTest ? ' coin-test' : ''}${isSpam ? ' coin-spam' : ''}${isLowMcap ? ' coin-lowmcap' : ''}" data-name="${escText(cCardName)}" data-symbol="${escText(cCardSym)}" data-addr="${cCardAddr}" style="position:relative">
            ${spamBtnHTML}
            <div class="coin-card-head">
              <div class="coin-logo">${logoEl}</div>
              <div>
                <div class="coin-card-name">${escText(cName)}</div>
                <div class="coin-card-symbol">$${escText(cSym)}<span class="coin-tpl-badge coin-tpl-simple" title="bonding curve &middot; permanent LP">curve</span></div>
              </div>
            </div>
            <div class="coin-card-bar">${'█'.repeat(Math.round(Math.min(salePct,100) / 10))}${'░'.repeat(10 - Math.round(Math.min(salePct,100) / 10))}</div>
            <div class="coin-card-stat">${statusText}</div>
            ${mcapDisplay ? `<div class="coin-card-mcap">FDV ${mcapDisplay}${mcapUsd ? ` <span class="usd">${mcapUsd}</span>` : ''}</div>` : ''}
          </a>
        `;
        cards.push({ html: cCardHTML, key: cCardName + '|' + cCardSym, mcap: curveMcap, r0: 0n, poolDeep: false, saleActive: cSaleActive, isTest, isSpam, isInactive: false, isLegacy: false, isLowMcap, isCause: false });
      }
    }

    // Build cards for Supabase cause coins not in scanDAICOs
    for (const row of missingCauseRows) {
      const cAddr = row.token_address;
      const cName = row.name || 'Unnamed';
      const cSym = row.symbol || '???';
      const cCardName = cName.toLowerCase();
      const cCardSym = cSym.toLowerCase();
      const cCardAddr = cAddr.toLowerCase();
      const isSpam = _spamSet.has(cCardAddr);
      if (isSpam) spamCount++;
      const spamBtnHTML = _userIsVerified && !isSpam ? `<button class="spam-btn" title="Flag as spam" onclick="event.preventDefault();event.stopPropagation();flagCoinAsSpam('${cCardAddr}')"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>` : '';
      const logoImg = row.image ? resolveIPFS(row.image) : null;
      const logoEl = logoImg
        ? `<img src="${escAttr(logoImg)}" alt="" style="width:40px;height:40px;border-radius:50%;object-fit:cover" onerror="this.parentNode.innerHTML=symbolSVG(${escAttr(JSON.stringify(cSym))},40)">`
        : symbolSVG(cSym, 40);
      const causeCardHTML = `
        <a href="#${cAddr}" class="coin-card${isSpam ? ' coin-spam' : ''}" data-name="${escText(cCardName)}" data-symbol="${escText(cCardSym)}" data-addr="${cCardAddr}" style="position:relative">
          ${spamBtnHTML}
          <div class="coin-card-head">
            <div class="coin-logo">${logoEl}</div>
            <div>
              <div class="coin-card-name">${escText(cName)}</div>
              <div class="coin-card-symbol">$${escText(cSym)}<span class="coin-tpl-badge coin-tpl-simple" title="DAICO fundraise &middot; ragequittable">cause</span></div>
            </div>
          </div>
          ${row.description
            ? `<div class="coin-card-stat" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${escText(row.description)}</div>`
            : `<div class="coin-card-bar">░░░░░░░░░░</div>
          <div class="coin-card-stat">New</div>`}
        </a>
      `;
      cards.push({ html: causeCardHTML, key: cCardName + '|' + cCardSym, mcap: 0, r0: 0n, poolDeep: false, saleActive: true, isTest: false, isSpam, isInactive: false, isLegacy: false, isLowMcap: false, isCause: true });
    }

    // Group by name|symbol, stack duplicates (exclude spam/inactive from grouping)
    const groups = new Map();
    const spamCards = [];
    const inactiveCards = [];
    const legacyCards = [];
    const lowMcapCards = [];
    for (const c of cards) {
      if (c.isSpam) { spamCards.push(c); continue; }
      if (c.isInactive) { inactiveCards.push(c); continue; }
      if (c.isLegacy) { legacyCards.push(c); continue; }
      if (c.isLowMcap) { lowMcapCards.push(c); continue; }
      if (!groups.has(c.key)) groups.set(c.key, []);
      groups.get(c.key).push(c);
    }
    let stackedCount = 0;
    let grid = '';
    const sortedGroups = [...groups.values()];
    for (const group of sortedGroups) group.sort((a, b) => b.mcap - a.mcap);
    // Cause coins first, then finalized by liquidity, then in-sale by mcap
    sortedGroups.sort((a, b) => {
      const aTop = a[0], bTop = b[0];
      if (aTop.isCause !== bTop.isCause) return aTop.isCause ? -1 : 1;
      const aFinalized = !aTop.saleActive;
      const bFinalized = !bTop.saleActive;
      if (aFinalized !== bFinalized) return aFinalized ? -1 : 1;
      if (aFinalized) return aTop.r0 > bTop.r0 ? -1 : aTop.r0 < bTop.r0 ? 1 : 0;
      return bTop.mcap - aTop.mcap;
    });
    for (const group of sortedGroups) {
      if (group.length === 1) {
        grid += group[0].html;
      } else {
        const extra = group.length - 1;
        stackedCount += extra;
        grid += `<div class="coin-stack">`;
        grid += `<span class="coin-stack-badge" onclick="event.preventDefault();toggleStack(this)">+${extra} more</span>`;
        grid += group[0].html;
        for (let j = 1; j < group.length; j++) {
          grid += group[j].html.replace('class="coin-card', 'class="coin-card coin-stacked');
        }
        grid += `</div>`;
      }
    }
    // Append hidden cards individually (hidden by CSS, searchable)
    for (const c of lowMcapCards) grid += c.html;
    for (const c of legacyCards) grid += c.html;
    for (const c of inactiveCards) grid += c.html;
    for (const c of spamCards) grid += c.html;

    // NFT auctions: enrich with metadata in parallel, render, and prepend so
    // time-sensitive listings land at the top of the gallery. Failures per
    // auction fall back to a generic "NFT #id" card rather than dropping.
    let nftAuctionCount = 0;
    try {
      const enriched = await Promise.all(nftAuctions.map(async a => {
        try { return { a, meta: await enrichNftAuction(a) }; }
        catch { return { a, meta: { name: `NFT #${a.ids[0]?.toString() || '?'}`, image: '' } }; }
      }));
      // Newest first — getAuctions already returns in id order, so reverse.
      enriched.reverse();
      const nftHtml = enriched.map(({a, meta}) => renderNftAuctionCard(a, meta)).join('');
      nftAuctionCount = enriched.length;
      grid = nftHtml + grid;
    } catch (e) { console.warn('NFT auction rendering failed:', e); }

    const _coinTotal = [...groups.values()].reduce((n, g) => n + g.filter(c => !c.isTest).length, 0);
    const _countLabel = nftAuctionCount > 0
      ? `${_coinTotal} coins &middot; ${nftAuctionCount} auction${nftAuctionCount === 1 ? '' : 's'}`
      : `${_coinTotal}`;
    app.innerHTML = `
      <div class="header">
        <h1>Coins <span style="font-weight:400;color:var(--fg-muted)">(${_countLabel})</span></h1>
        <div><a href="../#coin" class="nav-link">Launch</a><span class="nav-sep">&middot;</span><a href="../" class="nav-link">Swap</a><span class="nav-sep">&middot;</span><a href="../dao/" class="nav-link">DAO</a></div>
      </div>
      <input type="text" class="coin-search" id="coinSearch" placeholder="Search by name, symbol, or address..." oninput="filterCoins()">
      <div class="coin-grid" id="coinGrid">${grid}</div>
      ${(() => {
        const parts = [];
        if (legacyCount > 0) parts.push(`<span class="spam-toggle" onclick="toggleLegacyCoins()">${legacyCount} legacy</span>`);
        if (inactiveCount > 0) parts.push(`<span class="spam-toggle" onclick="toggleInactiveCoins()">${inactiveCount} inactive</span>`);
        if (spamCount > 0) parts.push(`<span class="spam-toggle" onclick="toggleSpamCoins()" id="spamCountLabel">${spamCount} flagged</span>`);
        if (lowMcapCount > 0) parts.push(`<span class="spam-toggle" onclick="toggleLowMcapCoins()">${lowMcapCount} low-liquidity</span>`);
        const total = legacyCount + inactiveCount + spamCount + lowMcapCount;
        return total > 0 ? `<div style="text-align:center;font-size:11px;color:var(--fg-muted);margin-top:16px">${total} coins hidden (${parts.join(' · ')})</div>` : '';
      })()}
      <div id="spamCount" data-count="${spamCount}" style="display:none"></div>
      <div style="text-align:center;font-size:10px;color:var(--fg-dim);margin-top:20px;padding-top:12px;border-top:1px solid var(--border-muted)">100k <a href="https://zfi.wei.is/?from=eth&to=zorg" target="_blank" style="color:inherit;text-decoration:underline">$zOrg</a> holders can flag spam</div>
    `;
  } catch(e) {
    app.innerHTML = `
      <div class="header">
        <h1>Coins</h1>
        <div><a href="../" class="nav-link">Swap</a> &middot; <a href="../dao/" class="nav-link">DAO</a></div>
      </div>
      <div class="loading">Failed to load coins: ${escText(e.message || '')}</div>
    `;
  }
}

function toggleStack(el) {
  el.closest('.coin-stack').classList.toggle('expanded');
}

function filterCoins() {
  const q = ($('coinSearch')?.value || '').toLowerCase().trim();
  const stacks = document.querySelectorAll('#coinGrid .coin-stack');
  stacks.forEach(s => {
    if (q) s.classList.add('expanded');
    else s.classList.remove('expanded');
  });
  const cards = document.querySelectorAll('#coinGrid .coin-card');
  cards.forEach(c => {
    const isTest = c.classList.contains('coin-test');
    const isSpam = c.classList.contains('coin-spam');
    const isSpamVisible = c.classList.contains('coin-spam-visible');
    if (!q) { c.style.display = isTest ? 'none' : (isSpam && !isSpamVisible) ? 'none' : ''; return; }
    const match = c.dataset.name.includes(q) || c.dataset.symbol.includes(q) || c.dataset.addr.includes(q);
    c.style.display = match ? 'block' : 'none';
  });
}

function formatEthPrice(val) {
  if (val === 0) return '0';
  if (val < 0.0001) return val.toExponential(2);
  if (val < 0.01) return val.toFixed(6);
  if (val < 1) return val.toFixed(4);
  if (val < 1000) return val.toFixed(3);
  if (val < 1000000) return (val / 1000).toFixed(2) + 'k';
  return (val / 1000000).toFixed(2) + 'M';
}

function formatTimeAgo(ms) {
  const diff = Math.floor((Date.now() - ms) / 1000);
  if (diff < 60) return diff + 's';
  if (diff < 3600) return Math.floor(diff / 60) + 'm';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h';
  return Math.floor(diff / 86400) + 'd';
}

function formatPct(pct) {
  const abs = Math.abs(pct);
  const sign = pct > 0 ? '+' : '';
  if (abs >= 1000) return sign + (pct / 1000).toFixed(1) + 'k%';
  if (abs >= 100) return sign + pct.toFixed(0) + '%';
  return sign + pct.toFixed(1) + '%';
}

function fmtTokenAmount(weiStr) {
  const v = Number(BigInt(weiStr)) / 1e18;
  if (v >= 1e9) return (v / 1e9).toFixed(1) + 'B';
  if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
  if (v >= 1e3) return (v / 1e3).toFixed(1) + 'K';
  return v.toFixed(2);
}

async function renderCurveCoinPage(tokenAddr, curve, gen) {
  const app = $('app');
  _curveTokenAddr = tokenAddr;
  _curveData = curve;
  _curveEffectiveFee = null;

  const sold = BigInt(curve.sold);
  const cap = BigInt(curve.cap);
  const virtualReserve = BigInt(curve.virtualReserve);
  const startPrice = BigInt(curve.startPrice);
  const raisedETH = BigInt(curve.raisedETH);
  const graduated = curve.graduated;
  const seeded = curve.seeded;
  const launchTime = Number(curve.launchTime);

  // Spot price
  const remaining = virtualReserve - sold;
  const spotPrice = remaining > 0n ? (startPrice * virtualReserve * virtualReserve) / (remaining * remaining) : 0n;
  const spotPriceEth = Number(spotPrice) / 1e18;
  const salePct = cap > 0n ? Number((sold * 10000n) / cap) / 100 : 0;
  const fdvEth = spotPriceEth * 1e9;

  // Batch: obsCount + graduable + ETH/USD + token name/symbol + contractURI + creatorFees + balance via multicall
  const csIface = new ethers.Interface(CURVE_SALE_ABI);
  const erc20I = new ethers.Interface(ERC20_ABI);
  const nameI = new ethers.Interface(['function name() view returns (string)', 'function symbol() view returns (string)']);

  const uriI = new ethers.Interface(['function contractURI() view returns (string)']);
  const mc3Calls = [
    { target: CURVE_SALE, allowFailure: true, callData: csIface.encodeFunctionData('observationCount', [tokenAddr]) },
    { target: CURVE_SALE, allowFailure: true, callData: csIface.encodeFunctionData('graduable', [tokenAddr]) },
    { target: CHAINLINK_ETH_USD, allowFailure: true, callData: new ethers.Interface(CHAINLINK_ABI).encodeFunctionData('latestAnswer') },
    { target: tokenAddr, allowFailure: true, callData: nameI.encodeFunctionData('name') },
    { target: tokenAddr, allowFailure: true, callData: nameI.encodeFunctionData('symbol') },
    { target: tokenAddr, allowFailure: true, callData: uriI.encodeFunctionData('contractURI') },
    // Post-grad routing: read live creator fee so swap quotes & minOut match what the contract will actually charge.
    { target: CURVE_SALE, allowFailure: true, callData: csIface.encodeFunctionData('creatorFees', [tokenAddr]) }
  ];
  if (_connectedAddress) {
    mc3Calls.push({ target: tokenAddr, allowFailure: true, callData: erc20I.encodeFunctionData('balanceOf', [_connectedAddress]) });
  }

  const mcRes = await withRPC(async rpc => {
    const mc = new ethers.Contract(MC3, MC3_ABI, rpc);
    return await mc.aggregate3(mc3Calls);
  }).catch(() => mc3Calls.map(() => ({ success: false })));
  if (gen !== _renderGen) return;

  const obsCount = mcRes[0].success ? Number(csIface.decodeFunctionResult('observationCount', mcRes[0].returnData)[0]) : 0;
  const graduable = mcRes[1].success ? csIface.decodeFunctionResult('graduable', mcRes[1].returnData)[0] : false;
  const ethUsd = mcRes[2].success ? Number(new ethers.Interface(CHAINLINK_ABI).decodeFunctionResult('latestAnswer', mcRes[2].returnData)[0]) / 1e8 : 0;
  const tokenName = mcRes[3].success ? nameI.decodeFunctionResult('name', mcRes[3].returnData)[0] : 'Unknown';
  const tokenSymbol = mcRes[4].success ? nameI.decodeFunctionResult('symbol', mcRes[4].returnData)[0] : '???';
  const contractURI = mcRes[5].success ? uriI.decodeFunctionResult('contractURI', mcRes[5].returnData)[0] : '';
  let cfBeneficiary = ZERO, cfBuyBps = 0, cfSellBps = 0;
  if (mcRes[6].success) {
    try {
      const cf = csIface.decodeFunctionResult('creatorFees', mcRes[6].returnData);
      cfBeneficiary = cf[0]; cfBuyBps = Number(cf[1]); cfSellBps = Number(cf[2]);
    } catch {}
  }
  _curveCreatorBuyBps = cfBuyBps;
  _curveCreatorSellBps = cfSellBps;
  _curveCreatorRouted = cfBeneficiary !== ZERO;
  const tokenBalance = (_connectedAddress && mcRes[7]?.success) ? erc20I.decodeFunctionResult('balanceOf', mcRes[7].returnData)[0] : 0n;

  _curveEthUsd = ethUsd;
  _curveBalance = tokenBalance;

  // Resolve metadata + load observations in parallel (both depend on phase 1 results)
  const [curveMeta, observations] = await Promise.all([
    contractURI ? fetchMetadata(contractURI).catch(() => null) : Promise.resolve(null),
    obsCount > 0 ? withRPC(async rpc => {
      const cs = new ethers.Contract(CURVE_SALE, CURVE_SALE_ABI, rpc);
      return decodeObservations(await cs.observe(tokenAddr, Math.max(0, obsCount - 500), obsCount));
    }).catch(() => []) : Promise.resolve([])
  ]);
  _curveObs = observations;
  const bannerUrl = curveMeta ? resolveIPFS(curveMeta.banner) : null;
  const curveDesc = curveMeta ? curveMeta.description : null;
  if (gen !== _renderGen) return;

  const raisedFmt = Number(ethers.formatEther(raisedETH)).toFixed(4);
  const raisedUsd = ethUsd ? ' ($' + (Number(ethers.formatEther(raisedETH)) * ethUsd).toFixed(2) + ')' : '';
  const balFmt = tokenBalance > 0n ? fmtTokenAmount(tokenBalance.toString()) : '0';

  // Price change from observations
  let priceChangeHTML = '';
  if (observations.length >= 2) {
    const prices = observations.map(o => Number(BigInt(o.price)) / 1e18);
    const first = prices[0], last = prices[prices.length - 1];
    const pct = first > 0 ? ((last - first) / first) * 100 : 0;
    const isUp = last >= first;
    priceChangeHTML = `<span style="font-size:13px;font-weight:600;color:${isUp ? 'var(--green)' : 'var(--red)'};margin-left:8px">${formatPct(pct)}</span>`;
  }

  const perMil = spotPriceEth * 1e6;
  const perMilUsd = ethUsd ? ' <span style="font-size:11px;color:var(--fg-muted)">($' + (perMil * ethUsd < 0.01 ? (perMil * ethUsd).toExponential(2) : (perMil * ethUsd).toFixed(2)) + ')</span>' : '';

  const statusColor = seeded ? 'var(--green)' : graduated ? '#FF9800' : 'var(--fg)';
  const statusText = seeded ? 'Graduated' : graduated ? 'Ready to LP' : 'Active';

  // Creator earnings from observations (volume × effective fee at trade time / 10000).
  // Mirrors ClassicalCurveSale._effectiveFee so the displayed total matches what the contract
  // actually paid out — using the static feeBps under-counts trades inside the sniper window.
  const baseFeeBps = Number(curve.feeBps);
  const sniperFeeBps = Number(curve.sniperFeeBps);
  const sniperDuration = Number(curve.sniperDuration);
  const launchTimeSec = Number(curve.launchTime);
  function _effFeeAt(ts) {
    if (sniperFeeBps === 0 || sniperDuration === 0) return baseFeeBps;
    const elapsed = ts - launchTimeSec;
    if (elapsed >= sniperDuration) return baseFeeBps;
    if (elapsed <= 0) return sniperFeeBps;
    return baseFeeBps + Math.floor((sniperFeeBps - baseFeeBps) * (sniperDuration - elapsed) / sniperDuration);
  }
  let creatorEarnings = 0;
  for (const obs of observations) {
    const vol = Number(BigInt(obs.volume)) / 1e18;
    creatorEarnings += vol * _effFeeAt(obs.timestamp) / 10000;
  }
  const earningsFmt = creatorEarnings >= 0.0001 ? creatorEarnings.toFixed(4) : creatorEarnings > 0 ? creatorEarnings.toExponential(2) : '0';
  const earningsUsd = ethUsd && creatorEarnings > 0 ? ' ($' + (creatorEarnings * ethUsd).toFixed(2) + ')' : '';

  let html = `
    <a href="#" class="back-link">&larr; All Coins</a>
    ${bannerUrl ? `<div class="coin-banner"><img src="${escAttr(bannerUrl)}" alt="" onerror="this.parentNode.style.display='none'"></div>` : ''}

      <div class="coin-detail-title" style="flex:1">
        <h2>${escText(tokenName)} <span class="coin-tpl-badge coin-tpl-simple" title="bonding curve &middot; permanent LP">curve</span></h2>
        <div class="coin-symbol-row">
          <span>$${escText(tokenSymbol)}</span>
          ${_connectedAddress ? `<div class="coin-user-balance">${balFmt} tokens</div>` : ''}
        </div>
        <div style="font-size:11px;color:var(--fg-dim);margin-top:2px">by <a href="https://etherscan.io/address/${curve.creator}" target="_blank" style="color:inherit">${curve.creator.slice(0,6)}&hellip;${curve.creator.slice(-4)}</a></div>
      </div>
    </div>

    ${curveDesc || (curveMeta && (curveMeta.twitter || curveMeta.telegram || curveMeta.discord)) ? `<div class="section-card">${curveDesc ? `<div class="desc-text">${escText(curveDesc)}</div>` : ''}${curveMeta && (curveMeta.twitter || curveMeta.telegram || curveMeta.discord) ? renderSocials(curveMeta, !!curveDesc) : ''}</div>` : ''}

    <!-- Price header -->
    <div style="margin-bottom:10px;display:flex;align-items:baseline;flex-wrap:wrap">
      <span style="font-size:18px;font-weight:700">${formatEthPrice(perMil)} ETH</span>
      <span style="font-size:11px;color:var(--fg-muted);margin-left:2px">per 1M</span>${perMilUsd}${priceChangeHTML}
    </div>

    <!-- Price chart with mode toggle -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <div style="font-size:9px;color:var(--fg-dim);letter-spacing:0.05em;text-transform:uppercase">${_curveChartMode === 'price' ? 'Price (per 1M)' : 'Bonding curve'}</div>

      </div>

        <div style="color:var(--fg-dim);font-size:9px;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:2px">Sold</div>

        <span>curve</span>

// ---- Chart ----
// Bonding-curve view: X axis is supply sold (0% → 100%), Y axis is price (start → end).
// The full curve is drawn as the backdrop so the chart is meaningful with zero trades.
// Each historical trade is plotted as a dot at its derived position on the curve, so
// even a coin with one or two buys looks like a real chart — buy positions land where
// the price curve says they should, and the user sees the whole curve they're trading on.
function drawCurveChart(canvas, observations) {
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const cssW = rect.width || 440, cssH = rect.height || 200;
  canvas.width = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const w = cssW, h = cssH;
  const dark = document.documentElement.classList.contains('dark');
  const mutedColor = dark ? '#666' : '#888';
  const dimColor = dark ? '#444' : '#bbb';
  const gridColor = dark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.04)';
  const bgColor = dark ? '#000' : '#fff';
  const buyColor = '#4CAF50';
  const sellColor = '#EF5350';

  // Curve params from on-chain config. Fall back to a soft message if missing.
  const curve = _curveData;
  if (!curve || !curve.cap || BigInt(curve.cap) === 0n) {
    ctx.fillStyle = mutedColor;
    ctx.font = '12px Helvetica,Arial,sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Curve not configured', w / 2, h / 2);
    return;
  }

  // Layout
  const LEFT = Math.max(40, w * 0.10);
  const RIGHT = 14, TOP = 14, BOTTOM = 18;
  const chartH = h - TOP - BOTTOM;
  const chartW = w - LEFT - RIGHT;
  const fontSize = Math.max(8, Math.min(10, w * 0.024));

  // Numeric curve — work in human units (1e18-scaled → float). Loses precision
  // for absurdly large supplies but the curve at 1B token / 1e9-wei start price
  // sits comfortably in float64.
  const cap = Number(BigInt(curve.cap)) / 1e18;
  const sold = Number(BigInt(curve.sold)) / 1e18;
  const startPrice = Number(BigInt(curve.startPrice)) / 1e18;
  const endPrice = Number(BigInt(curve.endPrice)) / 1e18;
  const vr = Number(BigInt(curve.virtualReserve)) / 1e18;
  const flat = endPrice <= startPrice;

  const priceAt = (x) => {
    if (flat) return startPrice;
    const denom = vr - x;
    return denom > 0 ? startPrice * vr * vr / (denom * denom) : endPrice;
  };

  // Y range: full curve span so the curve always fits exactly.
  // Add a small visual headroom so the line doesn't kiss the edges.
  const yMin = startPrice;
  const yMax = flat ? startPrice * 1.001 : endPrice;
  const yPad = (yMax - yMin) * 0.05;
  const yLo = yMin - yPad, yHi = yMax + yPad;
  const yToPx = (p) => {
    const t = (p - yLo) / (yHi - yLo);
    return TOP + chartH - Math.max(0, Math.min(1, t)) * chartH;
  };
  const xToPx = (x) => LEFT + (Math.max(0, Math.min(cap, x)) / cap) * chartW;

  // Grid (4 vertical, 3 horizontal)
  ctx.strokeStyle = gridColor;
  ctx.lineWidth = 0.5;
  for (let g = 1; g < 4; g++) {
    const gx = LEFT + (g / 4) * chartW;
    ctx.beginPath(); ctx.moveTo(gx, TOP); ctx.lineTo(gx, h - BOTTOM); ctx.stroke();
  }
  for (let g = 1; g < 3; g++) {
    const gy = TOP + (g / 3) * chartH;
    ctx.beginPath(); ctx.moveTo(LEFT, gy); ctx.lineTo(w - RIGHT, gy); ctx.stroke();
  }
  // Frame
  ctx.strokeStyle = dark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)';
  ctx.beginPath(); ctx.moveTo(LEFT, TOP); ctx.lineTo(LEFT, h - BOTTOM); ctx.lineTo(w - RIGHT, h - BOTTOM); ctx.stroke();

  // Sample the curve once and reuse for fill + stroke.
  const N = 96;
  const ptsX = new Array(N + 1), ptsY = new Array(N + 1);
  for (let i = 0; i <= N; i++) {
    const x = (i / N) * cap;
    ptsX[i] = xToPx(x);
    ptsY[i] = yToPx(priceAt(x));
  }
  const soldPx = xToPx(sold);
  const soldPy = yToPx(priceAt(sold));

  // Sold-region fill (under curve, left of current sold)
  if (sold > 0) {
    ctx.fillStyle = buyColor + '18';
    ctx.beginPath();
    ctx.moveTo(LEFT, h - BOTTOM);
    for (let i = 0; i <= N; i++) {
      const x = (i / N) * cap;
      if (x > sold) break;
      ctx.lineTo(ptsX[i], ptsY[i]);
    }
    ctx.lineTo(soldPx, soldPy);
    ctx.lineTo(soldPx, h - BOTTOM);
    ctx.closePath();
    ctx.fill();
  }

  // Curve — unsold portion (dashed, muted)
  ctx.strokeStyle = mutedColor;
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  let started = false;
  for (let i = 0; i <= N; i++) {
    const x = (i / N) * cap;
    if (x < sold) continue;
    if (!started) { ctx.moveTo(soldPx, soldPy); started = true; }
    ctx.lineTo(ptsX[i], ptsY[i]);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // Curve — sold portion (solid, accent)
  if (sold > 0) {
    ctx.strokeStyle = buyColor;
    ctx.lineWidth = 1.75;
    ctx.beginPath();
    ctx.moveTo(LEFT, yToPx(priceAt(0)));
    for (let i = 0; i <= N; i++) {
      const x = (i / N) * cap;
      if (x > sold) break;
      ctx.lineTo(ptsX[i], ptsY[i]);
    }
    ctx.lineTo(soldPx, soldPy);
    ctx.stroke();
  }

  // Trade markers — derive supply position from price using the inverse curve formula:
  // x = vr · (1 − √(startPrice / price)). For the flat-curve degenerate case we have
  // no positional information from price alone, so trades collapse onto the current sold marker.
  if (observations && observations.length > 0) {
    for (const o of observations) {
      const price = Number(BigInt(o.price)) / 1e18;
      let xPos;
      if (flat) {
        xPos = sold;
      } else {
        const ratio = startPrice / price;
        xPos = ratio > 0 && ratio <= 1 ? vr * (1 - Math.sqrt(ratio)) : sold;
      }
      const mx = xToPx(xPos);
      const my = yToPx(price);
      ctx.fillStyle = o.isSell ? sellColor : buyColor;
      ctx.strokeStyle = bgColor;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(mx, my, 2.75, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    }
  }

  // Current spot marker — slightly larger ring at (sold, current price)
  ctx.fillStyle = buyColor;
  ctx.strokeStyle = bgColor;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(soldPx, soldPy, 4, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

  // Y-axis price labels (start, mid, end) — per 1M tokens, matching the header
  ctx.fillStyle = mutedColor;
  ctx.font = `${fontSize}px monospace`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillText(formatEthPrice(yMax * 1e6), LEFT - 4, TOP + 4);
  ctx.fillText(formatEthPrice(((yMax + yMin) / 2) * 1e6), LEFT - 4, TOP + chartH / 2);
  ctx.fillText(formatEthPrice(yMin * 1e6), LEFT - 4, h - BOTTOM - 4);
  ctx.fillStyle = dimColor;
  ctx.font = `${Math.max(7, fontSize - 1)}px monospace`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillText('ETH/1M', LEFT - 4, TOP);

  // X-axis labels: 0%, 50%, 100% (supply sold)
  ctx.fillStyle = mutedColor;
  ctx.font = `${fontSize}px monospace`;
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  ctx.fillText('0%', LEFT, h - BOTTOM + 3);
  ctx.textAlign = 'center';
  ctx.fillText('50%', LEFT + chartW / 2, h - BOTTOM + 3);
  ctx.textAlign = 'right';
  ctx.fillText('100%', w - RIGHT, h - BOTTOM + 3);

  // Floating "X.X% sold" label near the spot marker — flips to the other side
  // of the marker so it doesn't run off the right edge as graduation approaches.
  const soldPct = cap > 0 ? (sold / cap * 100) : 0;
  if (soldPct > 0.05) {
    const labelText = soldPct.toFixed(soldPct < 1 ? 2 : 1) + '% sold';
    ctx.font = `bold ${fontSize}px monospace`;
    const labelW = ctx.measureText(labelText).width;
    const onLeft = (soldPx + 8 + labelW) > (w - RIGHT);
    ctx.textAlign = onLeft ? 'right' : 'left';
    const lx = onLeft ? soldPx - 6 : soldPx + 6;
    const ly = Math.max(TOP + 2, soldPy - 10);
    // tiny pill background for readability over the curve
    const padX = 3, padY = 2;
    ctx.fillStyle = dark ? 'rgba(0,0,0,0.6)' : 'rgba(255,255,255,0.85)';
    ctx.fillRect(
      onLeft ? lx - labelW - padX : lx - padX,
      ly - padY,
      labelW + padX * 2,
      fontSize + padY * 2
    );
    ctx.fillStyle = buyColor;
    ctx.textBaseline = 'top';
    ctx.fillText(labelText, lx, ly);
  }
}

// Dispatches to the active chart renderer. Both modes share the same canvas so the toggle
// is a swap-in-place — no layout reflow.
function drawCurveChartActive(canvas, observations) {
  if (_curveChartMode === 'price') drawPriceChart(canvas, observations);
  else drawCurveChart(canvas, observations);
}

// User-facing chart-mode toggle. Re-renders against cached observations — no extra RPC.
function setCurveChartMode(mode) {
  if (mode !== 'curve' && mode !== 'price') return;
  if (_curveChartMode === mode) return;
  _curveChartMode = mode;
  // Update toggle button styles
  const curveBtn = $('curveChartCurveBtn'), priceBtn = $('curveChartPriceBtn');
  if (curveBtn && priceBtn) {
    curveBtn.style.background = mode === 'curve' ? 'var(--btn-bg)' : 'transparent';
    curveBtn.style.color = mode === 'curve' ? 'var(--btn-fg)' : 'var(--fg-muted)';
    priceBtn.style.background = mode === 'price' ? 'var(--btn-bg)' : 'transparent';
    priceBtn.style.color = mode === 'price' ? 'var(--btn-fg)' : 'var(--fg-muted)';
  }
  // Update the small label above the toggle.
  const labelEl = curveBtn ? curveBtn.parentElement.previousElementSibling : null;
  if (labelEl) labelEl.textContent = mode === 'price' ? 'Price (per 1M)' : 'Bonding curve';
  drawCurveChartActive($('curveChart'), _curveObs);
}

// ---- Price chart (line + trade dots + volume) ----
// Bonding-phase trades are sparse — usually a handful per day — so candlestick bucketing produces
// noisy single-trade dojis that don't communicate anything. Instead we show every individual trade
// as a coloured dot at its (timestamp, price), connect them with a line so the price evolution
// reads at a glance, and display per-trade volume bars below. This works for 1 trade or 500.
function drawPriceChart(canvas, observations) {
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const cssW = rect.width || 440, cssH = rect.height || 200;
  canvas.width = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const w = cssW, h = cssH;
  const dark = document.documentElement.classList.contains('dark');
  const mutedColor = dark ? '#666' : '#888';
  const dimColor = dark ? '#444' : '#bbb';
  const gridColor = dark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.04)';
  const bgColor = dark ? '#000' : '#fff';
  const buyColor = '#4CAF50';
  const sellColor = '#EF5350';
  const lineColor = dark ? 'rgba(255,255,255,0.45)' : 'rgba(0,0,0,0.5)';

  // Empty state — brand-new coins with zero trades yet.
  if (!observations || observations.length === 0) {
    ctx.fillStyle = mutedColor;
    ctx.font = '12px Helvetica,Arial,sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('No trades yet', w / 2, h / 2);
    ctx.fillStyle = dimColor;
    ctx.font = '10px Helvetica,Arial,sans-serif';
    ctx.fillText('Be the first buyer to start the chart', w / 2, h / 2 + 16);
    return;
  }

  // Decode + sort. observe() returns insertion order which is monotonic, but sort defensively.
  const trades = observations.slice().sort((a, b) => a.timestamp - b.timestamp).map(o => ({
    ts: o.timestamp,
    price: Number(BigInt(o.price)) / 1e18,
    volume: Number(BigInt(o.volume)) / 1e18,
    isSell: o.isSell,
  })).filter(t => Number.isFinite(t.price) && t.price > 0);

  if (trades.length === 0) {
    ctx.fillStyle = mutedColor;
    ctx.font = '12px Helvetica,Arial,sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('No price data', w / 2, h / 2);
    return;
  }

  // Layout: price area top ~75%, volume bars bottom ~20%, gap between.
  const LEFT = Math.max(40, w * 0.10);
  const RIGHT = 14, TOP = 14, BOTTOM = 18;
  const VGAP = 6;
  const usableH = h - TOP - BOTTOM;
  const volH = Math.max(20, usableH * 0.20);
  const priceH = usableH - volH - VGAP;
  const chartW = w - LEFT - RIGHT;
  const fontSize = Math.max(8, Math.min(10, w * 0.024));

  // Y (price) range: trade min/max with 10% padding. Single-price coin gets a synthetic ±5% window.
  let pMin = Infinity, pMax = -Infinity;
  for (const t of trades) { if (t.price > pMax) pMax = t.price; if (t.price < pMin) pMin = t.price; }
  if (pMax === pMin) { const p = pMax || 1; pMax = p * 1.05; pMin = p * 0.95; }
  const pPad = (pMax - pMin) * 0.10;
  const pLo = Math.max(0, pMin - pPad), pHi = pMax + pPad;
  const yToPx = p => TOP + priceH - ((p - pLo) / (pHi - pLo)) * priceH;

  // X (time) range: first trade → last trade with 5% right padding.
  // Only extend to "now" when the last trade is genuinely stale (>24h or >50% past the trade span)
  // — for active coins, hugging the data is more readable than padding to the right edge.
  const tFirst = trades[0].ts;
  const tLast = trades[trades.length - 1].ts;
  const tradeSpan = tLast - tFirst;
  const nowSec = Math.floor(Date.now() / 1000);
  const staleThreshold = Math.max(86400, tradeSpan); // 1d or full span, whichever is larger
  const extendToNow = (nowSec - tLast) > staleThreshold;
  const rightPad = Math.max(60, tradeSpan * 0.05); // ≥60s so single-trade coins don't collapse
  const tMin = tFirst;
  const tMax = extendToNow ? nowSec : (tLast + rightPad);
  const tRange = Math.max(60, tMax - tMin);
  const xToPx = ts => LEFT + ((ts - tMin) / tRange) * chartW;

  // Volume range
  let vMax = 0;
  for (const t of trades) if (t.volume > vMax) vMax = t.volume;
  if (vMax === 0) vMax = 1;
  const vToH = v => (v / vMax) * volH;
  const volTop = TOP + priceH + VGAP;

  // Grid (3 horizontal in price area, 4 vertical across)
  ctx.strokeStyle = gridColor;
  ctx.lineWidth = 0.5;
  for (let g = 1; g < 3; g++) {
    const gy = TOP + (g / 3) * priceH;
    ctx.beginPath(); ctx.moveTo(LEFT, gy); ctx.lineTo(w - RIGHT, gy); ctx.stroke();
  }
  for (let g = 1; g < 4; g++) {
    const gx = LEFT + (g / 4) * chartW;
    ctx.beginPath(); ctx.moveTo(gx, TOP); ctx.lineTo(gx, h - BOTTOM); ctx.stroke();
  }
  // Frame
  ctx.strokeStyle = dark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)';
  ctx.beginPath(); ctx.moveTo(LEFT, TOP); ctx.lineTo(LEFT, h - BOTTOM); ctx.lineTo(w - RIGHT, h - BOTTOM); ctx.stroke();
  // Volume separator
  ctx.strokeStyle = gridColor;
  ctx.beginPath(); ctx.moveTo(LEFT, volTop - VGAP / 2); ctx.lineTo(w - RIGHT, volTop - VGAP / 2); ctx.stroke();

  // Filled area beneath the price line — green if final price ≥ first, red otherwise.
  // Gives the chart visual weight even with sparse trades.
  if (trades.length >= 2) {
    const overallUp = trades[trades.length - 1].price >= trades[0].price;
    ctx.fillStyle = (overallUp ? buyColor : sellColor) + '15';
    ctx.beginPath();
    ctx.moveTo(xToPx(trades[0].ts), TOP + priceH);
    for (const t of trades) ctx.lineTo(xToPx(t.ts), yToPx(t.price));
    ctx.lineTo(xToPx(trades[trades.length - 1].ts), TOP + priceH);
    ctx.closePath();
    ctx.fill();

    // Connecting line through trade prices
    ctx.strokeStyle = lineColor;
    ctx.lineWidth = 1.25;
    ctx.beginPath();
    ctx.moveTo(xToPx(trades[0].ts), yToPx(trades[0].price));
    for (let i = 1; i < trades.length; i++) ctx.lineTo(xToPx(trades[i].ts), yToPx(trades[i].price));
    ctx.stroke();
  }

  // Volume bars per trade — width is fixed-pixel, color matches the trade direction.
  const volBarW = Math.max(2, Math.min(chartW / Math.max(trades.length, 4) * 0.6, 8));
  for (const t of trades) {
    const vh = vToH(t.volume);
    if (vh <= 0) continue;
    ctx.fillStyle = (t.isSell ? sellColor : buyColor) + 'aa';
    ctx.fillRect(xToPx(t.ts) - volBarW / 2, volTop + (volH - vh), volBarW, vh);
  }

  // Trade dots — drawn last so they sit on top of the line. White ring for contrast.
  for (const t of trades) {
    const cx = xToPx(t.ts), cy = yToPx(t.price);
    ctx.fillStyle = t.isSell ? sellColor : buyColor;
    ctx.strokeStyle = bgColor;
    ctx.lineWidth = 1.25;
    ctx.beginPath(); ctx.arc(cx, cy, 3.25, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  }

  // Last-price dotted line spanning the chart, with a coloured tag on the right edge.
  const last = trades[trades.length - 1];
  const lastY = yToPx(last.price);
  const isUpOverall = trades.length >= 2 ? last.price >= trades[0].price : true;
  ctx.strokeStyle = mutedColor;
  ctx.setLineDash([2, 3]);
  ctx.beginPath(); ctx.moveTo(LEFT, lastY); ctx.lineTo(w - RIGHT, lastY); ctx.stroke();
  ctx.setLineDash([]);

  // Y-axis price labels (max, mid, min) — per 1M tokens, matching the page header.
  ctx.fillStyle = mutedColor;
  ctx.font = `${fontSize}px monospace`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillText(formatEthPrice(pHi * 1e6), LEFT - 4, TOP + 4);
  ctx.fillText(formatEthPrice(((pHi + pLo) / 2) * 1e6), LEFT - 4, TOP + priceH / 2);
  ctx.fillText(formatEthPrice(pLo * 1e6), LEFT - 4, TOP + priceH - 4);

  // Last-price tag (coloured chip on the right)
  const lastLabel = formatEthPrice(last.price * 1e6);
  const tagColor = isUpOverall ? buyColor : sellColor;
  ctx.font = `bold ${fontSize}px monospace`;
  const llW = ctx.measureText(lastLabel).width;
  ctx.fillStyle = tagColor;
  ctx.fillRect(w - RIGHT - llW - 6, lastY - fontSize / 2 - 2, llW + 6, fontSize + 4);
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'right';
  ctx.fillText(lastLabel, w - RIGHT - 3, lastY);

  // Unit labels
  ctx.fillStyle = dimColor;
  ctx.font = `${Math.max(7, fontSize - 1)}px monospace`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillText('ETH/1M', LEFT - 4, TOP);
  // Volume is gross ETH per trade (pre-fee, same unit the trade-history table shows).
  ctx.fillText('ETH vol', LEFT - 4, volTop);
  // Tag the largest bar with its ETH amount so the absolute scale is visible at a glance.
  // Without this the user can only see relative bar heights, not whether trades are 0.001 or 10 ETH.
  if (vMax > 0) {
    const vMaxLabel = vMax >= 1 ? vMax.toFixed(3)
      : vMax >= 0.001 ? vMax.toFixed(4)
      : vMax >= 0.000001 ? vMax.toFixed(6)
      : vMax.toExponential(1);
    ctx.fillStyle = mutedColor;
    ctx.font = `${Math.max(7, fontSize - 1)}px monospace`;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    ctx.fillText('max ' + vMaxLabel, w - RIGHT, volTop);
  }

  // X-axis time labels — format adapts to the range (HH:MM under 1d, MM-DD beyond).
  const fmtT = (ts) => {
    const d = new Date(ts * 1000);
    const pad = n => String(n).padStart(2, '0');
    return tRange < 86400 ? pad(d.getHours()) + ':' + pad(d.getMinutes()) : pad(d.getMonth() + 1) + '-' + pad(d.getDate());
  };
  ctx.fillStyle = mutedColor;
  ctx.font = `${fontSize}px monospace`;
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  ctx.fillText(fmtT(tMin), LEFT, h - BOTTOM + 3);
  if (tRange > 60 * 5) {
    ctx.textAlign = 'center';
    ctx.fillText(fmtT(Math.floor((tMin + tMax) / 2)), LEFT + chartW / 2, h - BOTTOM + 3);
    ctx.textAlign = 'right';
    ctx.fillText(fmtT(tMax), w - RIGHT, h - BOTTOM + 3);
  }

  // Trade count + total volume + time-since-last in top-right corner.
  // Total volume is the sum of all gross ETH amounts (matches what's behind the volume bars below).
  const ago = nowSec - tLast;
  const agoLabel = ago < 60 ? ago + 's' : ago < 3600 ? Math.floor(ago / 60) + 'm' : ago < 86400 ? Math.floor(ago / 3600) + 'h' : Math.floor(ago / 86400) + 'd';
  let totalVol = 0;
  for (const t of trades) totalVol += t.volume;
  const totalVolLabel = totalVol >= 1 ? totalVol.toFixed(3)
    : totalVol >= 0.001 ? totalVol.toFixed(4)
    : totalVol >= 0.000001 ? totalVol.toFixed(6)
    : totalVol > 0 ? totalVol.toExponential(1)
    : '0';
  const header = trades.length + (trades.length === 1 ? ' trade' : ' trades')
    + ' · ' + totalVolLabel + ' ETH · last ' + agoLabel + ' ago';
  ctx.fillStyle = dimColor;
  ctx.font = `${Math.max(7, fontSize - 1)}px monospace`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillText(header, w - RIGHT, TOP);
}
