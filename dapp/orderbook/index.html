<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ORDER</title>
<link rel="stylesheet" href="../theme.css">
<link rel="stylesheet" href="../wallet.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 400' width='400' height='400'%3E%3Crect width='400' height='400' fill='%23000'/%3E%3CclipPath id='frame'%3E%3Crect width='400' height='400'/%3E%3C/clipPath%3E%3Cg clip-path='url(%23frame)'%3E%3Cpath d='M-60-20L460-20L460 90L80 310L460 310L460 420L-60 420L-60 310L320 90L-60 90Z' fill='white'/%3E%3C/g%3E%3C/svg%3E" type="image/svg+xml">
<script>
(function(){var d=localStorage.getItem('dark');if(d==='1'||(d===null&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')})();
</script>
<script src="../theme.js"></script>
<style>
:root {
  --green:#16a34a;--green-bg:rgba(22,163,74,0.06);--green-dim:rgba(22,163,74,0.15);
  --red:#dc2626;--red-bg:rgba(220,38,38,0.06);--red-dim:rgba(220,38,38,0.15);
}
.dark {
  --green:#22c55e;--green-bg:rgba(34,197,94,0.08);--green-dim:rgba(34,197,94,0.18);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.08);--red-dim:rgba(239,68,68,0.18);
}
body { max-width:620px; }
button {
  font-family:inherit; cursor:pointer;
  background:var(--btn-bg); color:var(--btn-fg);
  border:1px solid var(--btn-bg); border-radius:0;
  padding:8px 16px; font-size:12px; font-weight:600;
  letter-spacing:0.05em; text-transform:uppercase;
  transition:background 0.2s, border-color 0.2s, color 0.2s;
}
button:hover { background:var(--btn-hover); }

/* Modal overlay */
.modal-overlay {
  display:none; position:fixed; top:0; left:0; right:0; bottom:0;
  background:var(--modal-overlay); backdrop-filter:blur(4px);
  z-index:2000; justify-content:center; align-items:flex-start;
  padding:20px; padding-top:max(60px, env(safe-area-inset-top, 60px));
  overflow-y:auto; -webkit-overflow-scrolling:touch;
}
.modal-overlay.active { display:flex; }
body.modal-open { overflow:hidden; }
.modal {
  background:var(--modal-bg); border:1px solid var(--modal-border);
  padding:20px; width:100%; max-width:380px;
  max-height:calc(100vh - 80px); max-height:calc(100dvh - 80px);
  display:flex; flex-direction:column; overflow:hidden;
}
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-shrink:0; }
.modal-title { font-size:14px; text-transform:uppercase; letter-spacing:0.1em; }
.modal-close {
  background:none; border:none; color:var(--fg); font-size:24px;
  cursor:pointer; line-height:1; padding:8px; margin:-8px;
  opacity:0.4; transition:opacity 0.15s;
}
.modal-close:hover { opacity:1; }
.modal-body { overflow-y:auto; -webkit-overflow-scrolling:touch; }

/* Header */
.page-header { margin-bottom:20px; }
.pair-row {
  display:flex; align-items:center; gap:10px; margin-bottom:6px;
}
.pair-icons {
  display:inline-flex; align-items:center;
}
.pair-icons svg, .pair-icons img { width:22px; height:22px; border-radius:50%; }
.pair-icons .icon-1 { margin-left:-6px; }
.pair-name {
  font-size:18px; font-weight:600; letter-spacing:-0.01em;
}
.sub-links {
  display:flex; align-items:center; gap:6px; margin-left:auto;
}
.sub-link {
  display:inline-flex; align-items:center; gap:3px;
  font-size:10px; color:var(--fg-muted); text-decoration:none;
  opacity:0.6; transition:opacity 0.15s;
  letter-spacing:0.03em; text-transform:uppercase;
}
.sub-link:hover { opacity:1; }
.pool-meta {
  font-size:11px; color:var(--fg-dim);
  letter-spacing:0.02em;
}
.pool-meta a { color:var(--fg-dim); }

/* AMM price banner */
.price-banner {
  display:flex; gap:16px; align-items:baseline;
  padding:12px 0; margin-bottom:16px;
  border-bottom:1px solid var(--border-muted);
}
.amm-price {
  font-size:22px; font-weight:600; font-family:monospace;
  letter-spacing:-0.02em;
}
.amm-price-label {
  font-size:10px; color:var(--fg-dim); text-transform:uppercase;
  letter-spacing:0.06em;
}
.amm-reserves {
  font-size:11px; color:var(--fg-muted); font-family:monospace;
}

/* Tabs */
.tab-row { display:flex; gap:0; margin-bottom:0; border-bottom:1px solid var(--border-muted); }
.tab-btn {
  font-family:inherit; font-size:11px; font-weight:500;
  letter-spacing:0.06em; text-transform:uppercase;
  cursor:pointer; border:none; background:none;
  color:var(--fg-muted); padding:10px 16px;
  border-bottom:2px solid transparent; transition:color 0.15s;
  border-radius:0;
}
.tab-btn:hover { color:var(--fg); background:none; }
.tab-btn.active { color:var(--fg); border-bottom-color:var(--fg); }

/* ---- Orderbook (exchange-style) ---- */
.book-container {
  border:1px solid var(--border); border-radius:0;
  overflow:hidden; margin-top:16px;
}
.book-header {
  display:grid; grid-template-columns:1fr 1fr 1fr;
  font-size:10px; font-weight:600; letter-spacing:0.06em;
  text-transform:uppercase; color:var(--fg-dim);
  padding:8px 12px; border-bottom:1px solid var(--border-muted);
  background:var(--surface);
}
.book-header span:last-child { text-align:right; }

.book-row {
  display:grid; grid-template-columns:1fr 1fr 1fr;
  padding:0 12px; font-size:12px; font-family:monospace;
  line-height:26px; position:relative; cursor:pointer;
  transition:background 0.1s;
}
.book-row:hover { background:var(--surface-hover); z-index:1; }
.book-row .price { font-weight:600; cursor:pointer; }
.book-row .price:hover { text-decoration:underline; }
.book-row .total { text-align:right; color:var(--fg-muted); }
.book-row .depth {
  position:absolute; top:0; right:0; bottom:0;
  pointer-events:none;
}
.bid-row .price { color:var(--green); }
.bid-row .depth { background:var(--green-bg); }
.ask-row .price { color:var(--red); }
.ask-row .depth { background:var(--red-bg); }
.aon-tag { font-size:8px; font-family:sans-serif; font-weight:700; letter-spacing:.3px; padding:1px 3px; border-radius:3px; background:var(--fg-muted); color:var(--bg); opacity:.7; vertical-align:middle; margin-left:3px; }
.src-tag { font-size:7px; font-family:sans-serif; font-weight:700; letter-spacing:.4px; padding:1px 3px; border-radius:3px; vertical-align:middle; margin-left:3px; opacity:.8; text-transform:uppercase; }
.src-tag.swapboard { background:rgba(99,145,255,0.15); color:#6391ff; }
.dark .src-tag.swapboard { color:#8ab4ff; }
.yours-tag { font-size:7px; font-family:sans-serif; font-weight:700; letter-spacing:.4px; padding:1px 3px; border-radius:3px; vertical-align:middle; margin-left:3px; opacity:.8; text-transform:uppercase; background:rgba(255,180,50,0.15); color:#e6a020; }
.dark .yours-tag { color:#ffcc55; }
.global-order-item.is-mine { border-left:2px solid #e6a020; }
.dark .global-order-item.is-mine { border-left-color:#ffcc55; }

/* Spread row */
.spread-row {
  display:flex; align-items:center; justify-content:center; gap:12px;
  padding:8px 12px; font-size:11px;
  border-top:1px solid var(--border-muted);
  border-bottom:1px solid var(--border-muted);
  background:var(--surface);
}
.spread-price {
  font-family:monospace; font-size:14px; font-weight:600;
}
.spread-label {
  font-size:10px; color:var(--fg-dim); text-transform:uppercase;
  letter-spacing:0.06em;
}

.book-empty {
  padding:24px 12px; text-align:center;
  font-size:12px; color:var(--fg-dim);
}

.book-footer {
  display:flex; align-items:center; justify-content:space-between;
  padding:6px 12px; font-size:10px; color:var(--fg-dim);
  border-top:1px solid var(--border-muted);
  background:var(--surface);
}

/* ---- Order form ---- */
.order-card {
  border:1px solid var(--border); border-radius:0;
  overflow:hidden; margin-top:16px; background:var(--bg);
}
.side-tabs {
  display:flex; border-bottom:1px solid var(--border-muted);
}
.side-tab {
  flex:1; padding:12px; text-align:center;
  font-family:inherit; font-size:11px; font-weight:600;
  letter-spacing:0.08em; text-transform:uppercase;
  cursor:pointer; border:none; background:transparent;
  color:var(--fg-muted); transition:all 0.15s; border-radius:0;
  border-bottom:2px solid transparent;
}
.side-tab:hover { color:var(--fg); }
.side-tab.active-buy { color:var(--green); border-bottom-color:var(--green); }
.side-tab.active-sell { color:var(--red); border-bottom-color:var(--red); }
.order-form-inner { padding:20px; }
.field { margin-bottom:16px; }
.field-label {
  display:block; font-size:11px; color:var(--fg-muted); text-transform:uppercase;
  letter-spacing:0.1em; margin-bottom:8px;
}
.field-row { display:flex; align-items:baseline; gap:8px; }
.field-input {
  font-family:inherit; font-size:20px; padding:6px 0;
  border:none; border-bottom:1.5px solid var(--border);
  background:transparent; color:var(--fg);
  flex:1; min-width:0; outline:none;
  transition:border-color 0.15s;
}
.field-input:focus { border-bottom-width:2.5px; margin-bottom:-1px; }
.field-input::placeholder { color:var(--fg-dim); }
.field-suffix {
  font-size:11px; color:var(--fg-muted); flex-shrink:0;
  text-transform:uppercase; letter-spacing:0.05em; font-weight:600;
}
.field-row-between {
  display:flex; justify-content:space-between; align-items:center;
  font-size:12px; padding:8px 0; margin-bottom:8px;
  border-top:1px solid var(--border-muted);
}
.field-row-between .label { color:var(--fg-muted); }
.field-row-between .value { font-family:monospace; }
.venue-row {
  display:flex; align-items:center; gap:0; margin-bottom:8px;
  border:1px solid var(--border-muted); overflow:hidden;
}
.venue-btn {
  flex:1; padding:10px 12px; text-align:center;
  font-family:inherit; font-size:10px; font-weight:600;
  letter-spacing:0.06em; text-transform:uppercase;
  cursor:pointer; border:none; background:transparent;
  color:var(--fg-muted); transition:all 0.15s; border-radius:0;
}
.venue-btn:hover { color:var(--fg); background:var(--surface); }
.venue-btn.active { background:var(--fg); color:var(--bg); }
.venue-btn:disabled { opacity:0.3; cursor:not-allowed; }
.venue-hint {
  font-size:10px; color:var(--fg-dim); margin-bottom:14px;
  line-height:1.4; text-align:center;
}
.submit-btn {
  width:100%; padding:14px 24px; border:1px solid transparent;
  font-family:inherit; font-size:13px; font-weight:600;
  letter-spacing:0.02em; cursor:pointer; transition:all 0.2s;
  text-transform:none; border-radius:0;
}
.submit-btn:hover:not(:disabled) { opacity:0.85; }
.submit-btn:disabled { opacity:0.35; cursor:not-allowed; }
.submit-btn.buy { background:var(--green); color:#fff; border-color:var(--green); }
.submit-btn.sell { background:var(--red); color:#fff; border-color:var(--red); }

/* Status */
.status-msg {
  font-size:11px; padding:6px 10px; margin-top:8px;
  display:none;
}
.status-msg.show { display:block; }
.status-msg.error { background:var(--red-bg); color:var(--red); }
.status-msg.success { background:var(--green-bg); color:var(--green); }
.status-msg.info { background:var(--surface); color:var(--fg-muted); }

/* My orders */
.my-orders { margin-top:16px; }
.my-order-item {
  display:flex; align-items:center; gap:10px;
  padding:12px;
  border:1px solid var(--border); border-radius:0;
  margin-bottom:0; border-bottom:none; font-size:12px;
  transition:background 0.1s;
}
.my-order-item:last-child { border-bottom:1px solid var(--border); }
.my-order-item:hover { background:var(--surface-hover); }
.my-order-side {
  font-size:10px; font-weight:700; letter-spacing:0.06em;
  text-transform:uppercase; width:32px; flex-shrink:0;
}
.my-order-side.bid { color:var(--green); }
.my-order-side.ask { color:var(--red); }
.my-order-details {
  flex:1; min-width:0;
  font-family:monospace; font-size:11px;
}
.my-order-details .line2 { color:var(--fg-muted); font-size:10px; margin-top:2px; }
.my-order-fill {
  font-size:10px; color:var(--fg-muted); text-align:right; flex-shrink:0;
}
.my-order-fill .pct { font-weight:600; }
.cancel-btn {
  font-family:inherit; font-size:10px; cursor:pointer;
  border:1px solid var(--red-dim); border-radius:0;
  padding:4px 10px; background:transparent; color:var(--red);
  transition:all 0.15s; flex-shrink:0;
  letter-spacing:0.05em; text-transform:uppercase; font-weight:600;
  margin:0;
}
.cancel-btn:hover { background:var(--red-bg); }
.empty-msg { font-size:12px; color:var(--fg-dim); padding:24px 0; text-align:center; }

/* Global orders view */
.global-controls { margin-bottom:12px; }
.global-search { margin-bottom:8px; }
.global-search input {
  width:100%; padding:8px 10px; font-family:inherit; font-size:13px;
  border:1px solid var(--border); border-radius:0;
  background:var(--bg); color:var(--fg); outline:none;
  transition:border-color 0.15s;
}
.global-search input:focus { border-color:var(--fg-muted); }
.global-search input::placeholder { color:var(--fg-dim); }
.global-toolbar {
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
}
.global-toolbar select {
  padding:4px 6px; font-family:inherit; font-size:11px;
  border:1px solid var(--border); border-radius:0;
  background:var(--bg); color:var(--fg); cursor:pointer; margin-left:auto;
}
.pair-filters { display:flex; gap:4px; flex-wrap:wrap; }
.pair-chip {
  font-size:10px; padding:3px 7px; border:1px solid var(--border);
  background:var(--bg); color:var(--fg-muted); cursor:pointer;
  font-family:monospace; transition:all 0.1s; border-radius:0;
}
.pair-chip:hover { border-color:var(--fg-muted); }
.pair-chip.active { background:var(--fg); color:var(--bg); border-color:var(--fg); }
.global-order-item {
  display:flex; align-items:center; gap:12px;
  padding:12px 14px;
  border:1px solid var(--border-muted); border-radius:0;
  margin-bottom:0; border-bottom:none; font-size:12px;
  cursor:pointer; transition:background 0.1s, border-color 0.15s;
}
.global-order-item:first-child { border-top:1px solid var(--border-muted); }
.global-order-item:last-child { border-bottom:1px solid var(--border-muted); }
.global-order-item:hover { background:var(--surface-hover); border-color:var(--fg-muted); z-index:1; position:relative; }
.order-token-pair {
  display:flex; align-items:center; gap:4px; flex-shrink:0;
}
.order-token-pair .token-icon { display:flex; align-items:center; }
.order-token-pair .token-icon svg, .order-token-pair .token-icon img { width:22px; height:22px; }
.order-arrow { color:var(--fg-dim); font-size:12px; margin:0 1px; }
.order-info {
  flex:1; min-width:0;
}
.order-info .amounts {
  font-family:monospace; font-size:12px; font-weight:500;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.order-info .meta {
  color:var(--fg-muted); font-size:10px; margin-top:3px;
}
.order-fill-badge {
  font-size:10px; color:var(--fg-muted); text-align:right; flex-shrink:0;
  line-height:1.3;
}
.order-fill-badge .pct { font-weight:600; }

/* Fill confirmation modal */
.fill-modal-pair {
  display:flex; align-items:center; justify-content:center;
  gap:16px; padding:24px 0 20px; margin-bottom:16px;
  border-bottom:1px solid var(--border-muted);
}
.fill-modal-token {
  display:flex; flex-direction:column; align-items:center; gap:8px; min-width:90px;
}
.fill-modal-token .icon { display:flex; align-items:center; }
.fill-modal-token .icon svg, .fill-modal-token .icon img { width:36px; height:36px; }
.fill-modal-token .amt {
  font-family:monospace; font-size:16px; font-weight:600; text-align:center;
  word-break:break-all; max-width:140px;
}
.fill-modal-token .sym { font-size:10px; color:var(--fg-muted); text-transform:uppercase; letter-spacing:0.06em; font-weight:600; }
.fill-modal-arrow { font-size:22px; color:var(--fg-dim); margin-top:14px; }
.fill-modal-details {
  font-size:12px; margin-bottom:16px;
  background:var(--surface); padding:10px 12px;
  border:1px solid var(--border-muted);
}
.fill-modal-details .row {
  display:flex; justify-content:space-between; padding:5px 0;
  border-bottom:1px solid var(--border-muted);
}
.fill-modal-details .row:last-child { border-bottom:none; }
.fill-modal-details .label { color:var(--fg-muted); font-size:11px; }
.fill-modal-details .value { font-family:monospace; font-size:12px; }
.fill-modal-note {
  font-size:11px; color:var(--fg-dim); margin-bottom:14px; text-align:center;
  padding:6px 0;
}
.fill-amt-row {
  display:flex; align-items:center; gap:8px; margin-bottom:16px;
  background:var(--surface); border:1px solid var(--border);
  padding:4px 4px 4px 10px;
}
.fill-amt-row input {
  flex:1; background:transparent; border:none;
  padding:8px 0; color:var(--fg); font-family:monospace; font-size:14px;
  outline:none;
}
.fill-amt-row input::placeholder { color:var(--fg-dim); }
.fill-amt-row .max-btn {
  font-size:10px; color:var(--fg); cursor:pointer;
  background:var(--border-muted); border:none;
  font-weight:700; letter-spacing:0.06em; padding:6px 10px;
  text-transform:uppercase; transition:background 0.15s;
}
.fill-amt-row .max-btn:hover { background:var(--border); }


/* Token picker */
.token-select {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--surface); border:1px solid var(--border);
  padding:8px 12px; font-family:inherit; font-size:13px; font-weight:600;
  cursor:pointer; color:var(--fg); transition:border-color 0.15s; border-radius:0;
  white-space:nowrap;
}
.token-select:hover { border-color:var(--fg-muted); }
.token-select .token-icon { display:flex; align-items:center; }
.token-select .token-icon svg, .token-select .token-icon img { width:20px; height:20px; }
.token-chevron { font-size:10px; opacity:0.5; }
.token-list-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; cursor:pointer; transition:background 0.12s;
}
.token-list-item:hover { background:var(--surface-hover); }
.token-list-item.highlight { background:var(--surface); outline:1px solid var(--border); outline-offset:-1px; }
.token-list-item .token-icon { display:flex; align-items:center; }
.token-list-item .token-icon svg, .token-list-item .token-icon img { width:24px; height:24px; }
.token-list-item .token-symbol { font-size:13px; font-weight:500; }
.token-search {
  width:100%; padding:12px 0; border:none; border-bottom:1px solid var(--border);
  font-size:15px; font-family:inherit; outline:none;
  background:transparent; color:var(--fg); flex-shrink:0;
}
.token-search:focus { border-bottom-color:var(--fg); }
.token-search-status { font-size:11px; color:var(--fg-dim); margin:4px 0 6px; min-height:14px; flex-shrink:0; }
.token-search-status.error { color:#e74c3c; }
.token-group-label {
  font-size:10px; text-transform:uppercase; letter-spacing:0.1em;
  color:var(--fg-dim); padding:10px 16px 4px; margin-top:4px;
  border-top:1px solid var(--border-muted);
  display:flex; justify-content:space-between; align-items:center; opacity:0.6;
}
.wei-list-remove {
  background:none; border:none; color:var(--fg-dim); font-size:14px;
  cursor:pointer; padding:0 4px; margin:0; line-height:1;
}
.wei-list-remove:hover { color:#e74c3c; }
.custom-token-input {
  width:100%; padding:8px 0; border:none; border-bottom:1px solid var(--border);
  font-size:12px; font-family:inherit; outline:none;
  background:transparent; color:var(--fg); flex:1;
}
.custom-token-input:focus { border-bottom-color:var(--fg); }
#obTokenList { scrollbar-width:thin; max-height:260px; overflow-y:auto; -webkit-overflow-scrolling:touch; }

/* Responsive */
@media (max-width:600px) {
  body { padding:60px 12px 12px; }
  .dark-toggle { bottom:16px; right:16px; }
  .z-nav { top:14px; left:14px; }
  .z-nav-btn { padding:4px; margin:-4px; }
  .z-nav-menu a { padding:10px 16px; }
  .pair-name { font-size:15px; }
  .amm-price { font-size:18px; }
  .price-banner { gap:10px; flex-wrap:wrap; }
  .book-row { font-size:11px; padding:0 8px; }
  .book-header { padding:6px 8px; }
  .spread-row { padding:6px 8px; }
  .order-form-inner { padding:12px; }
  .modal-overlay { padding:0; padding-top:0; align-items:flex-end; }
  .modal { max-width:100%; margin:0; border-left:none; border-right:none; border-bottom:none; max-height:85vh; max-height:85dvh; padding:16px; padding-bottom:max(16px, env(safe-area-inset-bottom)); }
}
@media (max-width:380px) {
  body { padding:60px 8px 8px; }

<script>
// ---- Constants ----
const ZERO    = "0x0000000000000000000000000000000000000000";
const BASE    = "https://coinchan-indexer-production.up.railway.app";

const SWAPBOARD = "0x000000fF3D7A2d373615141d7489Ca66683DbecF";
const SWAPBOARD_PF = "0x00000000CC3915a0f5F98CBdC558Ac1a8e85B831";
const SWAPBOARD_WETH = "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2";

const SWAPBOARD_ABI = [
  "function createOrder(address tokenA, uint256 amountA, address tokenB, uint256 amountB) returns (uint256)",
  "function createOrderWithEth(address tokenB, uint256 amountB) payable returns (uint256)",
  "function fillOrder(uint256 orderId, uint256 deadline)",
  "function fillOrderWithEth(uint256 orderId, uint256 deadline) payable",
  "function fillOrderUnwrap(uint256 orderId, uint256 deadline)",
  "function cancelOrder(uint256 orderId)",
  "function cancelOrderUnwrap(uint256 orderId)",
];

const SWAPBOARD_PF_ABI = [
  "function createOrder(address tokenA, uint256 amountA, address tokenB, uint256 amountB, bool partialFill) returns (uint256)",
  "function createOrderWithEth(address tokenB, uint256 amountB, bool partialFill) payable returns (uint256)",
  "function fillOrder(uint256 orderId, uint256 deadline, uint256 fillAmountB) external",
  "function fillOrderWithEth(uint256 orderId, uint256 deadline) payable",
  "function fillOrderUnwrap(uint256 orderId, uint256 deadline, uint256 fillAmountB) external",
  "function cancelOrder(uint256 orderId)",
  "function cancelOrderUnwrap(uint256 orderId)",
];

// View helper for batch-reading active orders with token metadata (deploy SwapboardView.sol and set address)
const SWAPBOARD_VIEW = "0x51B33f0dd2680ba3f8C1cF30C33aeD8BFca1DF38";
const SWAPBOARD_VIEW_ABI = [
  "function getAllActiveOrders(address boardV1, address boardV2) view returns (tuple(uint256 orderId, address maker, bool partialFill, address tokenA, uint256 amountA, string symbolA, uint8 decimalsA, address tokenB, uint256 amountB, string symbolB, uint8 decimalsB, address board)[])",
];

const ERC20_ABI = [
  "function approve(address spender, uint256 amount) returns (bool)",
  "function allowance(address owner, address spender) view returns (uint256)"
];

// ---- Token registry (shared with swap page via localStorage) ----
const WEINS_ADDRESS = "0x0000000000696760E15f265e828DB644A0c242EB";
const WEINS_ABI = ["function computeId(string) pure returns (uint256)", "function text(uint256,string) view returns (string)", "function contenthash(uint256) view returns (bytes)"];
const IPFS_GATEWAYS = ["https://content.wrappr.wtf/ipfs/", "https://dweb.link/ipfs/"];
const RPC_URL = "https://ethereum.publicnode.com";

// ---- Known tokens (from swap page) ----
const KNOWN_TOKENS = {
  "0x0000000000000000000000000000000000000000": { symbol: "ETH", decimals: 18 },
  "0xc02aaa39b223fe8d0a0e5c4f27ead9083c756cc2": { symbol: "WETH", decimals: 18 },
  "0xa0b86991c6218b36c1d19d4a2e9eb0ce3606eb48": { symbol: "USDC", decimals: 6 },
  "0xdac17f958d2ee523a2206206994597c13d831ec7": { symbol: "USDT", decimals: 6 },
  "0x2260fac5e5542a773aa44fbcfedf7c193bc2c599": { symbol: "WBTC", decimals: 8 },
  "0x7f39c581f595b53c5cb19bd0b3f8da6c935e2ca0": { symbol: "wstETH", decimals: 18 },
  "0xae78736cd615f374d3085123a210448e74fc6393": { symbol: "rETH", decimals: 18 },
  "0x6b175474e89094c44da98b954eedeac495271d0f": { symbol: "DAI", decimals: 18 },
  "0x6440f144b7e50d6a8439336510312d2f54beb01d": { symbol: "BOLD", decimals: 18 },
  "0x5f98805a4e8be255a32880fdec7f6728c6568ba0": { symbol: "LUSD", decimals: 18 },
  "0x00a6ba94bbb5474725515de88fe04f854f2dcb12": { symbol: "zOrg", decimals: 18 },
  "0xe9b1cfea55baa219e34301f2f31b9fd0921664ed": { symbol: "ZAMM", decimals: 18 },
};

const _obTokens = {};
// Bootstrap from KNOWN_TOKENS
for (const [addr, info] of Object.entries(KNOWN_TOKENS)) {
  const sym = info.symbol;
  _obTokens[sym] = { address: addr === ZERO ? ZERO : ethers.getAddress(addr), symbol: sym, decimals: info.decimals };
}

const BUILTIN_SYMS = new Set(Object.keys(_obTokens));

// Load custom tokens from localStorage (shared with swap page)
try {
  for (const t of JSON.parse(localStorage.getItem('zswap_custom_tokens') || '[]')) {
    if (t.address && t.symbol && t.decimals != null && !_obTokens[t.symbol])
      _obTokens[t.symbol] = { address: t.address, symbol: t.symbol, decimals: t.decimals };
  }
} catch (_) {}

// .wei list state
const _obWeiLists = new Map();
const _obWeiListSrc = new Map();
let _obTokenListAutoLoaded = false;

function _obSaveCustomTokens() {
  try {
    const custom = Object.values(_obTokens).filter(t => !BUILTIN_SYMS.has(t.symbol) && !_obWeiListSrc.has(t.symbol));
    localStorage.setItem('zswap_custom_tokens', JSON.stringify(custom));
  } catch (_) {}
}

function _obSaveWeiLists() {
  try {
    const obj = {};
    for (const [n, d] of _obWeiLists) obj[n] = d;
    localStorage.setItem('zswap_wei_lists', JSON.stringify(obj));
  } catch (_) {}
}

function _obValidateTokenList(arr) {
  if (!Array.isArray(arr)) return [];
  const seen = new Set(), out = [];
  for (const e of arr) {
    if (!e || typeof e !== 'object') continue;
    const { address, symbol, decimals } = e;
    if (!address || !symbol || decimals == null) continue;
    const a = String(address).trim().toLowerCase();
    if (!ethers.isAddress(a)) continue;
    const cs = ethers.getAddress(a);
    if (cs === ZERO || seen.has(a)) continue;
    const sym = String(symbol).trim();
    if (!sym || sym.length > 24 || !/^[A-Za-z0-9.$_-]+$/.test(sym)) continue;
    const dec = Number(decimals);
    if (!Number.isInteger(dec) || dec < 0 || dec > 36) continue;
    seen.add(a);
    const item = { address: cs, symbol: sym, decimals: dec };
    if (e.icon && typeof e.icon === 'string') {
      const url = e.icon.trim();
      if (url.startsWith('https://') || url.startsWith('data:image/')) item.icon = url;
    }
    out.push(item);
  }
  return out;
}

function _obMergeWeiList(listName, validated) {
  for (const t of validated) {
    if (BUILTIN_SYMS.has(t.symbol) || Object.values(_obTokens).some(x => BUILTIN_SYMS.has(x.symbol) && x.address.toLowerCase() === t.address.toLowerCase())) continue;
    let sym = t.symbol;
    if (_obTokens[sym] && _obTokens[sym].address.toLowerCase() !== t.address.toLowerCase())
      sym = sym + '.' + listName.replace(/\.wei$/, '');
    if (!_obTokens[sym]) {
      _obTokens[sym] = { address: t.address, symbol: sym, decimals: t.decimals };
      if (t.icon) _obTokens[sym].icon = t.icon;
    }
    _obWeiListSrc.set(sym, listName);
  }
}

// Load saved .wei lists
try {
  for (const [name, data] of Object.entries(JSON.parse(localStorage.getItem('zswap_wei_lists') || '{}'))) {
    if (data && Array.isArray(data.tokens)) {
      _obWeiLists.set(name, data);
      _obMergeWeiList(name, data.tokens);
    }
  }
} catch (_) {}

// ENSIP-7 contenthash → IPFS CID decoder
const _B32 = 'abcdefghijklmnopqrstuvwxyz234567';
function _bytesToB32(bytes) {
  let bits = 0, val = 0, out = '';
  for (const b of bytes) { val = (val << 8) | b; bits += 8; while (bits >= 5) { bits -= 5; out += _B32[(val >> bits) & 31]; } }
  if (bits > 0) out += _B32[(val << (5 - bits)) & 31];
  return out;
}
function _decodeContenthash(hex) {
  try {
    const b = ethers.getBytes(hex);
    if (b.length < 3) return null;
    let proto = 0, shift = 0, off = 0;
    for (; off < b.length; off++) { proto |= (b[off] & 0x7f) << shift; shift += 7; if (!(b[off] & 0x80)) { off++; break; } }
    if (proto !== 0xe3) return null;
    const cid = b.slice(off);
    return cid[0] === 0x01 ? 'b' + _bytesToB32(cid) : null;
  } catch { return null; }
}
async function _fetchIPFS(cid) {
  let err;
  for (const gw of IPFS_GATEWAYS) {
    try { const r = await fetch(gw + cid); if (!r.ok) throw new Error(r.status); return await r.text(); } catch (e) { err = e; }
  }
  throw new Error('IPFS failed: ' + err?.message);
}

let _obWeiSeq = 0, _obWeiResolving = false;
async function _obResolveWeiList(nameInput) {
  let name = nameInput.toLowerCase().trim();
  if (name.endsWith('.wei')) name = name.slice(0, -4);
  if (!name) return;
  const fullName = name + '.wei';
  if (_obWeiLists.has(fullName)) { $('obTokenSearchStatus').textContent = fullName + ' already loaded'; return; }

  const seq = ++_obWeiSeq;
  _obWeiResolving = true;
  const st = $('obTokenSearchStatus');
  st.className = 'token-search-status';
  st.textContent = 'Loading ' + fullName + '...';

  try {
    const rpc = new ethers.JsonRpcProvider(RPC_URL);
    const ns = new ethers.Contract(WEINS_ADDRESS, WEINS_ABI, rpc);
    const tokenId = await ns.computeId(fullName);
    const [ch, txt] = await Promise.all([ns.contenthash(tokenId).catch(() => '0x'), ns.text(tokenId, 'tokens').catch(() => '')]);
    if (seq !== _obWeiSeq) { _obWeiResolving = false; return; }

    let raw = null;
    if (ch && ch !== '0x' && ch.length > 2) {
      const cid = _decodeContenthash(ch);
      if (cid) { st.textContent = 'Fetching from IPFS...'; raw = await _fetchIPFS(cid); if (seq !== _obWeiSeq) { _obWeiResolving = false; return; } }
    }
    if (!raw || !raw.trim()) raw = txt;
    if (!raw || !raw.trim()) { st.className = 'token-search-status error'; st.textContent = 'No token list found on ' + fullName; _obWeiResolving = false; return; }

    let parsed;
    try { parsed = JSON.parse(raw); } catch { st.className = 'token-search-status error'; st.textContent = 'Invalid JSON from ' + fullName; _obWeiResolving = false; return; }

    const validated = _obValidateTokenList(parsed);
    if (!validated.length) { st.className = 'token-search-status error'; st.textContent = 'No valid tokens in ' + fullName; _obWeiResolving = false; return; }

    _obWeiLists.set(fullName, { tokens: validated, loadedAt: Date.now() });
    _obMergeWeiList(fullName, validated);
    _obSaveWeiLists();
    st.textContent = 'Loaded ' + validated.length + ' tokens from ' + fullName;
    _obWeiResolving = false;
    _obRenderTokenList($('obTokenSearch')?.value || '');
  } catch (e) {
    _obWeiResolving = false;
    if (seq !== _obWeiSeq) return;
    st.className = 'token-search-status error';
    st.textContent = 'Failed to resolve ' + fullName;
    console.error('.wei resolve error:', e);
  }
}

function _obRemoveWeiList(listName) {
  if (!_obWeiLists.has(listName)) return;
  const toRemove = [];
  for (const [sym, src] of _obWeiListSrc) { if (src === listName) toRemove.push(sym); }
  for (const sym of toRemove) { delete _obTokens[sym]; _obWeiListSrc.delete(sym); }
  _obWeiLists.delete(listName);
  _obSaveWeiLists();
  if (listName === 'token-list.wei') _obTokenListAutoLoaded = false;
}

// ---- Token picker UI ----
let _obTokenModalSide = null; // 'A' or 'B'
let _newTokenA = 'ETH', _newTokenB = 'USDC';

function _obRenderTokenList(filter) {
  const list = $('obTokenList');
  if (!list) return;
  list.textContent = '';
  const frag = document.createDocumentFragment();
  const q = (filter || '').toLowerCase().trim();

  function matches(sym, addr) {
    if (!q) return true;
    return sym.toLowerCase().includes(q) || addr.toLowerCase().includes(q);
  }

  function makeRow(symbol) {
    const t = _obTokens[symbol];
    const row = document.createElement('div');
    row.className = 'token-list-item';
    row.setAttribute('data-symbol', symbol);
    const iconSpan = document.createElement('span');
    iconSpan.className = 'token-icon';
    if (t.icon) {
      iconSpan.innerHTML = '<img src="' + escAttr(t.icon) + '" width="24" height="24" style="border-radius:50%" onerror="this.outerHTML=makeLetterIcon(\'' + escAttr(symbol) + '\')">';
    } else {
      iconSpan.innerHTML = iconForSymbol(symbol);
    }
    const nameSpan = document.createElement('span');
    nameSpan.className = 'token-symbol';
    nameSpan.textContent = symbol;
    row.append(iconSpan, nameSpan);
    return row;
  }

  // Built-in tokens first
  let hasAny = false;
  for (const sym of Object.keys(_obTokens)) {
    if (!BUILTIN_SYMS.has(sym)) continue;
    if (!matches(sym, _obTokens[sym].address)) continue;
    frag.appendChild(makeRow(sym));
    hasAny = true;
  }

  // .wei list groups
  const weiByList = new Map();
  for (const [sym, src] of _obWeiListSrc) {
    if (!_obTokens[sym]) continue;
    if (!weiByList.has(src)) weiByList.set(src, []);
    weiByList.get(src).push(sym);
  }
  for (const [listName] of _obWeiLists) {
    const syms = (weiByList.get(listName) || []).filter(s => matches(s, _obTokens[s].address));
    if (!syms.length) continue;
    const label = document.createElement('div');
    label.className = 'token-group-label';
    label.innerHTML = escText(listName) + ' <button class="wei-list-remove" data-list="' + escAttr(listName) + '" title="Remove list">&times;</button>';
    frag.appendChild(label);
    for (const s of syms) frag.appendChild(makeRow(s));
    hasAny = true;
  }

  // Custom tokens
  const custom = Object.keys(_obTokens).filter(s => !BUILTIN_SYMS.has(s) && !_obWeiListSrc.has(s) && matches(s, _obTokens[s].address));
  if (custom.length) {
    const label = document.createElement('div');
    label.className = 'token-group-label';
    label.textContent = 'Custom';
    frag.appendChild(label);
    for (const s of custom) frag.appendChild(makeRow(s));
    hasAny = true;
  }

  if (!hasAny) {
    const empty = document.createElement('div');
    empty.style.cssText = 'padding:16px 12px;color:var(--fg-dim);font-size:13px;text-align:center';
    if (q && !_obTokenListAutoLoaded && !_obWeiLists.has('token-list.wei') && !q.endsWith('.wei')) {
      _obTokenListAutoLoaded = true;
      empty.textContent = 'Searching extended token list\u2026';
      frag.appendChild(empty);
      _obResolveWeiList('token-list.wei');
    } else if (q && _obWeiResolving) {
      empty.textContent = 'Searching\u2026';
      frag.appendChild(empty);
    } else {
      empty.textContent = q ? 'No tokens match \u201c' + q + '\u201d' : 'No tokens';
      frag.appendChild(empty);
    }
  }

  list.appendChild(frag);

  // Highlight best match
  if (q && q.length >= 2) {
    let best = null;
    for (const row of list.querySelectorAll('.token-list-item')) {
      const sym = (row.getAttribute('data-symbol') || '').toLowerCase();
      const t = _obTokens[row.getAttribute('data-symbol')];
      if (sym === q || (t && t.address.toLowerCase() === q)) { best = row; break; }
      if (!best && (sym.includes(q) || (t && t.address.toLowerCase().includes(q)))) best = row;
    }
    if (best) { best.classList.add('highlight'); best.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }
  }
}

// Custom token add
async function obAddCustomToken() {
  let address = $('obCustomTokenAddr').value.trim();
  if (!ethers.isAddress(address)) { $('obTokenSearchStatus').textContent = 'Invalid address'; $('obTokenSearchStatus').className = 'token-search-status error'; return; }
  address = ethers.getAddress(address);
  if (address === ZERO) { $('obTokenSearchStatus').textContent = 'Use ETH from the list'; $('obTokenSearchStatus').className = 'token-search-status error'; return; }
  try {
    const rpc = _walletProvider || new ethers.JsonRpcProvider(RPC_URL);
    const erc20 = new ethers.Contract(address, ["function symbol() view returns (string)", "function decimals() view returns (uint8)"], rpc);
    const [rawSym, rawDec] = await Promise.all([erc20.symbol(), erc20.decimals()]);
    const symbol = String(rawSym || '').trim().slice(0, 24) || 'TKN';
    const decimals = Number.isInteger(Number(rawDec)) && Number(rawDec) >= 0 && Number(rawDec) <= 36 ? Number(rawDec) : 18;
    if (_obTokens[symbol] && _obTokens[symbol].address.toLowerCase() !== address.toLowerCase()) {
      $('obTokenSearchStatus').textContent = 'Symbol ' + symbol + ' already exists for a different address';
      $('obTokenSearchStatus').className = 'token-search-status error';
      return;
    }
    _obTokens[symbol] = { address, symbol, decimals };
    _obSaveCustomTokens();
    _obSelectToken(symbol);
  } catch (e) {
    $('obTokenSearchStatus').textContent = 'Failed to add token';
    $('obTokenSearchStatus').className = 'token-search-status error';
  }
}

// Multiply two decimal strings precisely using BigInt (18-decimal fixed-point)
function mulDecimals(a, b, decimals) {
  const d = BigInt(decimals || 18);
  const BASE = 10n ** d;
  const aw = ethers.parseUnits(a, d);
  const bw = ethers.parseUnits(b, d);
  return (aw * bw) / BASE;
}

function makeLetterIcon(sym) {
  const full = String(sym ?? '').trim();
  const clean = full.replace(/[^A-Za-z0-9]/g, '') || '?';
  // Show max 3-4 chars for readability at small sizes (20px display)
  const show = clean.length <= 4 ? clean : clean.slice(0, 3);
  const L = show.length;
  const fontSize = L <= 1 ? 12 : L === 2 ? 10 : L === 3 ? 8.5 : 7;
  let hash = 0;
  for (let i = 0; i < clean.length; i++) hash = ((hash << 5) - hash + clean.charCodeAt(i)) | 0;
  const hue = ((hash % 360) + 360) % 360;
  return `<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">` +
    `<circle cx="12" cy="12" r="11" fill="hsl(${hue},50%,50%)" stroke="hsl(${hue},35%,38%)" stroke-width="1"/>` +
    `<text x="12" y="12.5" text-anchor="middle" dominant-baseline="middle"` +
    ` font-family="Helvetica,Arial,sans-serif"` +
    ` font-size="${fontSize}" font-weight="700" fill="#fff">${escText(show)}</text></svg>`;
}

const _obLetterIconCache = new Map();
function iconForSymbol(sym) {
  const s = String(sym);
  if (TOKEN_ICONS[s]) return TOKEN_ICONS[s];
  if (_obLetterIconCache.has(s)) return _obLetterIconCache.get(s);
  const svg = makeLetterIcon(s);
  _obLetterIconCache.set(s, svg);
  return svg;
}

// ---- Pool ID from hash ----
function getPoolId() {
  const m = location.hash.match(/^#\/(\d+)$/);
  return m ? m[1] : null;
}

function getTokenParams() {
  const p = new URLSearchParams(location.search);
  const token0 = p.get('token0');
  const token1 = p.get('token1');
  if (!token0 || !token1) return null;
  const id0 = p.get('id0') || '0';
  const id1 = p.get('id1') || '0';
  const price = p.get('price');
  const label0 = p.get('label0') || '';
  const label1 = p.get('label1') || '';
  const logo0 = p.get('logo0') || '';
  const logo1 = p.get('logo1') || '';
  // Sort by address, then by id when addresses are equal
  let sorted0, sorted1, sId0, sId1, sLabel0, sLabel1, sLogo0, sLogo1;
  const a = token0.toLowerCase(), b = token1.toLowerCase();
  if (a < b || (a === b && BigInt(id0) <= BigInt(id1))) {
    [sorted0, sorted1, sId0, sId1, sLabel0, sLabel1, sLogo0, sLogo1] = [token0, token1, id0, id1, label0, label1, logo0, logo1];
  } else {
    [sorted0, sorted1, sId0, sId1, sLabel0, sLabel1, sLogo0, sLogo1] = [token1, token0, id1, id0, label1, label0, logo1, logo0];
  }
  return { token0: sorted0, token1: sorted1, id0: sId0, id1: sId1, price, label0: sLabel0, label1: sLabel1, logo0: sLogo0, logo1: sLogo1 };
}

// ---- Fetch pool data ----
async function fetchPool(poolId) {
  const query = `query ($id: BigInt!, $source: String!, $chainId: Float!) {
    pool(id: $id, source: $source, chainId: $chainId) {
      id token0 token1
      coin0 { id decimals name symbol imageUrl }
      coin1 { id decimals name symbol imageUrl }
      reserve0 reserve1
    }
  }`;
  try {
    const res = await fetch(BASE + "/graphql", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query, variables: { id: poolId, source: "ZAMM", chainId: 1 } })
    });
    const { data } = await res.json();
    if (data && data.pool) return data.pool;
  } catch (e) {
    console.warn('Pool fetch failed:', e);
  }
  return null;
}

// ---- Fetch orders (via SwapboardView — single eth_call for both contracts) ----
async function fetchOrders() {
  const provider = new ethers.JsonRpcProvider(RPC_URL);
  const view = new ethers.Contract(SWAPBOARD_VIEW, SWAPBOARD_VIEW_ABI, provider);
  const raw = await view.getAllActiveOrders(SWAPBOARD, SWAPBOARD_PF);
  const wethLower = SWAPBOARD_WETH.toLowerCase();
  const sbLower = SWAPBOARD.toLowerCase();
  return raw.map(o => {
    const addrA = o.tokenA.toLowerCase(), addrB = o.tokenB.toLowerCase();
    const isV1 = o.board.toLowerCase() === sbLower;
    const source = isV1 ? 'swapboard' : 'swapboard-pf';
    const prefix = isV1 ? 'sb-' : 'pf-';
    const decA = Number(o.decimalsA) || 18, decB = Number(o.decimalsB) || 18;
    const symA = addrA === wethLower ? 'ETH' : (o.symbolA || addrA.slice(0, 6));
    const symB = addrB === wethLower ? 'ETH' : (o.symbolB || addrB.slice(0, 6));
    if (o.symbolA && !KNOWN_TOKENS[addrA]) KNOWN_TOKENS[addrA] = { symbol: o.symbolA, decimals: decA };
    if (o.symbolB && !KNOWN_TOKENS[addrB]) KNOWN_TOKENS[addrB] = { symbol: o.symbolB, decimals: decB };
    return {
      id: prefix + o.orderId.toString(),
      _source: source,
      _orderId: o.orderId.toString(),
      maker: o.maker,
      tokenIn: o.tokenA,
      idIn: "0",
      amtIn: o.amountA.toString(),
      tokenOut: o.tokenB,
      idOut: "0",
      amtOut: o.amountB.toString(),
      deadline: "9999999999",
      partialFill: o.partialFill,
      inDone: "0",
      outDone: "0",
      status: "ACTIVE",
      txHash: "",
      _decIn: decA,
      _decOut: decB,
      _symIn: symA,
      _symOut: symB,
    };
  });
}

// ---- Filter orders by pool pair ----
// For Swapboard orders, ETH pools match WETH since Swapboard uses WETH internally
function _tokMatch(orderAddr, poolAddr) {
  const o = orderAddr.toLowerCase(), p = poolAddr.toLowerCase();
  if (o === p) return true;
  const weth = SWAPBOARD_WETH.toLowerCase();
  // ETH in pool matches WETH in Swapboard orders
  if (p === ZERO && o === weth) return true;
  if (o === ZERO && p === weth) return true;
  return false;
}

function filterOrdersForPool(orders, pool) {
  if (!pool) return [];
  const now = Math.floor(Date.now() / 1000);
  const t0 = pool.token0.toLowerCase();
  const t1 = pool.token1.toLowerCase();
  const id0 = pool.coin0 ? pool.coin0.id : "0";
  const id1 = pool.coin1 ? pool.coin1.id : "0";

  const filtered = orders.filter(o => {
    if (o.status !== "ACTIVE") return false;
    if (Number(o.deadline) <= now) return false;
    const oti = o.tokenIn.toLowerCase(), oto = o.tokenOut.toLowerCase();

    return (_tokMatch(oti, t0) && _tokMatch(oto, t1))
        || (_tokMatch(oti, t1) && _tokMatch(oto, t0));
  });
  return filtered;
}

// ---- Classify bids and asks ----
// Classify orders as bids (buy base) or asks (sell base).
// Convention: token0=base, token1=quote. Prices in quote/base.
// Bid = maker deposited token1 (quote) to buy token0 (base).
// Ask = maker deposited token0 (base) to sell for token1 (quote).
function classifyOrders(orders, pool) {
  if (!pool) return { bids: [], asks: [] };
  const id0 = pool.coin0 ? pool.coin0.id : "0";
  const bids = [], asks = [];
  for (const o of orders) {
    if (_tokMatch(o.tokenIn, pool.token0)) {
      asks.push(o); // depositing base → selling base → ask
    } else {
      bids.push(o); // depositing quote → buying base → bid
    }
  }
  // Price in quote/base: for bids, price = amtIn(quote)/amtOut(base); for asks, price = amtOut(quote)/amtIn(base)
  const price = (o, isBid) => {
    const inAmt = BigInt(o.amtIn), outAmt = BigInt(o.amtOut);
    if (isBid) return outAmt > 0n ? Number(inAmt * 10000n / outAmt) / 10000 : 0;
    return inAmt > 0n ? Number(outAmt * 10000n / inAmt) / 10000 : 0;
  };
  bids.sort((a, b) => price(b, true) - price(a, true)); // highest bid first
  asks.sort((a, b) => price(a, false) - price(b, false)); // lowest ask first
  return { bids, asks };
}

// ---- Format helpers ----
function fmt(wei, decimals) {
  if (!wei || wei === "0") return "0";
  const d = decimals || 18;
  const n = BigInt(wei);
  const whole = n / (10n ** BigInt(d));
  const frac = n % (10n ** BigInt(d));
  const fracStr = frac.toString().padStart(d, '0').slice(0, 5).replace(/0+$/, '');
  return whole.toString() + (fracStr ? '.' + fracStr : '');
}

function fmtCompact(n) {
  if (n >= 1) return n.toPrecision(6);
  return n.toPrecision(4);
}

function shortAddr(a) {
  return a.slice(0, 6) + '...' + a.slice(-4);
}

function timeLeft(deadline) {
  const secs = Number(deadline) - Math.floor(Date.now() / 1000);
  if (secs <= 0) return 'expired';
  if (secs < 3600) return Math.floor(secs / 60) + 'm';
  if (secs < 86400) return Math.floor(secs / 3600) + 'h';
  return Math.floor(secs / 86400) + 'd';
}

function tokenLabel(pool, side) {
  const coin = side === 0 ? pool.coin0 : pool.coin1;
  const addr = side === 0 ? pool.token0 : pool.token1;
  if (coin && coin.symbol) return coin.symbol;
  if (addr === ZERO) return 'ETH';
  return shortAddr(addr);
}

function fillPct(o) {
  // Swapboard orders return remaining amounts (inDone/outDone not tracked on-chain)
  if (o._source === 'swapboard' || o._source === 'swapboard-pf') return -1;
  const total = BigInt(o.amtOut);
  if (total === 0n) return 0;
  return Number(BigInt(o.outDone) * 100n / total);
}
function fillPctLabel(o) {
  const pct = fillPct(o);
  return pct < 0 ? '' : pct + '%';
}

// ---- Render book (exchange-style) ----
function renderBook() {
  if (!_poolData) return;
  const filtered = filterOrdersForPool(_allOrders, _poolData);
  const { bids, asks } = classifyOrders(filtered, _poolData);
  const label0 = tokenLabel(_poolData, 0);
  const label1 = tokenLabel(_poolData, 1);
  const dec0 = _poolData.coin0?.decimals || 18;
  const dec1 = _poolData.coin1?.decimals || 18;

  // Convention: token0=base, token1=quote. Prices in quote/base.
  // Asks: maker deposited token0(base), wants token1(quote) → tokenIn=token0, tokenOut=token1
  // Bids: maker deposited token1(quote), wants token0(base) → tokenIn=token1, tokenOut=token0

  // base/quote decimals for an order
  function baseDec(o) { const isInBase = _tokMatch(o.tokenIn, _poolData.token0); return isInBase ? (o._decIn||dec0) : (o._decOut||dec0); }
  function quoteDec(o) { const isInBase = _tokMatch(o.tokenIn, _poolData.token0); return isInBase ? (o._decOut||dec1) : (o._decIn||dec1); }
  // base/quote amounts: for asks tokenIn=base, for bids tokenOut=base
  function baseAmt(o, isBid) { return isBid ? o.amtOut : o.amtIn; }
  function quoteAmt(o, isBid) { return isBid ? o.amtIn : o.amtOut; }

  $('hdrPrice').textContent = 'Price (' + label1 + ')';
  $('hdrSize').textContent = 'Size (' + label0 + ')';
  $('hdrTotal').textContent = 'Total (' + label1 + ')';
  $('orderCount').textContent = (bids.length + asks.length) + ' orders';

  function orderPrice(o, isBid) {
    const bd = baseDec(o), qd = quoteDec(o);
    const base = Number(BigInt(baseAmt(o, isBid))) / (10 ** bd);
    const quote = Number(BigInt(quoteAmt(o, isBid))) / (10 ** qd);
    return base > 0 ? quote / base : 0; // quote per base
  }

  // Depth bars based on base size
  const bidBaseSizes = bids.map(o => Number(BigInt(baseAmt(o, true))) / (10 ** baseDec(o)));
  const askBaseSizes = asks.map(o => Number(BigInt(baseAmt(o, false))) / (10 ** baseDec(o)));
  const maxBid = Math.max(...bidBaseSizes, 0.0001);
  const maxAsk = Math.max(...askBaseSizes, 0.0001);

  // Asks (reversed: lowest ask at bottom, closest to spread)
  const displayAsks = asks.slice(0, 12).reverse();
  if (displayAsks.length === 0) {
    $('asksSection').innerHTML = '<div class="book-empty">No asks</div>';
  } else {
    let html = '';
    for (const o of displayAsks) {
      const price = orderPrice(o, false);
      const bd = baseDec(o), qd = quoteDec(o);
      const baseSize = Number(BigInt(baseAmt(o, false))) / (10 ** bd);
      const depth = (baseSize / maxAsk * 100).toFixed(1);
      const aon = o.partialFill ? '' : '<span class="aon-tag" title="All-or-nothing">AON</span>';
      html += `<div class="book-row ask-row" onclick="showFillModal('${o.id}')" title="Click to fill &middot; ${shortAddr(o.maker)} &middot; ${o.deadline === '9999999999' ? 'no expiry' : timeLeft(o.deadline)}${o.partialFill ? '' : ' &middot; All-or-nothing'} &middot; ${o._source}">
        <span class="depth" style="width:${depth}%"></span>
        <span class="price" onclick="event.stopPropagation();bookToTrade(${price},'buy')" title="Trade at this price">${fmtCompact(price)}</span>
        <span class="size">${fmt(baseAmt(o, false), bd)}${aon}${srcTag(o)}</span>
        <span class="total">${fmt(quoteAmt(o, false), qd)}</span>
      </div>`;
    }
    $('asksSection').innerHTML = html;
  }

  // Spread
  if (bids.length > 0 && asks.length > 0) {
    const bestBidPrice = orderPrice(bids[0], true);
    const bestAskPrice = orderPrice(asks[0], false);
    const mid = (bestBidPrice + bestAskPrice) / 2;
    const spreadPct = mid > 0 ? ((bestAskPrice - bestBidPrice) / mid * 100).toFixed(2) : '0';
    $('spreadPrice').textContent = fmtCompact(mid);
    $('spreadLabel').textContent = spreadPct + '% spread';
    $('spreadRow').style.display = '';
  } else {
    $('spreadRow').style.display = 'none';
  }

  // Bids (highest bid at top, closest to spread)
  const displayBids = bids.slice(0, 12);
  if (displayBids.length === 0) {
    $('bidsSection').innerHTML = '<div class="book-empty">No bids</div>';
  } else {
    let html = '';
    for (const o of displayBids) {
      const price = orderPrice(o, true);
      const bd = baseDec(o), qd = quoteDec(o);
      const baseSize = Number(BigInt(baseAmt(o, true))) / (10 ** bd);
      const depth = (baseSize / maxBid * 100).toFixed(1);
      const aon = o.partialFill ? '' : '<span class="aon-tag" title="All-or-nothing">AON</span>';
      html += `<div class="book-row bid-row" onclick="showFillModal('${o.id}')" title="Click to fill &middot; ${shortAddr(o.maker)} &middot; ${o.deadline === '9999999999' ? 'no expiry' : timeLeft(o.deadline)}${o.partialFill ? '' : ' &middot; All-or-nothing'} &middot; ${o._source}">
        <span class="depth" style="width:${depth}%"></span>
        <span class="price" onclick="event.stopPropagation();bookToTrade(${price},'sell')" title="Trade at this price">${fmtCompact(price)}</span>
        <span class="size">${fmt(baseAmt(o, true), bd)}${aon}${srcTag(o)}</span>
        <span class="total">${fmt(quoteAmt(o, true), qd)}</span>
      </div>`;
    }
    $('bidsSection').innerHTML = html;
  }
}

function bookToTrade(price, side) {
  if (!Number.isFinite(price) || price <= 0) return;
  setSide(side);
  // Avoid scientific notation (e.g. "1e-7") which ethers.parseUnits rejects
  $('orderPrice').value = price >= 1 ? price.toPrecision(6) : price.toFixed(18).replace(/0+$/, '').replace(/\.$/, '.0');
  $('orderAmt').focus();
  updateOrderTotal();
  switchTab('make');
}

// ---- Order side toggle ----
function setSide(side) {
  _orderSide = side;
  const base = _poolData ? tokenLabel(_poolData, 0) : 'ETH';
  const quote = _poolData ? tokenLabel(_poolData, 1) : 'USD';

  $('sideBuy').className = 'side-tab' + (side === 'buy' ? ' active-buy' : '');
  $('sideSell').className = 'side-tab' + (side === 'sell' ? ' active-sell' : '');

  $('orderAmtUnit').textContent = base;

  const btn = $('makeOrderBtn');
  btn.className = 'submit-btn ' + side;

// ---- Render my orders ----
async function renderMyOrders() {
  if (!_signer || !_poolData) {
    $('myOrdersTable').innerHTML = '<div class="empty-msg">Connect wallet to see your orders</div>';
    return;
  }
  const addr = (await _signer.getAddress()).toLowerCase();
  const filtered = filterOrdersForPool(_allOrders, _poolData);
  const mine = filtered.filter(o => o.maker.toLowerCase() === addr);
  const label0 = tokenLabel(_poolData, 0);
  const label1 = tokenLabel(_poolData, 1);

  if (mine.length === 0) {
    $('myOrdersTable').innerHTML = '<div class="empty-msg">No active orders for this pair</div>';
    return;
  }

  const id0 = _poolData.coin0 ? _poolData.coin0.id : "0";
  const dec0 = _poolData.coin0?.decimals || 18;
  const dec1 = _poolData.coin1?.decimals || 18;
  const base = label0, quote = label1;
  let html = '';
  for (const o of mine) {
    // Bid = deposited quote(token1) to buy base(token0); Ask = deposited base(token0) to sell
    const isAsk = _tokMatch(o.tokenIn, _poolData.token0);
    const isBid = !isAsk;
    const isInBase = _tokMatch(o.tokenIn, _poolData.token0);
    const bDec = isInBase ? (o._decIn||dec0) : (o._decOut||dec0);
    const qDec = isInBase ? (o._decOut||dec1) : (o._decIn||dec1);
    const baseWei = isBid ? o.amtOut : o.amtIn;
    const quoteWei = isBid ? o.amtIn : o.amtOut;
    const normBase = Number(BigInt(baseWei)) / (10 ** bDec);
    const normQuote = Number(BigInt(quoteWei)) / (10 ** qDec);
    const price = normBase > 0 ? normQuote / normBase : 0;
    const pctLabel = fillPctLabel(o);
    const size = fmt(baseWei, bDec);
    const expiryText = o.deadline === '9999999999' ? 'No expiry' : 'Expires ' + timeLeft(o.deadline);
    html += `<div class="my-order-item">
      <span class="my-order-side ${isBid ? 'bid' : 'ask'}">${isBid ? 'BID' : 'ASK'}</span>
      <div class="my-order-details">
        <div>${fmtCompact(price)} ${esc(quote)}/${esc(base)} &middot; ${size} ${esc(base)}${srcTag(o)}</div>
        <div class="line2">${expiryText}${o.txHash ? ' &middot; <a href="https://etherscan.io/tx/' + o.txHash + '" target="_blank" rel="noopener" style="color:inherit">' + o.txHash.slice(0,10) + '...</a>' : ''}</div>
      </div>
      ${pctLabel ? `<div class="my-order-fill"><span class="pct">${pctLabel}</span> filled</div>` : ''}
      <button class="cancel-btn" onclick="doCancelOrder('${o.id}')">Cancel</button>
    </div>`;
  }
  $('myOrdersTable').innerHTML = html;
}

// ---- Order form ----
function updateOrderTotal() {
  const amt = parseFloat($('orderAmt').value) || 0;
  const price = parseFloat($('orderPrice').value) || 0;
  const quote = _poolData ? tokenLabel(_poolData, 1) : 'USD';
  const total = amt * price;
  $('orderTotal').textContent = total > 0 ? total.toPrecision(6) + ' ' + quote : '--';
}

$('orderAmt').addEventListener('input', updateOrderTotal);
$('orderPrice').addEventListener('input', updateOrderTotal);

async function doMakeOrder() {
  const statusEl = $('makeStatus');
  function showStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = 'status-msg show ' + type;
  }

  if (!_signer) { showWalletModal(); return; }
  if (!_poolData) { showStatus('No pool loaded', 'error'); return; }

  const side = _orderSide;
  const amt = $('orderAmt').value;
  const price = $('orderPrice').value;
  if (!amt || !price || parseFloat(amt) <= 0 || parseFloat(price) <= 0) {
    showStatus('Enter valid amount and price', 'error');
    return;
  }

  if (_orderVenue === 'swapboard') {
    return doMakeSwapboardOrder(showStatus);
  }
  if (_orderVenue === 'swapboard-pf') {
    return doMakeSwapboardPFOrder(showStatus);
  }
}

// ---- Make Swapboard order ----
async function doMakeSwapboardOrder(showStatus) {
  const side = _orderSide;
  const amt = $('orderAmt').value;
  const price = $('orderPrice').value;

  const dec0 = _poolData.coin0 ? Number(_poolData.coin0.decimals) : 18;
  const dec1 = _poolData.coin1 ? Number(_poolData.coin1.decimals) : 18;
  // amt = base (token0) amount, price = quote/base, total = quote (token1)
  const totalWei = mulDecimals(amt, price, dec1);

  // Swapboard uses WETH internally — map ETH zero address to WETH
  const t0 = _poolData.token0 === ZERO ? SWAPBOARD_WETH : _poolData.token0;
  const t1 = _poolData.token1 === ZERO ? SWAPBOARD_WETH : _poolData.token1;

  let tokenA, amountA, tokenB, amountB, isPayingEth;

  if (side === 'buy') {
    // Buy base: deposit quote (token1) to get base (token0)
    tokenA = t1; amountA = totalWei;
    tokenB = t0; amountB = ethers.parseUnits(amt, dec0);
    isPayingEth = _poolData.token1 === ZERO;
  } else {
    // Sell base: deposit base (token0) to get quote (token1)
    tokenA = t0; amountA = ethers.parseUnits(amt, dec0);
    tokenB = t1; amountB = totalWei;
    isPayingEth = _poolData.token0 === ZERO;
  }

  if (amountA === 0n || amountB === 0n) {
    showStatus('Amount too small', 'error');
    $('makeOrderBtn').disabled = false;
    return;
  }

  try {
    $('makeOrderBtn').disabled = true;
    showStatus('Preparing transaction...', 'info');

    if (!_swapboard) { _swapboard = new ethers.Contract(SWAPBOARD, SWAPBOARD_ABI, _signer); }
    const addr = await _signer.getAddress();

    if (isPayingEth) {
      showStatus('Confirm in wallet...', 'info');
      const tx = await _swapboard.createOrderWithEth(tokenB, amountB, { value: amountA });
      showStatus('Tx sent: ' + tx.hash.slice(0, 10) + '...', 'info');
      await tx.wait();
    } else {
      const token = new ethers.Contract(tokenA, ERC20_ABI, _signer);
      const allowance = await token.allowance(addr, SWAPBOARD);
      if (allowance < amountA) {
        showStatus('Approving token spend...', 'info');
        const approveTx = await token.approve(SWAPBOARD, ethers.MaxUint256);
        await approveTx.wait();
      }
      showStatus('Confirm in wallet...', 'info');
      const tx = await _swapboard.createOrder(tokenA, amountA, tokenB, amountB);
      showStatus('Tx sent: ' + tx.hash.slice(0, 10) + '...', 'info');
      await tx.wait();
    }

    showStatus('Order created!', 'success');
    $('orderAmt').value = '';
    $('orderPrice').value = '';
    $('orderTotal').textContent = '--';
    setTimeout(refresh, 4000);
  } catch (e) {
    showStatus(e.reason || e.message || 'Transaction failed', 'error');
  } finally {
    $('makeOrderBtn').disabled = false;
  }
}

// ---- New order modal (global view) ----
let _newOrderVenue = 'swapboard';

function _obUpdateTokenBtn(id, symbol) {
  const t = _obTokens[symbol];
  if (!t) return;
  const icon = t.icon ? '<img src="' + escAttr(t.icon) + '" width="20" height="20" style="border-radius:50%" onerror="this.outerHTML=makeLetterIcon(\'' + escAttr(symbol) + '\')">' : iconForSymbol(symbol);
  $(id).innerHTML = '<span class="token-icon">' + icon + '</span> ' + escText(symbol) + ' <span class="token-chevron">&#9662;</span>';
}

async function doNewOrder() {
  const statusEl = $('newOrderStatus');
  function showStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = 'status-msg show ' + type;
  }

  if (!_signer) { showWalletModal(); return; }

  const tA = _obTokens[_newTokenA];
  const tB = _obTokens[_newTokenB];
  if (!tA) { showStatus('Select a token to send', 'error'); return; }
  if (!tB) { showStatus('Select a token to receive', 'error'); return; }

  const rawA = $('newAmountA').value;
  const rawB = $('newAmountB').value;
  if (!rawA || !rawB || parseFloat(rawA) <= 0 || parseFloat(rawB) <= 0) {
    showStatus('Enter valid amounts', 'error'); return;
  }

  const amountA = ethers.parseUnits(rawA, tA.decimals);
  const amountB = ethers.parseUnits(rawB, tB.decimals);
  if (amountA === 0n || amountB === 0n) { showStatus('Amount too small', 'error'); return; }

  // Same-token check (compare after ETH→WETH mapping)
  const effA = tA.address === ZERO ? SWAPBOARD_WETH.toLowerCase() : tA.address.toLowerCase();
  const effB = tB.address === ZERO ? SWAPBOARD_WETH.toLowerCase() : tB.address.toLowerCase();
  if (effA === effB) {
    showStatus('Cannot create order with the same token on both sides', 'error'); return;
  }

  const isPayingEth = tA.address === ZERO;
  const contractA = tA.address === ZERO ? SWAPBOARD_WETH : tA.address;
  const contractB = tB.address === ZERO ? SWAPBOARD_WETH : tB.address;
  const isPF = _newOrderVenue === 'swapboard-pf';
  const contractAddr = isPF ? SWAPBOARD_PF : SWAPBOARD;
  const btn = $('newOrderSubmitBtn');

  try {
    btn.disabled = true;
    showStatus('Preparing transaction...', 'info');
    const contract = isPF
      ? (_swapboardPF || (_swapboardPF = new ethers.Contract(SWAPBOARD_PF, SWAPBOARD_PF_ABI, _signer)))
      : (_swapboard || (_swapboard = new ethers.Contract(SWAPBOARD, SWAPBOARD_ABI, _signer)));
    const addr = await _signer.getAddress();

    if (isPayingEth) {
      showStatus('Confirm in wallet...', 'info');
      const tx = isPF
        ? await contract.createOrderWithEth(contractB, amountB, true, { value: amountA })
        : await contract.createOrderWithEth(contractB, amountB, { value: amountA });
      showStatus('Tx sent: ' + tx.hash.slice(0, 10) + '...', 'info');
      await tx.wait();
    } else {
      const token = new ethers.Contract(contractA, ERC20_ABI, _signer);
      const allowance = await token.allowance(addr, contractAddr);
      if (allowance < amountA) {
        showStatus('Approving token spend...', 'info');
        const approveTx = await token.approve(contractAddr, ethers.MaxUint256);
        await approveTx.wait();
      }
      showStatus('Confirm in wallet...', 'info');
      const tx = isPF
        ? await contract.createOrder(contractA, amountA, contractB, amountB, true)
        : await contract.createOrder(contractA, amountA, contractB, amountB);
      showStatus('Tx sent: ' + tx.hash.slice(0, 10) + '...', 'info');
      await tx.wait();
    }
    showStatus('Order created!', 'success');
    setTimeout(() => { closeNewOrderModal(); refresh(); }, 2000);
  } catch (e) {
    showStatus(e.reason || e.message || 'Transaction failed', 'error');
  } finally {
    btn.disabled = false;
  }
}

function _fillStatus(msg, type) {

async function doFillOrder(orderId) {

// ---- Fill Swapboard order (all-or-nothing) ----
async function doFillSwapboardOrder(o) {
  if (!_swapboard) { _swapboard = new ethers.Contract(SWAPBOARD, SWAPBOARD_ABI, _signer); }
  const oid = BigInt(o._orderId);
  const wethLower = SWAPBOARD_WETH.toLowerCase();
  const tokenB = o.tokenOut.toLowerCase();
  const tokenA = o.tokenIn.toLowerCase();
  const isPayingEth = tokenB === wethLower;
  const isReceivingEth = tokenA === wethLower;
  const deadline = Math.floor(Date.now() / 1000) + 300;

  const btn = $('fillOrderBtn');
  try {
    if (btn) btn.disabled = true;
    _fillStatus('Preparing...', 'info');
    const addr = await _signer.getAddress();

    if (isPayingEth) {
      _fillStatus('Confirm in wallet...', 'info');
      const tx = await _swapboard.fillOrderWithEth(oid, deadline, { value: BigInt(o.amtOut) });
      _fillStatus('Tx sent: ' + tx.hash.slice(0, 10) + '...', 'info');
      await tx.wait();
    } else if (isReceivingEth) {
      const token = new ethers.Contract(o.tokenOut, ERC20_ABI, _signer);
      const allowance = await token.allowance(addr, SWAPBOARD);
      if (allowance < BigInt(o.amtOut)) {
        _fillStatus('Approving token spend...', 'info');
        const approveTx = await token.approve(SWAPBOARD, ethers.MaxUint256);
        await approveTx.wait();
      }
      _fillStatus('Confirm in wallet...', 'info');
      const tx = await _swapboard.fillOrderUnwrap(oid, deadline);
      _fillStatus('Tx sent: ' + tx.hash.slice(0, 10) + '...', 'info');
      await tx.wait();
    } else {
      const token = new ethers.Contract(o.tokenOut, ERC20_ABI, _signer);
      const allowance = await token.allowance(addr, SWAPBOARD);
      if (allowance < BigInt(o.amtOut)) {
        _fillStatus('Approving token spend...', 'info');
        const approveTx = await token.approve(SWAPBOARD, ethers.MaxUint256);
        await approveTx.wait();
      }
      _fillStatus('Confirm in wallet...', 'info');
      const tx = await _swapboard.fillOrder(oid, deadline);
      _fillStatus('Tx sent: ' + tx.hash.slice(0, 10) + '...', 'info');
      await tx.wait();
    }
    closeFillModal();
    setTimeout(refresh, 4000);
  } catch (e) {
    _fillStatus(e.reason || e.message || 'Fill failed', 'error');
  } finally {
    if (btn) btn.disabled = false;
  }
}

// ---- Fill Swapboard PF order (partial fill) ----
async function doFillSwapboardPFOrder(o) {
  if (!_swapboardPF) { _swapboardPF = new ethers.Contract(SWAPBOARD_PF, SWAPBOARD_PF_ABI, _signer); }
  const oid = BigInt(o._orderId);
  const wethLower = SWAPBOARD_WETH.toLowerCase();
  const tokenB = o.tokenOut.toLowerCase();
  const tokenA = o.tokenIn.toLowerCase();
  const isPayingEth = tokenB === wethLower;
  const isReceivingEth = tokenA === wethLower;
  const deadline = Math.floor(Date.now() / 1000) + 300;

  const remaining = BigInt(o.amtOut) - BigInt(o.outDone);
  const outDec = coinLabelForOrder(o, 'out').decimals;
  let fillAmountB = 0n; // 0 = full fill

  const fillInput = $('fillAmtInput');
  if (o.partialFill && fillInput && fillInput.value) {
    const parsed = ethers.parseUnits(fillInput.value, outDec);
    if (parsed <= 0n) { _fillStatus('Enter a valid fill amount', 'error'); return; }
    fillAmountB = parsed > remaining ? remaining : parsed;
    if (fillAmountB >= remaining) fillAmountB = 0n; // full fill
  }

  const btn = $('fillOrderBtn');
  try {
    if (btn) btn.disabled = true;
    _fillStatus('Preparing...', 'info');
    const addr = await _signer.getAddress();
    const payAmount = fillAmountB === 0n ? BigInt(o.amtOut) : fillAmountB;

    if (isPayingEth) {
      _fillStatus('Confirm in wallet...', 'info');
      const tx = await _swapboardPF.fillOrderWithEth(oid, deadline, { value: payAmount });
      _fillStatus('Tx sent: ' + tx.hash.slice(0, 10) + '...', 'info');
      await tx.wait();
    } else if (isReceivingEth) {
      const token = new ethers.Contract(o.tokenOut, ERC20_ABI, _signer);
      const allowance = await token.allowance(addr, SWAPBOARD_PF);
      if (allowance < payAmount) {
        _fillStatus('Approving token spend...', 'info');
        const approveTx = await token.approve(SWAPBOARD_PF, ethers.MaxUint256);
        await approveTx.wait();
      }
      _fillStatus('Confirm in wallet...', 'info');
      const tx = await _swapboardPF.fillOrderUnwrap(oid, deadline, fillAmountB);
      _fillStatus('Tx sent: ' + tx.hash.slice(0, 10) + '...', 'info');
      await tx.wait();
    } else {
      const token = new ethers.Contract(o.tokenOut, ERC20_ABI, _signer);
      const allowance = await token.allowance(addr, SWAPBOARD_PF);
      if (allowance < payAmount) {
        _fillStatus('Approving token spend...', 'info');
        const approveTx = await token.approve(SWAPBOARD_PF, ethers.MaxUint256);
        await approveTx.wait();
      }
      _fillStatus('Confirm in wallet...', 'info');
      const tx = await _swapboardPF.fillOrder(oid, deadline, fillAmountB);
      _fillStatus('Tx sent: ' + tx.hash.slice(0, 10) + '...', 'info');
      await tx.wait();
    }
    closeFillModal();
    setTimeout(refresh, 4000);
  } catch (e) {
    _fillStatus(e.reason || e.message || 'Fill failed', 'error');
  } finally {
    if (btn) btn.disabled = false;
  }
}

// ---- Global orders view ----

// Display-aware label: for Swapboard orders, shows WETH as ETH
function coinLabelForOrder(o, field) {
  const token = field === 'in' ? o.tokenIn : o.tokenOut;
  const id = field === 'in' ? o.idIn : o.idOut;
  if (o._source === 'swapboard' || o._source === 'swapboard-pf') {
    const sym = field === 'in' ? o._symIn : o._symOut;
    const dec = field === 'in' ? o._decIn : o._decOut;
    if (sym) return { symbol: sym, decimals: dec || 18 };
  }
  return coinLabel(token, id);
}

function coinLabel(token, id) {
  if (token === ZERO) return { symbol: 'ETH', decimals: 18 };
  // Known ERC20 tokens by address
  const known = KNOWN_TOKENS[token.toLowerCase()];
  if (known) return known;
  // Synthetic pool label hints (URL params take priority for the current pair view)
  if (_poolData) {
    const _t = token.toLowerCase();
    if (_poolData.token0 === _t && _poolData.coin0 && _poolData.coin0.id === id && _poolData.coin0.symbol)
      return { symbol: _poolData.coin0.symbol, decimals: _poolData.coin0.decimals || 18 };
    if (_poolData.token1 === _t && _poolData.coin1 && _poolData.coin1.id === id && _poolData.coin1.symbol)
      return { symbol: _poolData.coin1.symbol, decimals: _poolData.coin1.decimals || 18 };
  }
  return { symbol: shortAddr(token), decimals: 18 };
}

function iconForToken(token, id, order) {
  // Use order-aware label for Swapboard (shows WETH as ETH etc)
  const label = order ? coinLabelForOrder(order, token === order.tokenIn ? 'in' : 'out') : coinLabel(token, id);
  // Built-in SVG icons for known tokens
  if (TOKEN_ICONS[label.symbol]) {
    return TOKEN_ICONS[label.symbol];
  }
  // Logo URL from synthetic pool data (passed via URL params)
  const _t = token.toLowerCase();
  const poolCoin = _poolData
    ? ((_poolData.token0 === _t && _poolData.coin0 && _poolData.coin0.id === id) ? _poolData.coin0
      : (_poolData.token1 === _t && _poolData.coin1 && _poolData.coin1.id === id) ? _poolData.coin1 : null)
    : null;
  if (poolCoin?.logoUrl) {
    return `<img src="${escAttr(poolCoin.logoUrl)}" width="24" height="24" style="border-radius:50%" onerror="this.outerHTML=makeLetterIcon('${escAttr(label.symbol)}')">`;
  }
  // Fallback: letter icon
  return iconForSymbol(label.symbol);
}

let _renderedGlobalOrders = []; // cached for filtering
let _activePairFilter = null;

function _normAddr(addr) {
  // Normalize WETH to ETH zero address for grouping
  const a = addr.toLowerCase();
  return a === SWAPBOARD_WETH.toLowerCase() ? ZERO : a;
}

function orderPairKey(o) {
  const a = _normAddr(o.tokenIn), b = _normAddr(o.tokenOut);
  return a < b ? a + ':' + b : b + ':' + a;
}

function orderPairLabel(o) {
  const a = _normAddr(o.tokenIn), b = _normAddr(o.tokenOut);
  const la = coinLabelForOrder(o, 'in').symbol;
  const lb = coinLabelForOrder(o, 'out').symbol;
  return a < b ? la + '/' + lb : lb + '/' + la;
}

function orderRate(o) {
  const inL = coinLabelForOrder(o, 'in');
  const outL = coinLabelForOrder(o, 'out');
  const inAmt = Number(BigInt(o.amtIn)) / (10 ** (inL.decimals || 18));
  const outAmt = Number(BigInt(o.amtOut)) / (10 ** (outL.decimals || 18));
  if (inAmt <= 0) return 0;
  return outAmt / inAmt;
}

function renderGlobalOrders() {
  const now = Math.floor(Date.now() / 1000);
  _renderedGlobalOrders = _allOrders.filter(o => o.status === "ACTIVE" && Number(o.deadline) > now);

  // Build pair filter chips
  const pairCounts = new Map();
  for (const o of _renderedGlobalOrders) {
    const key = orderPairKey(o);
    pairCounts.set(key, (pairCounts.get(key) || 0) + 1);
  }
  // Sort pairs by order count desc, show top pairs
  const topPairs = [...pairCounts.entries()]
    .sort((a, b) => b[1] - a[1])
    .slice(0, 8);

  let chipHtml = '<span class="pair-chip' + (!_activePairFilter ? ' active' : '') + '" data-pair="" onclick="setPairFilter(null)">All</span>';
  for (const [key, count] of topPairs) {
    if (count < 2) continue;
    const sample = _renderedGlobalOrders.find(o => orderPairKey(o) === key);
    const label = orderPairLabel(sample);
    const active = _activePairFilter === key ? ' active' : '';
    chipHtml += `<span class="pair-chip${active}" data-pair="${escAttr(key)}" onclick="setPairFilter('${escAttr(key)}')">${escText(label)} (${count})</span>`;
  }
  $('pairFilters').innerHTML = chipHtml;

  filterGlobalOrders();
}

function setPairFilter(key) {
  _activePairFilter = key;
  const chips = $('pairFilters').querySelectorAll('.pair-chip');
  chips.forEach(c => c.classList.toggle('active', key === null ? !c.dataset.pair : c.dataset.pair === key));
  filterGlobalOrders();
}

function filterGlobalOrders() {
  const q = ($('globalSearch')?.value || '').toLowerCase().trim();
  const sort = $('globalSort')?.value || 'newest';

  let orders = _renderedGlobalOrders;

  // Pair filter
  if (_activePairFilter) {
    orders = orders.filter(o => orderPairKey(o) === _activePairFilter);
  }

  // Text search
  if (q) {
    orders = orders.filter(o => {
      const inL = coinLabelForOrder(o, 'in');
      const outL = coinLabelForOrder(o, 'out');
      const searchable = [
        inL.symbol, outL.symbol,
        o.tokenIn, o.tokenOut,
        o.maker, o._source, 'otc'
      ].filter(Boolean).join(' ').toLowerCase();
      return searchable.includes(q);
    });
  }

  // Sort
  if (sort === 'expiring') {
    orders = [...orders].sort((a, b) => Number(a.deadline) - Number(b.deadline));
  } else if (sort === 'largest') {
    orders = [...orders].sort((a, b) => {
      const aD = coinLabelForOrder(a, 'in').decimals || 18;
      const bD = coinLabelForOrder(b, 'in').decimals || 18;
      const aIn = Number(BigInt(a.amtIn)) / (10 ** aD);
      const bIn = Number(BigInt(b.amtIn)) / (10 ** bD);
      return bIn - aIn;
    });
  }
  // 'newest' keeps indexer order (createdAt desc)

  const filtered = q || _activePairFilter;
  $('globalOrderCount').textContent = orders.length + ' order' + (orders.length !== 1 ? 's' : '')
    + (filtered ? ' matching' : '');

  if (orders.length === 0) {
    $('globalOrdersList').innerHTML = `<div class="empty-msg">${filtered ? 'No orders match your search' : 'No active orders'}</div>`;
    return;
  }

  const userAddr = _connectedAddress?.toLowerCase() || '';
  let html = '';
  for (const o of orders) {
    const inL = coinLabelForOrder(o, 'in');
    const outL = coinLabelForOrder(o, 'out');
    const pctLabel = fillPctLabel(o);
    const tl = timeLeft(o.deadline);
    const inIcon = iconForToken(o.tokenIn, o.idIn, o);
    const outIcon = iconForToken(o.tokenOut, o.idOut, o);
    const rate = orderRate(o);
    const rateStr = rate > 0 ? fmtCompact(rate) + ' ' + escText(outL.symbol) + '/' + escText(inL.symbol) : '';
    const aon = o.partialFill ? '' : ' <span class="aon-tag" title="All-or-nothing">AON</span>';
    const isMine = userAddr && o.maker.toLowerCase() === userAddr;
    const yoursTag = isMine ? ' <span class="yours-tag">Yours</span>' : '';
    const expiry = o.deadline === '9999999999' ? 'no expiry' : escText(tl) + ' left';
    html += `<div class="global-order-item${isMine ? ' is-mine' : ''}" onclick="showFillModal('${escAttr(o.id)}')">
      <div class="order-token-pair">
        <span class="token-icon">${inIcon}</span>
        <span class="order-arrow">&rarr;</span>
        <span class="token-icon">${outIcon}</span>
      </div>
      <div class="order-info">
        <div class="amounts">${escText(fmt(o.amtIn, inL.decimals))} ${escText(inL.symbol)} &rarr; ${escText(fmt(o.amtOut, outL.decimals))} ${escText(outL.symbol)}${aon}${srcTag(o)}${yoursTag}</div>
        <div class="meta">${rateStr}${rateStr ? ' &middot; ' : ''}${escText(shortAddr(o.maker))}${pctLabel ? ' &middot; ' + pctLabel + ' filled' : ''} &middot; ${expiry}</div>
      </div>
      ${pctLabel ? `<div class="order-fill-badge"><span class="pct">${pctLabel}</span><br>filled</div>` : ''}
    </div>`;
  }
  $('globalOrdersList').innerHTML = html;
}

// ---- Fill confirmation modal ----
function showFillModal(orderId) {
  const o = _allOrders.find(x => x.id === orderId);
  if (!o) { alert('Order not found'); return; }

  const remaining = BigInt(o.amtOut) - BigInt(o.outDone);
  if (remaining <= 0n) { alert('Order already filled'); return; }

  const inL = coinLabelForOrder(o, 'in');

  const isMine = _connectedAddress && o.maker.toLowerCase() === _connectedAddress.toLowerCase();

  // What the filler pays (tokenOut side) and receives (tokenIn side)
  const remainingIn = BigInt(o.amtIn) - BigInt(o.inDone);
  const youPay = fmt(remaining.toString(), outL.decimals);
  const youGet = fmt(remainingIn.toString(), inL.decimals);
