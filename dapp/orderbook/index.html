  const canPartial = o.partialFill;
  const remainingStr = ethers.formatUnits(remaining, outL.decimals);

  // Compute rate for display
  const inAmt = Number(remainingIn) / (10 ** inL.decimals);
  const outAmt = Number(remaining) / (10 ** outL.decimals);
  const rate = inAmt > 0 ? outAmt / inAmt : 0;
  const rateStr = rate > 0 ? fmtCompact(rate) + ' ' + escText(outL.symbol) + ' per ' + escText(inL.symbol) : '';

  body.innerHTML = `
    ${isMine ? '<div style="padding:10px 12px;margin-bottom:12px;background:rgba(255,180,50,0.08);border:1px solid rgba(255,180,50,0.25);font-size:12px;text-align:center;color:var(--fg-muted)">This is your order</div>' : ''}
    <div class="fill-modal-pair">
      <div class="fill-modal-token">
        <span class="sym">${isMine ? 'Escrowed' : 'You pay'}</span>
        <span class="icon">${isMine ? inIcon : outIcon}</span>
        <span class="amt" id="fillPayAmt">${escText(isMine ? fmt(remainingIn.toString(), inL.decimals) : youPay)}</span>
        <span class="sym">${escText(isMine ? inL.symbol : outL.symbol)}</span>
      </div>
      <span class="fill-modal-arrow">&rarr;</span>
      <div class="fill-modal-token">
        <span class="sym">${isMine ? 'Requesting' : 'You get'}</span>
        <span class="icon">${isMine ? outIcon : inIcon}</span>
        <span class="amt" id="fillGetAmt">${escText(isMine ? fmt(remaining.toString(), outL.decimals) : youGet)}</span>
        <span class="sym">${escText(isMine ? outL.symbol : inL.symbol)}</span>
      </div>
    </div>
    ${rateStr ? `<div style="text-align:center;font-size:11px;color:var(--fg-muted);margin:-8px 0 16px;font-family:monospace">${rateStr}</div>` : ''}
    ${!isMine && canPartial ? `
    <div class="fill-amt-row">
      <input type="number" id="fillAmtInput" step="any" min="0" placeholder="Amount (${escAttr(outL.symbol)})" value="${escAttr(remainingStr)}">
      <button class="max-btn" onclick="document.getElementById('fillAmtInput').value='${escAttr(remainingStr)}';updateFillPreview()">MAX</button>
    </div>` : ''}
    <div class="fill-modal-details">
      <div class="row"><span class="label">Maker</span><span class="value">${escText(shortAddr(o.maker))}${isMine ? ' (you)' : ''}</span></div>
      <div class="row"><span class="label">Type</span><span class="value">${o.partialFill ? 'Partial fill' : 'All or nothing'}</span></div>
      <div class="row"><span class="label">Expires</span><span class="value">Never</span></div>
      ${o.txHash ? `<div class="row"><span class="label">Tx</span><span class="value"><a href="https://etherscan.io/tx/${escAttr(o.txHash)}" target="_blank" rel="noopener" style="color:inherit">${escText(o.txHash.slice(0,10))}&hellip;</a></span></div>` : ''}
    </div>
    ${_globalMode && !isMine ? `<a href="?token0=${encodeURIComponent(o.tokenIn)}&token1=${encodeURIComponent(o.tokenOut)}&id0=${encodeURIComponent(o.idIn)}&id1=${encodeURIComponent(o.idOut)}&label0=${encodeURIComponent(inL.symbol)}&label1=${encodeURIComponent(outL.symbol)}" style="display:block;text-align:center;font-size:11px;color:var(--fg-muted);margin-bottom:12px;text-decoration:underline">View ${escText(inL.symbol)}/${escText(outL.symbol)} orderbook &rarr;</a>` : ''}
    ${isMine
      ? `<button class="submit-btn" id="fillOrderBtn" onclick="doCancelOrderFromModal('${escAttr(o.id)}')" style="width:100%;background:var(--red-bg);color:var(--red);border:1px solid var(--red)">Cancel Order</button>`
      : `${canPartial ? '<div class="fill-modal-note">Enter amount or fill the full remaining order</div>' : ''}
         <button class="submit-btn buy" id="fillOrderBtn" onclick="doFillOrder('${escAttr(o.id)}')" style="width:100%">Fill Order</button>`}
    <div class="status-msg" id="fillStatus" style="margin-top:8px"></div>
  `;

  if (!isMine && canPartial) {
    // Store order data for the preview updater
    window._fillOrder = { remaining, remainingIn, outDecimals: outL.decimals, inDecimals: inL.decimals };
    $('fillAmtInput').addEventListener('input', updateFillPreview);
  }

  $('fillModal').classList.add('active');
  document.body.classList.add('modal-open');
}

function updateFillPreview() {
  const f = window._fillOrder;
  if (!f) return;
  const val = $('fillAmtInput').value;
  if (!val || parseFloat(val) <= 0) {
    $('fillPayAmt').textContent = '--';
    $('fillGetAmt').textContent = '--';
    return;
  }
  const fillWei = ethers.parseUnits(val, f.outDecimals);
  const clamped = fillWei > f.remaining ? f.remaining : fillWei;
  const proportionalIn = (f.remainingIn * clamped) / f.remaining;
  $('fillPayAmt').textContent = fmt(clamped.toString(), f.outDecimals);
  $('fillGetAmt').textContent = fmt(proportionalIn.toString(), f.inDecimals);
}

function closeFillModal() {
  window._fillOrder = null;
  $('fillModal').classList.remove('active');
  document.body.classList.remove('modal-open');
}

// ---- Refresh loop ----
let _pendingFill = new URLSearchParams(location.search).get('fill');

async function refresh() {
  try {
    _allOrders = await fetchOrders();
    if (_globalMode) {
      renderGlobalOrders();
    } else {
      renderBook();
      if (_activeTab === 'mine') renderMyOrders();
    }
    // Auto-open fill modal if deep-linked
    if (_pendingFill) {
      const id = _pendingFill;
      _pendingFill = null;
      if (_allOrders.find(o => o.id === id)) showFillModal(id);
    }
  } catch (e) {
    console.error('Refresh failed:', e);
  }
  _refreshCountdown = 30;
}

function startRefreshLoop() {
  refresh();
  setInterval(() => {
    _refreshCountdown--;
    if (_refreshCountdown <= 0) refresh();
    const el = $(_globalMode ? 'globalRefreshCountdown' : 'refreshCountdown');
    if (el) el.textContent = _refreshCountdown + 's';
  }, 1000);
}

// ---- Build synthetic pool data from token addresses ----
function buildSyntheticPool(token0, token1, id0, id1, labelHint0, labelHint1, logoHint0, logoHint1) {
  // Normalize WETH address to ETH zero address
  const wethLower = SWAPBOARD_WETH.toLowerCase();
  const t0 = token0.toLowerCase() === wethLower ? ZERO : token0.toLowerCase();
  const t1 = token1.toLowerCase() === wethLower ? ZERO : token1.toLowerCase();
  const k0 = KNOWN_TOKENS[t0];
  const k1 = KNOWN_TOKENS[t1];
  const dec0 = k0 ? k0.decimals : 18;
  const dec1 = k1 ? k1.decimals : 18;
  // Use label hints if provided, else known token symbol, else short address
  let label0 = labelHint0 || (k0 ? k0.symbol : shortAddr(t0));
  let label1 = labelHint1 || (k1 ? k1.symbol : shortAddr(t1));
  // When both tokens are the same ERC6909 contract, disambiguate by coin ID
  if (t0 === t1 && id0 !== id1 && !labelHint0 && !labelHint1) {
    const base = k0 ? k0.symbol : shortAddr(t0);
    label0 = base + ' #' + id0.toString().slice(0, 6);
    label1 = base + ' #' + id1.toString().slice(0, 6);
  }
  return {
    token0: t0, token1: t1,
    coin0: { id: id0, decimals: dec0, symbol: label0, logoUrl: logoHint0 || null },
    coin1: { id: id1, decimals: dec1, symbol: label1, logoUrl: logoHint1 || null },
    reserve0: null, reserve1: null
  };
}

// ---- Init ----
async function init() {
  $('poolMeta').innerHTML = zfiLoadingSVG(28) + 'Loading...';
  const poolId = getPoolId();
  const tokenParams = !poolId ? getTokenParams() : null;

  if (!poolId && !tokenParams) {
    _globalMode = true;
    $('pairName').textContent = 'Orderbook';
    $('poolMeta').innerHTML = 'All active orders &middot; <a href="https://etherscan.io/address/' + SWAPBOARD + '" target="_blank" rel="noopener">Swapboard</a> &middot; <a href="https://etherscan.io/address/' + SWAPBOARD_PF + '" target="_blank" rel="noopener">Swapboard PF</a>';
    document.title = 'ORDER';
    $('allOrdersLink').style.display = 'none';
    document.querySelector('.tab-row').style.display = 'none';
    $('tab-book').style.display = 'none';
    $('priceBanner').style.display = 'none';
    $('globalView').style.display = '';
    startRefreshLoop();
    walletInit({ appName: 'zFi Orderbook', onConnect: [() => { _swapboard = new ethers.Contract(SWAPBOARD, SWAPBOARD_ABI, _signer); _swapboardPF = new ethers.Contract(SWAPBOARD_PF, SWAPBOARD_PF_ABI, _signer); renderMyOrders(); }], onDisconnect: [() => { _swapboard = null; _swapboardPF = null; renderMyOrders(); }] });
    return;
  }

  if (poolId) {
    $('chartLink').href = '../chart/#/' + poolId;
    $('chartLink').style.display = 'inline-flex';
    $('lpLink').href = '../liquidity/#/' + poolId;
    $('lpLink').style.display = 'inline-flex';

    try {
      _poolData = await fetchPool(poolId);
    } catch (e) {
      console.error('Pool fetch failed:', e);
    }
  }

  // Fallback: build synthetic pool from query params
  if (!_poolData && tokenParams) {
    _poolData = buildSyntheticPool(tokenParams.token0, tokenParams.token1, tokenParams.id0, tokenParams.id1, tokenParams.label0, tokenParams.label1, tokenParams.logo0, tokenParams.logo1);
  }

  if (_poolData) {
    const label0 = tokenLabel(_poolData, 0);
    const label1 = tokenLabel(_poolData, 1);
    const id0 = _poolData.coin0 ? String(_poolData.coin0.id) : '0';
    const id1 = _poolData.coin1 ? String(_poolData.coin1.id) : '0';
    const icon0 = iconForToken(_poolData.token0, id0);
    const icon1 = iconForToken(_poolData.token1, id1);
    $('pairIcons').innerHTML = '<span class="icon-0">' + icon0 + '</span><span class="icon-1">' + icon1 + '</span>';
    $('pairName').textContent = label0 + ' / ' + label1;
    $('poolMeta').innerHTML = (poolId ? 'Pool ' + poolId.slice(0, 16) + '... &middot; ' : '')
      + '<a href="https://etherscan.io/address/' + SWAPBOARD + '" target="_blank" rel="noopener">Swapboard</a>'
      + ' &middot; <a href="https://etherscan.io/address/' + SWAPBOARD_PF + '" target="_blank" rel="noopener">Swapboard PF</a>';
    document.title = label0 + '/' + label1 + ' ORDER';

    // Show AMM price in quote/base (token1 per token0), matching book convention
    if (_poolData.reserve0 && _poolData.reserve1 && BigInt(_poolData.reserve0) > 0n) {
      const d0 = _poolData.coin0?.decimals || 18;
      const d1 = _poolData.coin1?.decimals || 18;
      const r0 = Number(BigInt(_poolData.reserve0)) / (10 ** d0);
      const r1 = Number(BigInt(_poolData.reserve1)) / (10 ** d1);
      if (r0 > 0) {
        const ammPx = r1 / r0;
        $('ammPrice').textContent = fmtCompact(ammPx);
        $('ammPriceLabel').textContent = label1 + ' per ' + label0 + ' (AMM)';
        $('priceBanner').style.display = '';
      }
      $('ammReserves').innerHTML = fmt(_poolData.reserve0, d0) + ' ' + esc(label0) + '<br>' + fmt(_poolData.reserve1, d1) + ' ' + esc(label1);
    }

    setSide('buy');

    // Pre-fill price from URL param
    const urlPrice = tokenParams ? tokenParams.price : new URLSearchParams(location.search).get('price');
    if (urlPrice) {
      $('orderPrice').value = urlPrice;
      updateOrderTotal();
    }
  } else {
    $('pairName').textContent = 'Orderbook';
    $('poolMeta').textContent = 'Pool ' + (poolId || '').slice(0, 20) + '... (metadata unavailable)';
    console.warn('[orderbook] Pool not found for id:', poolId);
  }

  startRefreshLoop();
  walletInit({ appName: 'zFi Orderbook', onConnect: [() => { _swapboard = new ethers.Contract(SWAPBOARD, SWAPBOARD_ABI, _signer); _swapboardPF = new ethers.Contract(SWAPBOARD_PF, SWAPBOARD_PF_ABI, _signer); renderMyOrders(); }], onDisconnect: [() => { _swapboard = null; _swapboardPF = null; renderMyOrders(); }] });
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if ($('obTokenModal').classList.contains('active')) closeOrderTokenModal();
    else if ($('fillModal').classList.contains('active')) closeFillModal();
    else if ($('newOrderModal').classList.contains('active')) closeNewOrderModal();
  }
});

window.addEventListener('hashchange', () => location.reload());
init();
</script>
